entifies structural load paths/weak points before cutting.", "Dedicated spotter maintains visual contact during gas cutting, alerts operator/manlift of impending failure."]}, "ko": {"h": "산소·아세틸렌 취급불량 화재/폭발, 하중부재 절단 시 붕괴 위험", "ctrl": ["가스 레귤레이터·밸브·호스 상태 양호 유지", "실린더 수직 보관, 체인·스트랩 고정", "B급 소화기 비치, 사용법 교육", "용접공 산소-아세틸렌 장비 운용 교육", "절단 전 엔지니어가 하중경로·취약점 식별", "전담 스포터가 절단 중 육안 감시, 붕괴 조짐 시 경고"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Cutting steel connections from a manlift risks structural weakening/unexpected collapse.", "ctrl": ["Grabber used to hold/support structural member during cutting.", "Clear communication maintained between cutter and equipment operator.", "Welders provided PPE (leather/welding gloves, helmet/goggles, apron, respirator)."]}, "ko": {"h": "맨리프트에서 강재 연결부 절단 중 구조약화/붕괴", "ctrl": ["절단 중 그래버로 부재 지지", "절단자-장비오퍼레이터 통신 유지", "용접공 PPE(가죽장갑·용접헬멧·앞치마·호흡기) 지급"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Rebar/Steel Cutting Using Oxygen-Acetylene Gas", "ko": "산소-아세틸렌 가스절단"}, "steps": {"en": ["Check gas cutting equipment, ensure all valves are closed.", "Connect regulators to cylinders.", "Connect hoses to torch handle.", "Open acetylene cylinder valve ¼ to ½ turn only.", "Open oxygen cylinder valve fully (double seat valve).", "Set regulators: acetylene 5-10 psi, oxygen 20-40 psi (depending on tip size/metal thickness).", "Open fuel valve slightly on torch, allow small flow to purge air, then close.", "Do the same with the oxygen valve.", "Open the acetylene valve on the torch slightly.", "Use a flint striker or lighter to light the flame.", "Slowly open the oxygen valve until a neutral flame is achieved (no yellow tip, sharply defined blue cone).", "Direct the flame at the edge of the metal where the cut will begin.", "Hold the flame until the metal becomes cherry red (approx. 800-900°C).", "Start the cut, press the oxygen lever on the torch to release a jet of oxygen.", "This reacts with the red-hot steel and starts the cutting process.", "Move the torch steadily along the cutting line.", "Maintain a consistent speed and correct torch angle (perpendicular or slightly tilted).", "Continue the cut, adjust torch angle/speed based on how well the metal is cutting.", "Avoid pausing too long in one place to prevent a messy cut or blowback.", "When finished, release the oxygen lever.", "Close the torch valves: first acetylene, then oxygen.", "Close cylinder valves: acetylene, then oxygen.", "Bleed the lines via torch valves.", "Back off pressure adjusting screws on both regulators to relieve spring pressure.", "Let the metal cool before handling."], "ko": ["가스절단장비 점검, 전 밸브 잠김 확인", "레귤레이터를 실린더에 연결", "호스를 토치핸들에 연결", "아세틸렌 실린더 밸브 1/4~1/2회전만 개방", "산소 실린더 밸브 완전 개방(듀얼시트밸브)", "레귤레이터 설정: 아세틸렌 5~10psi, 산소 20~40psi(팁크기·두께에 따라)", "토치의 연료밸브를 살짝 열어 공기퍼지 후 닫기", "산소밸브도 동일하게 실시", "토치의 아세틸렌밸브를 살짝 열기", "점화기로 불꽃 점화", "산소밸브를 서서히 열어 중성불꽃(황색 끝 없음, 선명한 청색콘) 확보", "절단 시작지점 모서리에 불꽃 조준", "금속이 체리레드(약 800~900°C)가 될 때까지 가열", "산소레버를 눌러 산소분사, 절단 시작", "고온 강재와 반응하여 절단 진행", "절단선 따라 토치를 안정적으로 이동", "일정한 속도·적정 각도(수직 또는 약간 기울임) 유지", "절단 진행하며 절단상태에 따라 각도·속도 조정", "한 곳에 오래 머물지 않기(절단면 불량·역화 방지)", "완료 시 산소레버 놓기", "토치밸브 순서대로 닫기: 아세틸렌 먼저, 산소 나중", "실린더밸브 닫기: 아세틸렌, 산소 순", "토치밸브로 라인 배기", "양쪽 레귤레이터 압력조정나사 풀어 스프링압력 해소", "취급 전 금속 냉각 대기"]}}, {"title": {"en": "Welding of Steel (Arc Welding / SMAW)", "ko": "강재 용접 (아크용접/SMAW)"}, "steps": {"en": ["Select the appropriate electrode based on material and thickness.", "Adjust amperage per electrode size/material thickness (e.g. 3.2mm/1/8in electrode typically requires 75-85 amps).", "Hold the electrode holder at a 15-20° angle from vertical.", "Tap or scratch the electrode against the workpiece to initiate the arc.", "Once arc established, maintain consistent distance between electrode and workpiece for a stable arc.", "Move electrode steadily along the joint, maintaining consistent speed/angle.", "Use a weaving motion if necessary for proper fusion/penetration.", "Once weld complete, slowly lift electrode away to break the arc.", "Allow weld to cool naturally; avoid quenching with water (introduces stress, cracking risk).", "Remove slag using chipping hammer and wire brush, inspect weld for defects.", "Check weld bead for uniformity, penetration, and any defects (cracks, porosity).", "Use appropriate tools to clean and inspect the weld."], "ko": ["재질·두께에 맞는 전극봉 선정", "전극봉 크기·두께에 따라 전류 조정(예: 3.2mm/1/8인치는 통상 75~85A)", "전극홀더를 수직에서 15~20° 각도로 유지", "성냥 긋듯 전극을 모재에 접촉하여 아크 발생", "아크 형성 후 전극-모재 간 일정거리 유지하여 안정적 아크 유지", "이음부를 따라 일정속도·각도로 전극 이동", "필요 시 위빙동작으로 융합·용입 확보", "용접 완료 후 서서히 전극을 떼어 아크 차단", "자연냉각, 물 급냉 금지(응력·균열 위험)", "치핑해머·와이어브러시로 슬래그 제거, 결함 확인", "비드의 균일성·용입·결함(균열·기공) 확인", "적절한 공구로 용접부 청소·검사"]}}], "fullControls": {"en": ["Ensure the workspace is clear of flammable materials to reduce the risk of fire caused by sparks", "Keep a fire extinguisher nearby and ensure the area is clear of combustible materials.", "Provide workers with safety goggles or face shields to protect against flying debris and sparks.", "Wear a dust mask or respirator if working in an environment with excessive metal dust or fumes.", "Regularly inspect the grinder for any wear, defects, or damage.", "Never use a grinder without the protective guard.", "Ensure that the RPM rating of the disc/blade is higher than that of the grinder.", "First Aider and first aid kit must be available on site", "Ensure gas regulators, valves, and hoses are in good condition and properly maintained to prevent leaks.", "Cylinders should be stored upright and secured with chains or straps to prevent them from tipping over.", "Use appropriate equipment and techniques for moving cylinders, such as cylinder carts or trolleys. Avoid dropping or striking cylinders.", "Install appropriate fire extinguishers (e.g., Class B for flammable gases) in accessible locations. Ensure that employees are trained in their use.", "Ensure that welders are trained in the proper operation of the oxy acetylene equipment.", "Use enclosures or barriers around cutting/welding area to contain and control the spread of fumes.", "Have supervisors regularly monitor cutting operations to ensure adherence to safety procedures.", "Store oxygen and acetylene cylinders in well-ventilated areas, away from heat sources or flammable materials.", "Provide welders with additional PPE (leather or welding gloves, welding helmet or welding goggles, welder apron, long pants and respirator if necessary) to protect against burns from sparks and hot steel.", "Assign engineer that will identify structural load paths and weak points before cutting.", "Assign dedicated spotter that will maintain a visual contact with the cutting points while gas cutting.", "Equipped with megaphone and whistle, he will alert the manlift operator and operatives in case he noticed impending structural failure during cutting.", "Use grabber to hold and support structural member during cutting.", "Maintain clear communication between cutter and equipment operator."], "ko": ["스파크로 인한 화재위험 저감 위해 작업구역 가연물 제거 확인.", "소화기를 인근에 비치, 구역 내 가연물 없음 확인.", "비산물·스파크 방호용 보안경 또는 안면보호구 지급.", "과도한 금속분진·흄이 있는 환경에서는 방진마스크/호흡기 착용.", "그라인더의 마모, 결함, 손상 정기점검.", "보호가드 없는 그라인더 사용 절대금지.", "디스크/날의 RPM 정격이 그라인더 RPM보다 높은지 확인.", "응급처치자·구급함 현장 상시 비치.", "가스레귤레이터, 밸브, 호스가 양호상태이며 적정 정비되어 누출 방지 확인.", "실린더는 수직 보관, 체인이나 스트랩으로 고정하여 전도 방지.", "실린더 이동 시 실린더카트/트롤리 등 적정 장비·기법 사용. 낙하·충격 방지.", "적정 소화기(가연성가스용 B급 등)를 접근 용이한 위치에 설치. 직원 사용법 교육 확인.", "용접공은 산소-아세틸렌 장비의 올바른 조작에 대해 교육받았는지 확인.", "절단/용접구역 주변 인클로저·방호벽으로 흄 확산 억제·통제.", "감독자가 절단작업을 정기적으로 모니터링하여 안전절차 준수 확인.", "산소·아세틸렌 실린더는 열원·가연물에서 떨어진 환기양호구역에 보관.", "용접공에게 스파크·고온강재 화상 방지용 추가 PPE(가죽·용접장갑, 용접헬멧/고글, 용접앞치마, 긴바지, 필요시 호흡기) 지급.", "절단 전 구조하중경로·취약점을 식별할 엔지니어 배정.", "가스절단 중 절단지점을 육안으로 지속 관찰할 전담 스포터 배정.", "메가폰·호루라기를 장착, 절단 중 구조파손 조짐 발견 시 맨리프트 오퍼레이터·작업자에게 경고.", "그래버로 절단 중인 구조부재를 지지.", "절단자-장비오퍼레이터 간 명확한 통신 유지."]}}, {"id": 23, "cat": "work", "title": {"en": "11. Lifting, Loading & Unloading", "ko": "11. 인양·상하차"}, "short": {"en": "Lifting/Loading/Unloading", "ko": "인양·상하차"}, "tools": ["Mobile crane", "Crawler crane", "Fork loader", "Forklift", "Lifting gears and accessories", "Trailer truck"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Crane/boom truck may tip over from improper setup, overloading, or unstable ground.", "ctrl": ["Approved special/common lifting plan secured before activity.", "Crane/boom truck on stable level surface, outriggers fully extended.", "Lifting accessories inspected, color coded, certified.", "Load charts available; operators know lifting capacity at various configurations.", "Barricade & lifting signage around radius before operation."]}, "ko": {"h": "부적절한 설치·과적·불안정 지반으로 크레인 전복", "ctrl": ["인양 전 승인된 리프팅 플랜 확보", "안정된 평지에 설치, 아웃리거 완전전개", "리프팅 부속 점검·컬러코드·인증", "하중표 확인, 오퍼레이터 용량 숙지", "작업 전 반경 주변 바리케이드·사이니지"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Loads not properly secured or shifting during lifting can fall, causing injuries or fatalities.", "ctrl": ["Appropriate lifting equipment (slings, chains, wire rope, shackles) in good condition rated for load.", "Tag lines on opposite sides for control.", "Watchman uses megaphone/siren during lifting.", "No personnel under suspended load at any time.", "Operators & riggers trained, competent, valid TPC.", "Crane operations stopped in high winds (≥10m/s) or heavy rain."]}, "ko": {"h": "결박 미흡·하중 이동으로 낙하 사고", "ctrl": ["적정 등급의 리프팅 장비 사용", "양쪽 태그라인으로 제어", "감시자 메가폰·사이렌 사용", "현수하중 아래 출입 금지", "오퍼레이터·리거 교육·TPC 확인", "풍속 10m/s 이상·폭우 시 작업중지"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Forklifts/fork loaders can hit people or objects, leading to serious injuries or property damage.", "ctrl": ["All operators properly trained, certified, valid TPC.", "Thorough pre-operation inspection per equipment checklist.", "Loads never exceed rated capacity, properly secured.", "Forks lowered to safe height when driving.", "Signal man assigned to guide moving/maneuvering/lifting."]}, "ko": {"h": "포크리프트 충돌로 중대 부상/재산피해", "ctrl": ["오퍼레이터 교육·TPC 확인", "작업전 점검 체크리스트 실시", "정격용량 초과 금지, 결박 확인", "주행 시 포크를 안전높이로 낮춤", "이동·인양 시 신호수 배치"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": false}, {"en": {"h": "Fork loader/forklift may tip over lifting heavy loads beyond capacity or on uneven surfaces.", "ctrl": ["Forklift kept on level ground, avoid slopes unless rated.", "Operators have adequate rest to maintain focus.", "Load kept within forklift's rated capacity.", "Forklift used only for intended purpose (never lift personnel).", "First aider & first aid kit on site."]}, "ko": {"h": "정격초과·불균일면에서 포크리프트 전복", "ctrl": ["평탄지면 유지, 비경사면만 운행", "오퍼레이터 충분한 휴식 확보", "정격용량 이내 적재", "용도 외 사용 금지(인원 인양 금지)", "응급처치자·구급함 비치"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": false}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Lifting Using Mobile Crane / Loading to Trailer", "ko": "모바일크레인 인양·트레일러 상차"}, "steps": {"en": ["Rigger attaches shackle to the lifting eye if applicable (choker or basket hitch optional).", "Rigger arranges sling belt, attaching it to the main hoist and the shackle.", "Rigger signals operator to slowly lift and stop to adjust and secure the fitting of the lifting belt.", "Then lift slowly but surely, and load onto trailer using the tag line to control the load."], "ko": ["해당 시 리거가 리프팅아이에 섀클 결속(초커/바스켓히치 선택 가능)", "리거가 슬링벨트를 메인호이스트-섀클에 연결", "리거가 오퍼레이터에게 서서히 인양 신호, 정지하여 슬링벨트 안전결속 조정", "이후 서서히 확실하게 인양, 태그라인으로 하중 제어하며 트레일러에 적재"]}}, {"title": {"en": "Unloading from Trailer Using Mobile Crane", "ko": "모바일크레인으로 트레일러 하차"}, "steps": {"en": ["Banksman installs wheel stopper into the trailer.", "Rigger attaches shackle to lifting eye (choker/basket hitch optional).", "Rigger arranges sling belt, attaching to main hoist/shackle.", "Rigger signals operator to slowly lift and stop for adjustment/secure fitting.", "Lift slowly but surely, unload using tag line to control the load."], "ko": ["뱅크스맨이 트레일러에 휠스토퍼 설치", "리거가 리프팅아이에 섀클 결속", "리거가 슬링벨트를 메인호이스트/섀클에 연결", "리거가 서서히 인양 신호, 정지하여 안전결속 조정", "서서히 확실하게 인양, 태그라인으로 하중 제어하며 하차"]}}, {"title": {"en": "Loading of Sandwich Panel to Open-Top Container Box Using Forklift/Fork Loader", "ko": "포크리프트로 샌드위치패널 오픈탑 컨테이너 상차"}, "steps": {"en": ["Position the forklift, approach the load slowly and squarely, forks wide apart for balance.", "Fully insert forks under the load, centered and evenly distributed.", "Raise the load just enough to clear obstacles, keeping it low for stability.", "If necessary, use straps or bindings to secure the load and prevent shifting.", "Slightly tilt the mast backward to further stabilize the load.", "Ensure clear line of sight; if load obstructs view, operate in reverse or use a spotter."], "ko": ["포크리프트를 화물에 서서히·정면으로 접근, 포크는 균형위해 넓게 벌림", "포크를 화물 아래 완전 삽입, 중앙·균등 배분", "장애물 통과할 만큼만 상승, 안정성 위해 낮게 유지", "필요 시 스트랩·결박으로 화물 고정, 이동 방지", "마스트를 살짝 후방경사하여 화물 추가 안정화", "시야 확보, 화물이 시야를 가리면 후진운전 또는 스포터 활용"]}}, {"title": {"en": "Transporting & Moving Load by Forklift/Fork Loader", "ko": "포크리프트로 화물 운반·이동"}, "steps": {"en": ["Drive slowly and carefully, maintaining safe speed especially when turning or on inclines.", "Make gradual starts, stops, and turns to prevent load shifting/falling."], "ko": ["회전·경사로에서 특히 안전속도 유지하며 서행·신중 운전", "급출발·급정지·급회전 없이 점진적으로 조작하여 하중 이동/낙하 방지"]}}, {"title": {"en": "Unloading by Forklift/Fork Loader", "ko": "포크리프트로 하차"}, "steps": {"en": ["Position the forklift, align with unloading area, path clear and level.", "Inspect the load to ensure it hasn't shifted during transport; assess safe unloading if it moved.", "Slowly lower the load to the ground, stable and secure.", "Ensure unloading area is free of obstacles and forklift can maneuver safely."], "ko": ["포크리프트를 하차구역에 정렬, 경로 확보·평탄 확인", "운반 중 화물 이동여부 점검, 이동 시 안전한 하차방법 판단", "서서히 지면에 하강, 안정적으로 배치", "하차구역 장애물 없음 및 안전한 조작 가능 확인"]}}], "fullControls": {"en": ["Secure approved special or common lifting plan prior to lifting activity", "Ensure the crane/ boom truck is set up on a stable and level surface, and outrigger fully extended as much as possible.", "Inspect all lifting accessories for any physical damage and ensure that it is colour coded and certified.", "Provide tag lines on opposite sides of the load to provide better control.", "Ensure load charts are available, and operators know the crane’s lifting capacity at various configurations (e.g., boom length / angle, radius).", "Adequate barricade and lifting operation signage must be provided around the lifting radius before operation.", "Use appropriate lifting equipment such as web slings, chains sling, wire rope sling, lifting frame and shackles that are in good condition and rated for the load's weight.", "Watchman shall use a megaphone with a siren to alert everybody that lifting is ongoing.", "Provide radio to the rigger and operator if necessary.", "Ensure there is no personnel standing/staying under the suspended load in any given time.", "Ensure operators & riggers are trained & competent, they must hold a valid TPC.", "Stop crane operations in adverse weather conditions such as high winds reaching 10 m/s or heavy rain.", "Secure loads with proper rigging techniques by a trained and competent rigger.", "Ensure that all operators are properly trained, certified, and with valid TPC.", "Refer to equipment checklist in conduct thorough pre operation inspections of the forklift/loader, checking for mechanical issues, hydraulic fluid, tire condition, lights, brakes, and safety features.", "Never exceed the forklift’s/loader’s rated load capacity. Ensure that all loads are properly secured to prevent shifting or falling during transport.", "Always lower the forks to a safe height when driving and keep the load as low as possible to maintain the forklift’s stability.", "Make sure the forklift is on level ground, and avoid operating on slopes unless the forklift is rated for such use.", "Assign signal man to guide the operator's in moving, maneuvering and lifting loads.", "Ensure that operators have adequate rest to maintain focus and alertness.", "Ensure the load is within the forklift's rated capacity.", "Use fork loader/forklift only for their intended purpose (e.g., lifting loads, transporting goods). Do not use forklifts to lift personnel or perform tasks that the forklift is not designed for.", "First Aider and first aid kit must be available on site"], "ko": ["인양작업 전 승인된 특수/일반 리프팅플랜 확보.", "크레인/붐트럭을 안정·평탄한 면에 설치, 아웃리거는 가능한 최대한 전개.", "전 리프팅부속의 물리적 손상 점검, 컬러코드·인증 확인.", "더 나은 제어를 위해 하중 양쪽에 태그라인 설치.", "하중표를 확보하고, 오퍼레이터가 다양한 구성(붐길이/각도, 반경)에서 크레인 인양능력을 숙지하는지 확인.", "작업 전 인양반경 주변 충분한 바리케이드·리프팅작업 사이니지 제공 필수.", "웹슬링, 체인슬링, 와이어로프슬링, 리프팅프레임, 섀클 등 양호상태이며 하중에 정격인 적정 리프팅장비 사용.", "감시자는 메가폰과 사이렌으로 인양작업 진행 중임을 전원에게 경고.", "필요 시 리거·오퍼레이터에게 무전기 지급.", "현수하중 아래 인원이 서있거나 머무는 것을 항시 금지.", "오퍼레이터·리거는 교육·역량 확인, 유효 TPC 보유 필수.", "풍속 10m/s 도달 강풍 또는 폭우 등 악천후 시 크레인 작업 중단.", "숙련·유자격 리거가 올바른 리깅기법으로 하중 고정.", "전 오퍼레이터가 적절히 교육·인증받고 유효 TPC 보유 확인.", "장비체크리스트 참조하여 포크리프트/로더의 철저한 작업전점검 실시, 기계결함, 유압유, 타이어상태, 조명, 브레이크, 안전장치 점검.", "포크리프트/로더의 정격하중용량 절대 초과 금지. 운송 중 이동·낙하 방지 위해 전 하중 적절히 고정 확인.", "운행 시 항상 포크를 안전높이로 낮추고, 안정성 유지 위해 하중을 최대한 낮게 유지.", "포크리프트가 평탄지면에 있는지 확인, 정격사용이 아닌 한 경사면 작동 회피.", "신호수를 배정하여 오퍼레이터의 이동, 기동, 인양작업 유도.", "오퍼레이터가 집중력·경계심 유지를 위해 충분한 휴식을 취하는지 확인.", "하중이 포크리프트 정격용량 이내인지 확인.", "포크로더/포크리프트는 본래 용도(하중인양, 화물운송 등)로만 사용. 포크리프트가 설계되지 않은 인원인양이나 작업에 사용 금지.", "응급처치자·구급함 현장 상시 비치."]}}, {"id": 24, "cat": "work", "title": {"en": "12. Use of Manlift", "ko": "12. 맨리프트 사용"}, "short": {"en": "Manlift Operations", "ko": "맨리프트 사용"}, "tools": ["Manlift", "Cordless drill", "Crow bar", "Pry bar", "Reciprocating saw", "Grinder", "Hammer"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Workers at risk of falling from height — bone dislocation, injury, or fatality.", "ctrl": ["Manlift inspected, TPC provided.", "Fall protection (guardrails, toe boards) & 100% tie-off compliance.", "Valid TPC of operator; banksman provided during activity.", "Manlift on level surface, avoiding steep slope beyond spec limit.", "Workers trained for working at height.", "Vertical lifeline used for long-duration manlift/scissor lift work."]}, "ko": {"h": "고소에서 추락 위험 — 골절, 부상, 사망", "ctrl": ["맨리프트 점검·TPC 확인", "추락방지 및 100% 체결 준수", "오퍼레이터 유효 TPC, 뱅크스맨 배치", "맨리프트는 평탄면, 급경사 금지", "고소작업 교육 이수", "장시간 작업 시 수직 라이프라인 사용"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Damaged/defective hand & power tools (impact drill, grinder, saw) pose cut/laceration risk from moving parts.", "ctrl": ["Power tools inspected with updated color-coding.", "Grinder RPM/disc compatibility ensured.", "Tools tied off to structure to prevent falling.", "Damaged tools removed from site; no homemade/fabricated tools allowed.", "Leather gloves, apron, leg guard, face shield used for cutting/grinding."]}, "ko": {"h": "손상된 수공구·동력공구로 열상 위험", "ctrl": ["동력공구 컬러코드 점검", "그라인더 RPM·디스크 호환성", "공구는 구조물에 결박(낙하방지)", "손상공구 반출, 자체제작 공구 금지", "절단·그라인딩 시 가죽장갑·앞치마·안면보호구"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Workers using manlift/ropes at risk of falling during AC condenser cable disconnection/unbolting.", "ctrl": ["Manlift stable, positioned on flat surface.", "Spotter assigned to monitor workers in manlift.", "Only trained competent manlift operator with valid TPC.", "Wind speed limit 7m/s observed."]}, "ko": {"h": "에어컨 콘덴서 배선 분리 중 추락 위험", "ctrl": ["맨리프트 안정·평탄면 배치", "맨리프트 내 작업자 모니터링 스포터 배치", "숙련·TPC 오퍼레이터만 운전", "풍속 7m/s 이하에서만 작업"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "AC condensers connected to electrical systems — failure to disconnect/isolate may result in electrocution; condenser may fall from improper hoisting.", "ctrl": ["System de-energized and LOTO applied before dismantling.", "Competent electrician conducts dead test before dismantling.", "Full body harness with lanyard anchored to bucket.", "Strong rope (Manila/PP) used, inspected for wear before use.", "Workers know exact condenser weight for rope/direct-load decision; SWL never exceeded."]}, "ko": {"h": "콘덴서 미절연 시 감전, 부적절한 인양으로 낙하", "ctrl": ["해체 전 탈전원·LOTO 적용", "숙련 전기기술자 dead test 실시", "전신하네스 버킷 앵커 고정", "마닐라·PP 로프 사용, 마모 점검", "콘덴서 중량 확인 후 SWL 초과 금지"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Overloading manlift can cause instability, tipping/collapse under extra weight — serious injury or property damage.", "ctrl": ["Equipment never overloaded beyond capacity in TPC/manual.", "Lift platform kept closed once entered; no climbing/leaning on guardrail.", "Manlift inspected for mechanical issues, stability, guardrails before use.", "Consider stopping work if wind reaches 7m/s."]}, "ko": {"h": "맨리프트 과적으로 불안정/전복", "ctrl": ["3rd party 인증·매뉴얼 용량 초과 금지", "탑승 후 플랫폼 폐쇄, 가드레일 등반/기댐 금지", "사용 전 기계적 결함·안정성·가드레일 점검", "풍속 7m/s 도달 시 작업중지 검토"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Dismantling of Roof & Wall Panels with Manlift", "ko": "맨리프트로 지붕·벽패널 해체"}, "steps": {"en": ["Use the manlift to elevate personnel to the panel's attachment points.", "Carefully unscrew or cut any fasteners securing the panel to the structure.", "Gently pry the panel away from the structure, ensuring it remains stable.", "If the panel is large/heavy, remove only some fasteners first to prevent falling, leaving a few temporarily to hold it in place while positioning for final removal.", "Carefully remove the last fasteners while supporting the panel; if large/heavy, have another person assist, or use a sling/lifting attachment.", "Place dismantled panels in a temporary storage area."], "ko": ["맨리프트로 인원을 패널 체결부까지 상승", "패널을 구조물에 고정하는 체결구를 신중히 풀거나 절단", "구조물에서 패널을 부드럽게 지렛대로 이완, 안정성 유지", "크고 무거운 패널은 낙하방지 위해 체결구 일부만 우선 제거, 최종 제거 위치조정 동안 몇 개는 임시로 남겨둠", "패널을 지지하며 마지막 체결구 제거, 크고 무거우면 2인 작업 또는 슬링/리프팅 부속 사용", "해체된 패널은 임시야적구역에 적재"]}}, {"title": {"en": "Removal of AC Condenser (Outdoor Unit)", "ko": "에어컨 실외기(콘덴서) 제거"}, "steps": {"en": ["Slowly raise the manlift to the level of the condenser unit.", "At the correct height, carefully detach the condenser unit from mounting brackets/platform.", "Remove and slowly place the condenser unit onto the manlift platform (only for units not exceeding 30kg).", "Slowly lower the condenser unit to the ground, ensuring it's placed on a stable surface."], "ko": ["콘덴서 위치까지 서서히 맨리프트 상승", "정확한 높이에서 마운팅브라켓/플랫폼에서 콘덴서 신중히 분리", "맨리프트 플랫폼에 서서히 이동배치(30kg 이하 콘덴서에 한함)", "서서히 지면으로 하강, 안정된 면에 배치"]}}, {"title": {"en": "Dismantling of Window Frame with Manlift", "ko": "맨리프트로 창틀 해체"}, "steps": {"en": ["Place the manlift so the platform is level with the window frame; ensure stable position and clear visibility.", "If the window has a removable sash, locate and disengage the release mechanism (unlock latches or remove screws).", "Carefully lift the sash out of the frame, avoiding damage to glass/surrounding materials.", "Use a pry bar or putty knife to gently remove interior trim around the frame, exposing fasteners.", "Using an appropriate screwdriver or drill, remove all screws/nails securing the frame.", "Use a utility knife to cut through caulking/sealant around the frame to loosen it from the wall.", "Insert a pry bar between the frame and the wall, gently working around the perimeter to detach; take care not to damage surrounding wall.", "Once detached, carefully lift the frame out; if large/heavy, get help from a second person.", "Lower the frame to the ground or place on a stable surface."], "ko": ["맨리프트를 창틀과 수평이 되도록 배치, 안정된 위치·시야 확보", "분리형 새시가 있으면 잠금장치 해제(래치 풀기 또는 나사 제거)", "프레임에서 새시를 조심스레 들어올려 유리·주변재 손상 방지", "프라이바/퍼티나이프로 내부트림을 부드럽게 제거하여 체결구 노출", "적정 드라이버/드릴로 프레임 고정 나사·못 전부 제거", "커터칼로 프레임 주변 코킹/실란트 절단하여 벽에서 이완", "프레임과 벽 사이에 프라이바를 삽입, 둘레를 따라 서서히 분리, 주변벽 손상 주의", "분리 후 신중히 프레임 들어올림, 크고 무거우면 2인 작업", "지면 또는 안정된 면에 하강"]}}, {"title": {"en": "Removal/Dismantling of Fixtures & Attaching Lifting Accessories with Manlift", "ko": "맨리프트로 부속물 철거·리프팅부속 부착"}, "steps": {"en": ["Place the manlift so the platform is level with the item to be dismantled.", "Carefully unscrew, remove (material), or attach (lifting accessories).", "Using an appropriate screwdriver or drill, remove screws/fasteners holding the fixture in place.", "As fasteners are removed, support the fixture to prevent it from falling.", "Lower the fixture to the ground and place it in temporary storage."], "ko": ["대상물과 수평이 되도록 맨리프트 배치", "신중히 풀거나 제거(자재) 또는 부착(리프팅부속)", "적정 드라이버/드릴로 고정 나사·체결구 제거", "체결구 제거 시 부속물 낙하방지 위해 지지", "부속물을 지면으로 하강, 임시야적구역에 배치"]}}, {"title": {"en": "Gas Cutting of Steel Members from Manlift", "ko": "맨리프트에서 강재부재 가스절단"}, "steps": {"en": ["Start cutting non-load-bearing members first (roof purlins, wall girts, cladding rails, bracing, stiffeners).", "For load-bearing members, support/hold using grabber while cutting (columns, beams, girders, trusses, structural braces).", "Begin cutting from outer sections inward, avoiding entrapment zones.", "Use controlled, progressive cuts and avoid sudden structural releases.", "Store dismantled steel sections in a temporary storage area with soft barricade."], "ko": ["비하중부재(지붕퍼린, 벽거트, 클래딩레일, 브레이싱, 스티프너)부터 절단 시작", "하중부재(기둥, 보, 거더, 트러스, 구조브레이스)는 절단 중 그래버로 지지", "외곽 구간부터 안쪽으로 절단, 협착구역 회피", "통제되고 점진적인 절단, 급격한 구조해방 회피", "해체된 강재는 임시야적구역·연질바리케이드에 보관"]}}, {"title": {"en": "Dismantling of High Ceiling Sandwich Panel (Retail Store & Recreation)", "ko": "고소 샌드위치패널 천장 해체 (상업시설·레크리에이션동)"}, "steps": {"en": ["Park beneath the first section of panel, preferably on corners.", "Secure harness to anchor point/lifeline system as required by site condition.", "Raise the manlift platform to working height, ensuring adequate head clearance and stable position to access the panel safely.", "Inspect panel edges and locate fasteners; for a 6-meter panel, expect approximately three screws/bolts evenly spaced along the edge.", "Using an impact drill, remove fasteners in sequence: first unscrew the two fasteners at both ends of the panel, then remove the center fastener last to maintain stability during removal.", "Starting from the center joint, use a pry bar to gently disengage the panel from adjacent panels.", "Maintain a minimum distance of 0.40 meters from the panel edge while prying to reduce risk of the panel hitting the platform or worker, causing sudden movement.", "Once loosened, allow the panel to fall directly and vertically to the ground in a controlled drop zone clear of personnel and obstructions.", "Never attempt to catch or hold falling panels from the manlift.", "Remove the panel that fell on the ground.", "Move the manlift to the next section."], "ko": ["패널 첫 구간 아래, 가급적 모서리쪽에 정차", "현장조건에 따라 앵커포인트/라이프라인시스템에 하네스 결속", "작업높이까지 맨리프트 상승, 충분한 상부여유·안정된 자세로 패널 접근", "패널 가장자리 점검, 체결구 위치 확인(6m 패널 기준 약 3개 나사/볼트 균등배치)", "임팩트드릴로 체결구를 순서대로 제거: 양쪽 끝단 나사 먼저 풀고, 안정성 유지 위해 중앙 체결구는 마지막에 제거", "중앙 이음부부터 프라이바로 인접패널과 부드럽게 분리", "프라이 작업 중 패널 가장자리에서 최소 0.40m 거리 유지(급낙하로 플랫폼·작업자 타격 위험 감소)", "이완되면 인원·장애물 없는 통제된 낙하구역으로 패널을 수직으로 낙하시킴", "맨리프트에서 낙하하는 패널을 절대 손으로 받거나 잡지 말 것", "지면에 낙하한 패널 제거", "다음 구간으로 맨리프트 이동"]}}], "fullControls": {"en": ["Ensure manlift is inspected and TPC provided.", "Ensure fall protection (guard rails, toe boards, false upright, etc.) and comply 100% tie off.", "Valid TPC of operator, Banksman to be provided while carrying out the activity.", "Put the manlift on a level surface so it won’t shift and potentially trip over or cause fall to avoid steep slope that exceeds manufacturer specified limit.", "Workers must be trained for working at height and other basic training.", "Don't operate the equipment in high winds above 7m/s those recommend in the BNPP site.", "Vertical life line should be use when using manlift/ scissor lift for long time.", "A pre operation inspection checklist of MEWP should be done with the operator.", "Stopper and Barrier, signage should be provided around the manlift and assign banksman.", "All tools should be secured with a tie or kept in a safe area.", "Keep the lift platform closed after you enter it. Don’t climb on or lean on the guardrail", "Do not overload the equipment above its capacity mentioned in 3rd party certificate and manlift manual.", "Use a full body Harness with a lanyard attached to the anchorage point in the bucket.", "Ensure all power tools are inspected and with updated color-coding sticker", "Ensure grinder rpm and cutting/grinding disc are compatible to the power tools", "Inspect the tools for uneven or abnormal wear, as this may indicate that the tool holder is damaged.", "Power tools should be unplugged from the power source when not in use.", "First Aider and first aid kit must be available on site", "Hand tools used in the activity shall be tied off with the structure to avoid tools falling during working.", "The damaged tools must be removed from the site.", "Do not allow to use homemade or fabricated hand tools", "Use hand tools holster or belt to make sure that tools will not fall during activity", "Use appropriate leather gloves, apron, leg guard and face shield for cutting and grinder.", "Ensure that the manlift is stable and positioned properly on a flat surface.", "Assign a spotter to monitor workers in the manlift.", "Only trained and competent manlift operator with valid TPC is allowed to operate the manlift.", "Ensure Manlift is inspected and TPC provided.", "Don't operate the equipment in high winds above 7m/s those recommend in the BNPP site.", "A pre operation inspection checklist of manlift should be done with the operator.", "Stopper and Barrier, signage should be provided ": 2, "r2": 4, "res": "M", "ptw": false}, {"en": {"h": "Workers may fall from scaffolding platform while covering the trailer box.", "ctrl": ["Full body harness with lanyards anchored to adequate point when near edges.", "Driver outside truck, hand brake engaged, wheel stopper installed while covering."]}, "ko": {"h": "트레일러박스 커버링 중 스캐폴딩 플랫폼에서 추락", "ctrl": ["가장자리 작업 시 전신하네스 앵커 고정", "커버링 중 운전자는 트럭 밖, 핸드브레이크·휠스토퍼 적용"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Unsecured/unstable debris may fall off loader or trailer, risking operators/personnel.", "ctrl": ["Materials secured with proper restraints (straps/covering).", "Personnel kept out of danger zone around loader/trailer.", "Competent banksman controls dump truck movement with whistle.", "Only competent licensed driver operates vehicle; speed limit followed.", "Load covered with tarps if required."]}, "ko": {"h": "결박 미흡한 파쇄물 낙하로 위험", "ctrl": ["적정 결박(스트랩·덮개) 사용", "로더·트레일러 주변 위험구역 접근 통제", "뱅크스맨이 호루라기로 이동 통제", "유자격 면허 운전자만 운행, 제한속도 준수", "필요 시 타포린으로 적재물 덮음"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": false}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Lifting & Transporting Material Using Forklift/Fork Loader", "ko": "포크리프트로 자재 인양·운반"}, "steps": {"en": ["Slightly lift the fork inward to secure the load near the center of gravity, keep it as low as possible.", "Once positioned and ready to move, transport the material carefully, slowly, at controlled speed.", "While moving, continuously monitor the load/surroundings, adjust the mast as needed when safety may be compromised.", "When reaching destination, engage forklift brakes before lowering the fork slowly until the load fully rests on the ground; ensure forks are clear before backing away.", "Remove/withdraw the fork by slowly and carefully reversing to disengage from the load; visually check the load is stable and properly placed."], "ko": ["포크를 살짝 안쪽으로 들어 무게중심 근처에서 화물 고정, 최대한 낮게 유지", "위치 확정 후 신중하게 서행·통제된 속도로 운반", "이동 중 화물·주변을 지속 모니터링, 안전위협 시 마스트 조정", "목적지 도착 시 브레이크 체결 후 포크를 서서히 하강시켜 화물이 완전히 지면에 안착, 후진 전 포크가 화물에서 벗어났는지 확인", "서서히 신중하게 후진하여 포크를 화물에서 분리, 화물이 안정적으로 배치됐는지 육안 확인"]}}, {"title": {"en": "Loading of Scrap Items Using Grabber or Wheel Loader", "ko": "그래버·휠로더로 스크랩 상차"}, "steps": {"en": ["Scrap pipes, sandwich panel, steel, wood and plastic can be loaded to the trailer using grabber or wheel loader."], "ko": ["스크랩 배관, 샌드위치패널, 강재, 목재, 플라스틱은 그래버 또는 휠로더로 트레일러에 상차"]}}, {"title": {"en": "Loading & Transporting Materials Using Trailer Truck", "ko": "트레일러트럭으로 자재 상차·운반"}, "steps": {"en": ["Position the truck into the designated and correct position.", "Ensure the truck is on a level surface.", "Choke the wheel with a stopper/wedge to avoid movement.", "Check the truck bed is free from obstruction and has no damaged sections/parts.", "Check the material/load doesn't exceed truck load capacity before loading.", "Load the material onto the truck bed and ensure weight is equally distributed, especially for asymmetrical/irregularly shaped loads.", "Provide and use bed support, pads or wedges to lock and ensure material doesn't move during travel.", "Secure the load by lashing at strategic points/locations to ensure it's tightly secured."], "ko": ["지정된 정위치에 트럭 배치", "트럭이 평탄한 면에 있는지 확인", "휠스토퍼/쐐기로 이동 방지", "적재함에 장애물·손상 없는지 확인", "상차 전 자재가 트럭 적재용량을 초과하지 않는지 확인", "적재함에 자재 적재, 특히 비대칭·불규칙 형상은 무게 균등분산 확인", "베드서포트·패드·쐐기로 운송 중 이동 방지 고정", "전략적 지점을 결속하여 화물이 견고히 고정되도록 조치"]}}, {"title": {"en": "Covering the Trailer Box / Dump Truck", "ko": "트레일러박스/덤프트럭 덮개작업"}, "steps": {"en": ["Use the scaffolding platform to access the trailer box located in Encheon Camp.", "Ensure trailer truck is choked by wheel stopper before accessing the trailer box.", "Carefully access the trailer box slowly; begin to unroll the tarpaulin/mesh from the truck head to the rear; drop ropes/straps around the trailer box.", "The driver on the ground does the tie-down, using heavy duty ropes/straps to secure the edges, starting at one end and working around the sides.", "Check the tarpaulin/mesh fully covers the dump truck with no gaps that could lead to spillage; ensure covering is large enough to cover the box completely.", "Double check the tightness of all straps and ropes to be secure enough to prevent wind/movement from dislodging it.", "Submit the loaded trailer truck to the HSJV in-charge person for post-inspection through the Heavy Vehicles Inspection Checklist."], "ko": ["엔천캠프 소재 스캐폴딩 플랫폼으로 트레일러박스 접근", "박스 접근 전 휠스토퍼로 트레일러 고정 확인", "서서히 신중하게 접근, 타포린/메쉬를 트럭 앞에서 뒤쪽으로 전개, 박스 주변에 로프/스트랩 걸어두기", "지상 운전자가 중량 로프/스트랩으로 가장자리부터 순차적으로 결박", "타포린/메쉬가 완전히 덮여 유출틈 없는지 확인, 박스 전체를 덮을 만큼 충분한지 확인", "전 스트랩·로프 조임상태 재확인(바람·이동에 풀리지 않도록)", "적재 완료된 트레일러트럭을 HSJV 담당자에게 제출, 대형차량점검체크리스트로 사후검사"]}}], "fullControls": {"en": ["Perform pre use inspections and regular maintenance of all equipment to ensure they are in good working condition.", "Ensure all equipment are in good working condition.", "Pre check the trailer or dump truck as per Heavy Vehicle (Temporary Short Term) Inspection Checklist (Daily) before going out for each load", "Ensure the inspections and repairs every 3 months to catch potential problems early.", "In case of breakdown, have an inside BNPP mechanic inspect the vehicle/equipment onsite.", "Determine if repairs can be done onsite or if parts are needed from elsewhere.", "If unsafe to travel, arrange for repairs onsite or bring necessary resources to the location.", "Supervisor/foreman should conduct pre job meeting before start to work.", "All trailer / container condition must be inspected weekly.", "When Transport material makes sure to follow time schedule from HSE", "Operate the wheel loader/excavator slowly and smoothly to avoid sudden movements that could cause tipping.", "Use full body harness with lanyards anchored to an adequate anchor point if working near edges.", "While a worker is covering the trailer box, ensure that the driver is outside the truck, hand break is engaged and wheel stopper is installed to avoid sudden movement of the truck.", "Secure materials on the loader and trailer with proper restraints (straps or covering) to prevent debris from falling.", "Keep personnel out of the danger zone (the area around the loader and trailer).", "Provide competent banksman to control the movement of dump truck in the workplace", "Banksman or signalman must be equipped with a whistle to alarm or to warn common people when they get near a moving equipment.", "All materials loaded vehicles must secure Heavy Vehicle Inspection Checklist, to be checked and approved by HSJV HSE.", "Use the appropriate vehicle for the task having the correct capacity to carry the load.", "Ensure that the transport vehicle is well maintained and inspected regularly", "Only competent driver with valid license will be allowed to drive the vehicle.", "Always follow the allowable speed limit.", "Use straps, chains, or other securing methods to ensure that the load is stable and won’t move during transport.", "If required, cover the load with tarps to prevent debris from falling off and to protect items from weather"], "ko": ["전 장비의 사용전점검 및 정기정비 실시하여 양호작동상태 확인.", "전 장비 양호작동상태 확인.", "매 운반 출발 전 대형차량(임시단기)점검체크리스트(일일)로 트레일러/덤프트럭 사전점검.", "조기 문제파악 위해 3개월마다 점검·수리 실시.", "고장 시 BNPP 내부 정비사가 현장에서 차량/장비 점검.", "현장수리 가능 여부 또는 타 지역 부품 필요 여부 판단.", "이동이 안전하지 않을 경우 현장수리 준비 또는 필요자원 현장반입.", "작업 시작 전 감독자/작반장이 사전작업회의 실시.", "전 트레일러/컨테이너 상태는 매주 점검 필수.", "자재 운반 시 HSE 배정 일정 준수 확인.", "전복 유발 급격한 움직임 방지 위해 휠로더/엑스카베이터를 서행·완만하게 조작.", "가장자리 인근 작업 시 적정 앵커포인트에 결속된 전신하네스 사용.", "작업자가 트레일러박스 덮개작업 중 운전자는 트럭 밖에 대기, 핸드브레이크 체결, 휠스토퍼 설치하여 트럭의 갑작스러운 이동 방지.", "로더·트레일러 상 자재는 적정 결속(스트랩·덮개)으로 낙하 방지.", "위험구역(로더·트레일러 주변)에 비인가자 접근 통제.", "작업장 내 덤프트럭 이동 통제를 위한 숙련 뱅크스맨 배치.", "뱅크스맨/신호수는 호루라기를 지참하여 이동장비 접근 시 일반인에게 경보/경고.", "자재 적재된 차량은 대형차량점검체크리스트 확보, HSJV HSE 점검·승인 필수.", "작업에 맞는 적정 용량의 차량 사용.", "운송차량이 잘 정비되고 정기점검 받는지 확인.", "유효면허 보유한 숙련 운전자만 차량 운전 허용.", "허용 제한속도 항상 준수.", "스트랩, 체인 등 결속수단 사용하여 운송 중 하중 안정·고정 확인.", "필요 시 타포린으로 하중을 덮어 낙하 방지 및 기상으로부터 보호."]}}, {"id": 28, "cat": "work", "title": {"en": "16. Dismantling, Removal & Reinstallation of Temporary Safety Facility", "ko": "16. 임시안전시설 해체·제거·재설치"}, "short": {"en": "Temporary Safety Facility Dismantle/Reinstall", "ko": "임시안전시설 해체·제거·재설치"}, "tools": ["Manhole key", "Crow bar", "Sledge hammer", "Hammer"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Hand injury from sharp edges or pinch points (manhole cover opening/reinstallation).", "ctrl": ["Temporary Safety Facility dismantle/reinstall request approved by HSJV construction.", "Workers trained in proper manual handling.", "Proper lifting technique practiced (close stance, feet shoulder-width, bend hips/knees, straight back)."]}, "ko": {"h": "맨홀커버 개폐 중 날카로운 부위·협착으로 손 부상", "ctrl": ["해체·재설치 신청서 HSJV 건설팀 승인", "수동취급 교육 이수", "올바른 인양자세(다리간격, 무릎굽힘, 등 곧게)"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": true}, {"en": {"h": "Falling from height through open manhole or inadequate barricade — serious injury or fatality.", "ctrl": ["Barricade & signage provided whenever manhole/grating cover opened.", "Secondary barricade/barrier provided when removing existing barrier, with clear warning signs."]}, "ko": {"h": "무방호 맨홀·부실 바리케이드로 추락, 중대부상/사망", "ctrl": ["맨홀·그레이팅 개방 시 바리케이드·사이니지 설치", "기존 방호물 제거 시 2차 바리케이드 및 경고표지"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Falling from weak/incorrectly installed anchorage point that may fail under load.", "ctrl": ["Lifeline system installed only by qualified scaffolder, inspected by competent inspector/engineer per HSE standards.", "Anchor points identified, capable of supporting 2450kg per person."]}, "ko": {"h": "부실 설치된 앵커포인트 파손으로 추락", "ctrl": ["라이프라인은 유자격 스캐폴더만 설치, 인증 검사관·엔지니어 점검", "앵커포인트는 인당 2450kg 지지력 확보"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Opening & Reinstallation of Manhole Cover", "ko": "맨홀커버 개방·재설치"}, "steps": {"en": ["Place the manhole key, hook or pry bar into the lifting slot/edge of the cover (some manholes have a built-in handle openable directly by two people).", "Raise the cover gradually, maintaining control to prevent it from falling back.", "Lay the cover flat on the ground away from the manhole opening to prevent it from rolling or causing tripping hazards.", "Install barricade, signage & flashing light if necessary, if the task requires time.", "Once the task is finished, carefully reinstall the cover using the manhole key, hook, pry bar, or directly by lifting the cover handle."], "ko": ["맨홀키·후크·프라이바를 커버의 리프팅 슬롯/가장자리에 삽입(일부 맨홀은 2인이 직접 여는 내장핸들 있음)", "커버를 서서히 들어올리며 되떨어짐 방지 위해 통제 유지", "맨홀 개구부에서 떨어진 지면에 커버를 평평히 눕혀 구름/걸림 방지", "작업이 장시간 소요될 경우 바리케이드·사이니지·경광등 설치", "작업 완료 후 맨홀키·후크·프라이바 또는 핸들을 직접 들어 신중히 재설치"]}}], "fullControls": {"en": ["Secure Temporary Safety Facility dismantle and reinstall request approved by HSJV construction.", "Workers must be trained on proper manual handling training.", "Practice proper lifting techniques:", "1. Standing as close to the load as possible.", "2. Planting your feet shoulder width apart with one foot slightly ahead of the other.", "3. Bending at the hips and knees only until you're deep in a squatting position.", "4. Keep your head up and straight with your shoulders back to keep your back straight.", "Provide barricade and signage when you open any manhole or grating cover.", "Provide secondary barricade or barrier when removing an existing barrier. Provide clear warning sign must be installed.", "Lifeline system must be installed only by a qualified scaffolder and inspected by competent scaffolding inspector and engineer to ensure lifeline system design complies with HSE standards.", "Identify anchor points and must be capable of supporting 2450 kg per person."], "ko": ["임시안전시설 해체·재설치 신청을 HSJV 건설팀 승인받아 확보.", "작업자는 올바른 수동취급 교육 이수 필수.", "올바른 인양기법 준수:", "1. 하중에 최대한 가까이 서기.", "2. 발을 어깨너비로 벌리고 한쪽 발을 약간 앞에 두기.", "3. 깊은 스쿼트 자세가 될 때까지 엉덩이·무릎만 굽히기.", "4. 등을 곧게 유지하기 위해 고개를 들고 어깨를 뒤로 젖히기.", "맨홀이나 그레이팅커버 개방 시 바리케이드·사이니지 제공.", "기존 방호물 제거 시 2차 바리케이드/배리어 제공. 명확한 경고표지 설치 필수.", "라이프라인시스템은 유자격 스캐폴더만 설치, 숙련 스캐폴딩검사관·엔지니어가 검사하여 HSE 기준 부합 설계 확인.", "앵커포인트를 식별하고 인당 2450kg 지지력 확보 필수."]}}, {"id": 111, "cat": "general", "title": {"en": "Emergency Rescue Plan", "ko": "비상구조계획"}, "short": {"en": "Emergency Rescue Plan", "ko": "비상구조계획"}, "tools": [], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Lack of training may cause delay/late response to emergency, resulting in fatality or property damage.", "ctrl": ["Emergency rescue plan available and understood by all operatives.", "Rescue equipment available (tripod, electric mini winch, full body harness, spine board, fold-away stretcher as needed).", "All operatives know Emergency Hotline (800 7 999).", "Site clinic notified with full injury circumstance details.", "Emergency transport to clinic available at all times.", "Rescue/first aid personnel trained for confined space emergencies.", "First aid kit & fire extinguisher available and accessible at all times.", "Rescue leader/coordinator designated for emergency control.", "Suspended person in harness must be rescued within 15 minutes to avoid suspension trauma."]}, "ko": {"h": "훈련 부족으로 비상대응 지연, 사망/재산피해 위험", "ctrl": ["전 작업자가 비상구조계획 숙지", "구조장비(트라이포드, 전동윈치, 전신하네스, 스파인보드, 접이식들것) 비치", "전 작업자 비상핫라인(800 7 999) 인지", "현장 클리닉에 상세 상황 통보", "클리닉 비상이송 상시 확보", "구조·응급처치 인력 밀폐공간 비상훈련 이수", "구급함·소화기 상시 비치, 접근성 확보", "비상상황 통제할 구조리더 지정", "현수구조자는 15분 이내 구조(현수외상 방지)"]}, "ls": 3, "cs": 3, "r1": 9, "ls2": 1, "cs2": 3, "r2": 3, "res": "L", "ptw": false}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [], "fullControls": {"en": ["Emergency rescue plan must be available and understand by all operatives.", "Emergency Rescue equipment required must be available such as Tripod, Electric Powered Mini Winch, full body harness, and spine board and fold away stretcher depending on the needs. (Tripod & electric winch shall be used where stretcher not applicable to use.)", "All operatives must know the Emergency contact number (800 7 999) and knows how to report an emergency situation.", "Site clinic should be notified by mobile phone and provided with full information on the circumstances of the injury including any exposure to toxic substances.", "Emergency transportation to site clinic must be available all the time.", "Rescue and first aid personnel must be well trained in an emergency situation inside a confined space.", "First Aid kit and fire extinguisher must be available at all times and very accessible to all operatives.", "Communication equipment should be available to rescuers such as two-way radio, mobile phone, and megaphone and whistle whatever is practicable.", "A rescue leader or coordinator must be designated to take control in an emergency situation.", "Emergency evacuation route must be available and mentioned clearly in an emergency plan.", "All rescuers must be aware that a suspended person in a harness in a retrieval operation must be rescued within 15 minutes to avoid suspension trauma"], "ko": ["비상구조계획을 전 작업자가 확보·숙지 필수.", "필요 구조장비(트라이포드, 전동미니윈치, 전신하네스, 스파인보드, 접이식들것) 상황에 맞게 확보. (들것 사용 불가 상황엔 트라이포드·전동윈치 사용)", "전 작업자는 비상연락처(800 7 999) 및 비상상황 신고방법 숙지 필수.", "현장클리닉에 휴대폰으로 통보, 유해물질 노출 포함 부상상황 전체정보 제공.", "클리닉으로의 비상이송 상시 확보.", "구조·응급처치 인력은 밀폐공간 내 비상상황에 대해 충분히 훈련받아야 함.", "구급함·소화기는 상시 비치, 전 작업자가 쉽게 접근 가능해야 함.", "구조자용 통신장비(무전기, 휴대폰, 메가폰, 호루라기 등) 실행가능한 범위에서 확보.", "비상상황 통제를 위한 구조리더/코디네이터 지정 필수.", "비상대피동선을 확보하고 비상계획에 명확히 명시.", "하네스 착용 중 인양작업으로 매달린 인원은 현수외상 방지 위해 15분 이내 구조되어야 함을 전 구조자가 인지."]}}, {"id": 112, "cat": "general", "title": {"en": "Working at Height", "ko": "고소작업"}, "short": {"en": "Working at Height", "ko": "고소작업"}, "tools": [], trigger bracings placed at each corner where practicable.", "Safety harness/tool belt worn at all times, 100% tie-off enforced."]}, "ko": {"h": "이동식 스캐폴드 사용 중 급격한 움직임으로 균형상실 추락", "ctrl": ["이동식 스캐폴드는 평탄지면에서만 이동", "휠은 각 모서리에 정확히 고정", "강풍 시 이동식 스캐폴드 이동 금지", "사용 중 캐스터 브레이크 적용", "가능한 각 모서리에 아웃리거 브레이싱 설치", "안전벨트·공구벨트 상시 착용, 100% 체결"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [], "fullControls": {"en": ["Conduct daily tool box talk discussing hazards and safety precautions in the workplace.", "Use full body harness (100% tie off) during working at height", "Ensure that all workers who will perform work at height have sufficient training.", "Safe access and working platform to be provided for work areas at height.", "The scaffolding system should be erected and capable of withstanding the required intended load.", "Scaffolds must be inspected and with updated scaffold tag to be updated every 7 days.", "All tools & materials should be securely tied off to structure or tool belt.", "Edge protection must be provided to all areas where a fall of 1.8 meter is possible.", "Working at height training to be completed by all workers prior to use of any scaffold.", "Do not alter or modify scaffolding without permission from scaffolding supervisor.", "Provide protection on the base of the of scaffold using hard barricade and to eliminate the risk of nearby workers being hit by falling materials from above.", "Only certified scaffolder is allowed to do scaffolding work", "Ensure scaffold tag is completed with all essential details.", "Ensure that scaffold has been erected in compliance with the manufacture’s specification or the design drawings provided by the design team.", "Ladder must be inspected and in good condition.", "Maintain 3-point contact while using a ladder.", "Regularly clean the ladder and remove mud or other slippery materials that may cause slipping.", "Mobile scaffolds shall only be moved on firm and levelled surfaces", "Wheels will be used which suit the size and loading of the scaffold. They must be fixed to each extreme corner of the base of the mobile scaffold and secured so that they cannot fall out when tower is moved.", "Never move the mobile scaffold on windy condition.", "Apply the caster wheel brakes while the mobile scaffold in use.", "Ensure that the working platform and surrounding area adequately protected from falling debris / objects.", "Safety harness and tool belt should always be worn at all times while working at height & proper anchorage of safety hook must be strictly observed (100% tie off).", "Outrigger bracings shall be placed at each corner of mobile scaffolding where ever practicable."], "ko": ["매일 툴박스토크로 작업장 위험요소·안전주의사항 논의.", "고소작업 중 전신하네스(100% 체결) 사용.", "고소작업 수행 전 작업자 충분한 교육 이수 확인.", "고소작업구역에 안전한 접근로·작업발판 제공.", "스캐폴딩시스템은 요구되는 예상하중을 견딜 수 있도록 조립.", "스캐폴드는 점검받고 7일마다 최신 스캐폴드태그로 갱신 필수.", "전 공구·자재는 구조물이나 공구벨트에 견고히 결박.", "1.8m 추락 가능구역 전체에 가장자리방호 제공 필수.", "스캐폴드 사용 전 전 작업자 고소작업 교육 이수 필수.", "스캐폴딩감독자 승인 없이 변경·개조 금지.", "스캐폴드 기초부에 경질바리케이드로 방호 제공, 위에서 떨어지는 자재로 인근 작업자 타격위험 제거.", "인증 스캐폴더만 스캐폴딩 작업 허용.", "스캐폴드태그는 필수정보 전체 포함하여 작성 확인.", "스캐폴드가 제조사 사양 또는 설계팀 제공 도면에 맞게 조립됐는지 확인.", "사다리는 점검받고 양호상태 확인.", "사다리 사용 중 3점 접촉 유지.", "사다리를 정기적으로 청소하고 미끄러움 유발 진흙 등 이물질 제거.", "이동식 스캐폴드는 견고·평탄한 면에서만 이동.", "스캐폴드 크기·하중에 맞는 휠 사용. 이동식 스캐폴드 기초 각 모서리에 고정, 이탈 방지 확보 타워 이동 시.", "강풍 상황에서 이동식 스캐폴드 이동 절대 금지.", "이동식 스캐폴드 사용 중 캐스터휠 브레이크 적용.", "작업발판·주변구역이 낙하 잔해/물체로부터 적절히 방호되는지 확인.", "고소작업 중 안전벨트·공구벨트는 항상 착용, 안전고리의 적절한 결속을 엄격히 준수(100% 체결).", "가능한 경우 이동식 스캐폴드 각 모서리에 아웃리거 브레이싱 설치."]}}, {"id": 113, "cat": "general", "title": {"en": "Working Inside a Confined Space", "ko": "밀폐공간 작업"}, "short": {"en": "Confined Space Work", "ko": "밀폐공간 작업"}, "tools": [], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Oxygen deficiency may cause loss of consciousness or death when entering a confined space.", "ctrl": ["All w ed operator & rigger with license and 3rd party certified are allowed to work", "Weather condition (wind speed, rainfall, sand storm) parameter translated into flag system, transport allowed at 50 meters visibility, & maximum wind speed of 15 m/sec", "Obey & follow site speed limit of 20 km/hr.", "Ensure route for pedestrian and vehicles identified and have separate", "Pedestrians to use designated walkways.", "Audible alarm & flashing amber lights to be fitted to heavy vehicles which operate automatically when reverse gear is selected.", "Certified banksman is to be provided to supervisor and control the movement of vehicle and equipment.", "Ensure as is reasonably practicable, a designated walkway & routes are provided for pedestrians.", "Pedestrian’s walkways shall be clearly marked with signage’s and with reasonably practicable, protected with hard barricade", "Ensure materials are well arranged, secured with ties/ lashing and balanced to avoid falling of materials or loosening of ties/ lashing", "Use waste skips / covered containers for materials.", "Operators and drivers have TPC and License to operate.", "All operatives must attend the HSJV manual handling training.", "Train all workers in safe lifting, carrying, and handling techniques (e.g., bend your knees, not your back).", "Use mechanical aids as much as possible, like loader lift, forklift, jack pallet, wheel barrow, trolley et. al."], "ko": ["배송기사는 교통관리 관련 HSE 브리핑/오리엔테이션 대상. 현장배치도, 지정경로, 속도제한 포함.", "인수증 기준 하중에 따라 트레일러 적재용량 확인.", "화물이 트레일러에 견고히 고정되도록 확인(목재받침, 슬링 등).", "면허·3rd party 인증받은 유자격 오퍼레이터·리거만 작업 허용.", "기상조건(풍속, 강우, 모래폭풍)을 깃발시스템으로 변환, 가시거리 50m 이상·최대풍속 15m/s에서만 운반 허용.", "현장 제한속도 20km/h 준수.", "보행자·차량 동선을 구분하여 식별.", "보행자는 지정 통로만 사용.", "후진기어 선택 시 자동으로 작동하는 가청경보·황색경광등을 중장비에 장착.", "인증 뱅크스맨을 배치, 감독자에게 보고하며 차량·장비 이동 통제.", "합리적으로 가능한 범위에서 보행자 전용 지정통로·동선 제공.", "보행자 통로는 사이니지로 명확히 표시, 가능하면 경질 바리케이드로 보호.", "자재는 타이/래싱으로 정리·결박·균형 유지하여 낙하나 결속 풀림 방지.", "자재용 폐기물 스킵/덮개있는 컨테이너 사용.", "오퍼레이터·운전자는 TPC 및 운전면허 보유.", "전 작업자는 HSJV 수동취급 교육 이수.", "전 작업자에게 안전한 인양·운반·취급 기법 교육(예: 등이 아닌 무릎을 굽힐 것).", "가능한 기계보조기구(로더리프트, 포크리프트, 잭팔레트, 손수레, 트롤리 등) 사용."]}}, {"id": 1014, "cat": "work", "title": {"en": "3. Utility Disconnection (LOTO) — Electricity, Water, Telecom, Fire Alarm & Sewage", "ko": "3. 유틸리티 차단(LOTO) — 전기·급수·통신·화재경보·오수"}, "short": {"en": "Utility Disconnection (LOTO)", "ko": "유틸리티 차단(LOTO)"}, "tools": ["Multi-tester", "Clamp ammeter", "Cable cutter", "Wrenches", "Spanner", "Pliers"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Direct contact with live wires/components during isolation can cause serious injury or death.", "ctrl": ["Site survey to identify service utilities before isolation.", "Updated drawings for utility identification (incl. underground).", "Power isolated via LOTO before work begins.", "Only competent, certified electrician does electrical work.", "All cables treated as live unless confirmed isolated by HSJV LOTO team.", "Dead test performed after isolation (100% no electricity)."]}, "ko": {"h": "절연 중 활선 접촉 시 중대 부상 또는 사망", "ctrl": ["절연 전 유틸리티 식별 현장조사", "최신 도면으로 유틸리티 확인(UG 포함)", "작업 전 LOTO로 전원 절연", "유자격 전기기술자만 작업", "HSJV LOTO팀 확인 전까지 활선으로 간주", "절연 후 dead test 실시(100% 무전기 확인)"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Accidental splash during isolation of potable/firewater/sewage line may cause eye injury.", "ctrl": ["Energy isolation points verified against updated drawings & site condition.", "Lock/close valves per updated approved drawing (electrical, firewater, alarm, telecom, potable, sewage).", "Inform Fire Team if alarm connected to fire control room.", "Turn off/disconnect fire pump/jockey pump before LOTO.", "Drain sprinkler/firewater line, verify isolation (pressure gauge zero)."]}, "ko": {"h": "급수·소방수·오수 라인 절연 중 튐으로 눈 부상", "ctrl": ["도면·현장상태 대조로 에너지 절연점 확인", "승인도면에 따라 밸브 잠금", "화재경보 연결 시 소방팀 통보", "LOTO 전 소화펌프·조키펌프 차단", "스프링클러 라인 배수, 압력게이지 0 확인"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Grinder-generated flying metal particles/sparks during firewater pipe cutting may cause eye injury/skin burns.", "ctrl": ["Fire alarm panel confirmed off before demolition.", "Firewater valve closed before pipe cutting.", "Grinder/disc/power cord checked for damage before use.", "Correct disc RPM rating & updated color-coding sticker.", "Barricades & warning signs in place before work.", "Respiratory mask & disposable coverall provided."]}, "ko": {"h": "그라인더 절단 중 비산 금속입자·스파크로 눈·피부 화상", "ctrl": ["철거 전 화재경보판넬 OFF 확인", "배관 절단 전 소방수 밸브 차단", "사용 전 그라인더·디스크·전선 손상 점검", "적정 RPM 디스크·컬러코드 확인", "작업 전 바리케이드·경고표지 설치", "방진마스크·일회용 커버올 지급"]}, "ls": 3, "cs": 3, "r1": 9, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Direct contact with cement (mortar plugging of sewage pipe) can cause skin irritation.", "ctrl": ["Check for leakage after end cap installation.", "Workers wash hands/exposed skin thoroughly after handling.", "Additional PPE (respiratory mask, disposable coverall) provided."]}, "ko": {"h": "오수관 모르타르 패킹 중 시멘트 접촉으로 피부자극", "ctrl": ["엔드캡 설치 후 누수 점검", "취급 후 손·노출피부 세척", "방진마스크·커버올 등 추가 PPE 지급"]}, "ls": 3, "cs": 3, "r1": 9, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [{"title": {"en": "Electrical Disconnection", "ko": "전기 차단"}, "steps": {"en": ["Site inspection with Electrical/maintenance/LOTO team who understand supply locations of the building.", "Identify all energy sources & other hazards via physical inspection using scanner/detector for buried cables.", "Shut down all powered equipment/systems (HVAC, lighting, etc.).", "Once identified, LOTO operator isolates the energy sources.", "LOTO operator places locks on all electrical LOTO points.", "Attach utility disconnection signage (person in charge, date, contact info, building name, panel ID from/to).", "Certified electrician tests circuits to confirm absence of voltage using a properly rated meter/tester.", "LOTO operator maintains a log of what was locked/tagged out and by whom.", "Certified electrician disconnects the cable from panel, wraps cable ends with electrical tape.", "If required: re-energize the power supply.", "LOTO operator removes locks, tags, and other isolating devices.", "Slowly and carefully restore the energy source.", "Monitor system as it powers up for abnormal signs (noise, sparks, vibration) & perform a test run."], "ko": ["전기·유지보수·LOTO팀과 현장 합동점검으로 공급위치 파악", "스캐너/탐지기로 물리적 점검하여 에너지원·매설케이블 등 위험요소 식별", "전 동력설비·시스템(공조, 조명 등) 전원 차단", "식별 후 LOTO담당자가 에너지원 절연", "LOTO담당자가 전 전기 LOTO 포인트에 잠금장치 설치", "절연 표지 부착(담당자명, 날짜, 연락처, 건물명, 패널 ID from/to)", "인증 전기기술자가 정격 계측기로 무전압 확인 테스트", "LOTO담당자가 잠금/태그 대상 및 담당자 기록 유지", "인증 전기기술자가 패널에서 케이블 분리, 케이블 끝단 절연테이프 마감", "필요 시 재통전", "LOTO담당자가 잠금장치·태그 제거", "서서히 신중하게 전원 복귀", "기동 중 이상신호(소음·스파크·진동) 모니터링 및 시운전"]}}, {"title": {"en": "Sewage Pipeline Disconnection by Mortar Plugging", "ko": "오수관 모르타르 플러깅 차단"}, "steps": {"en": ["If pipe is in use, shut off flow to ensure it's empty during sealing.", "Clean inside/outside of pipe where mortar will be applied; remove debris/grease/dirt with wire brush/rag.", "Ensure inside of pipe is dry before applying mortar.", "If pre-mixed mortar, follow packaging instructions; if mixing, combine cement:sand at ~1:3 with water to workable paste.", "Mix until thick, paste-like consistency, not watery.", "Mortar should hold its shape when scooped with a trowel.", "For larger pipes, insert a plug (rubber/wood/plastic/metal) as base, secured tightly.", "Use trowel to pack mortar tightly into pipe opening, no air pockets/gaps.", "For smaller pipes, use smaller tool or gloved hands to pack mortar.", "Smooth mortar surface flush or slightly domed at the pipe's end."], "ko": ["사용 중인 배관이면 밀봉작업 전 유량 차단하여 비움", "모르타르 도포 부위 배관 내외부 청소, 와이어브러시/걸레로 이물질 제거", "도포 전 배관 내부 건조 확인", "기성 모르타르는 제품지침 준수, 직접 배합 시 시멘트:모래 약 1:3 비율에 물 배합", "되직한 페이스트 농도까지 배합, 묽지 않게", "흙손으로 떠서 형태 유지되는지 확인", "대구경 배관은 고무/목재/플라스틱/금속 플러그를 베이스로 삽입, 견고히 고정", "흙손으로 배관 개구부에 빈틈없이 채워넣기", "소구경은 작은 도구나 장갑 낀 손으로 충전", "배관 끝단과 평평하거나 약간 볼록하게 마감"]}}], "fullControls": {"en": ["Ensure to conduct site survey to identify service utilities for isolation (electrical line, fire water line, fire alarm, telecommunication, potable water line, sewage line)", "Use updated drawing plans in the identifications of service utilities including underground utilities", "Electrical power supplies to be isolated (through LOTO) before work commences.", "Only competent and certified electrician is allowed to do electrical works.", "All electrical cables and services are to be treated live unless identified from plans, isolated by HSJV LOTO team.", "After electrical isolation or disconnection, perform dead test to ensure 100% no electricity.", "Ensure accuracy of energy isolation points through updated drawing and actual site condition from HSJV.", "Ensure lock / closed valve (electrical line, fire water line, fire alarm, telecommunication, potable water line, sewage line and perform LOTO as per drawing design (using updated and approved drawing plans).", "Ensure to inform Fire Team, in case fire alarm is connected to fire control room.", "Ensure to Turn off / disconnect fire pump / jockey pump or fully close applicable control valve (whichever applicable) before lockout & tag out.", "Dissipate energy, drain sprinkler line / fire water line.", "Verify isolation, pressure gauge should be zero & try to start it should not start (dead test)", "Ensure fire alarm panel is off / dead prior to demolition.", "Check fire water valve is closed prior to cut pipe.", "Check for leakage after installation of end ca", "Always check the grinder, disc, and power cord for any damage before use.", "Use the appropriate disc, ensure maximum RPM rating meets or exceeds your grinder's RPM.", "Only use grinder with updated color-coding sticker.", "Workers must wash hands and exposed skin thoroughly after h ia butt or electro fusion welding.", "Drain the line completely (open hydrant/faucet, etc.).", "In butt welding, both pipe ends pressed against a hot plate at constant temperature/pressure.", "Pipe pressed together so material molecules transfer between them.", "Check equipment before hot plate welding: hot plate temperature set per procedure, clean & free of grease.", "Ensure pipe brackets and supports correctly aligned.", "Pipe clamps adjusted to hold pipe tight enough for welding force.", "Press pipe ends against hot plate with brief high pressure.", "Continue heating at low pressure until 1mm upstand forms.", "Quickly remove hot plate, slowly increase welding pressure.", "Hold welding pressure steady, allow weld to cool.", "Remove joint, inspect weld; irregular weld seam rejected.", "Once cooled, slowly open valve to restore water supply."], "ko": ["절단 전 LOTO로 급수밸브 차단 확인", "승인 지하철거도면·현장상태에 따라 절단지점/길이 결정, 버트/전기융착 용접으로 접합", "배관 완전 배수(소화전/수도꼭지 개방 등)", "버트용접은 양쪽 배관 끝을 일정 온도·압력의 열판에 밀착", "분자가 서로 전이되도록 압착", "용접 전 장비점검: 열판온도 절차대로 설정, 청결·그리스 제거 확인", "배관 브라켓·서포트 정렬 확인", "용접압력을 견딜 만큼 배관클램프 조임", "배관 끝을 열판에 짧게 고압 압착", "1mm 융기가 형성될 때까지 저압으로 계속 가열", "열판을 신속히 제거 후 서서히 용접압력 증가", "용접압력 유지하며 냉각", "접합부 제거 후 용접부 검사, 불균일한 용접선은 불합격 처리", "냉각 후 서서히 밸브 개방하여 급수 복구"]}}, {"title": {"en": "Installation of End Cap Using Compression End Cap", "ko": "엔드캡 설치 (압축형)"}, "steps": {"en": ["Ensure water line valve closed via LOTO before cutting pipe.", "Cut pipe per approved drawing & site condition, ensure straight cut.", "Slide compression nut onto pipe.", "Place compression ring onto pipe behind the nut.", "Push the end cap body onto pipe until it stops.", "Hand-tighten compression nut onto cap body first.", "Use two chain wrenches — one to hold end cap body, other to tighten the nut.", "Do not overtighten (can crush/crack the fitting).", "LOTO operator opens the valve again to restore water supply."], "ko": ["절단 전 LOTO로 급수밸브 차단 확인", "승인도면·현장상태에 따라 직선 절단", "압축너트를 배관에 삽입", "압축링을 너트 뒤쪽 배관에 배치", "엔드캡 ed when in use, firm level surface.", "Personal fall arrest systems used where applicable.", "All scaffolders use tool lanyards."]}, "ko": {"h": "고소에서 공구·부품 낙하로 아래 작업자 부상", "ctrl": ["숙련·유자격자만 조립/사용", "이동식 스캐폴드 전 인원 고소작업 교육", "작업발판 완전 판넬링·고정", "사용 중 휠 잠금, 평탄 지면 확보", "해당 시 개인추락방지장비 사용", "전 스캐폴더 공구 랜야드 사용"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": true}, {"en": {"h": "Lifting heavy scaffold pipe can lead to back or musculoskeletal injuries.", "ctrl": ["Perimeter barriers around scaffolding fence to prevent unauthorized entry.", "Board clamps used to secure board in transom.", "Mechanical lifting aids (fork loader/forklift) used for heavy tubes where possible.", "Buddy/team lifting enforced for objects >23kg.", "All workers attend HSJV HSE Manual handling training."]}, "ko": {"h": "무거운 스캐폴드 파이프 인양으로 요통·근골격계 부상", "ctrl": ["펜스 주변 방호책으로 비인가자 차단", "보드클램프로 고정", "가능한 기계식 리프팅 보조기구 사용", "23kg 초과 시 2인 이상 팀 리프팅", "전 작업자 수동취급 교육 이수"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [{"title": {"en": "Erection of Scaffold", "ko": "스캐폴드 조립"}, "steps": {"en": ["Check ground stability and level.", "Obtain mud sills/base plates for stable footing; nail base plate to mud sill; dig down on high corners if unlevel; use adjusting screws to level; use leg extensions on drastic slopes.", "For mobile scaffold, install casters and lock them once in place.", "Assemble scaffolding frame: lay out end pieces, attach upper cross brace, secure ends to opposite frame; test stability (static) or move to position and verify level/secure (mobile).", "Place scaffolding planks: lift through bars into place, fasten with hardware, ensure fully planked.", "Install access: use ladders designed for the scaffold, or stair-ladders with handrails/treading; ensure access is safe to prevent tipping.", "Attach guard rails and toe boards."], "ko": ["지반 안정성·수평 확인", "안정된 기초를 위해 머드실/베이스플레이트 확보, 베이스플레이트를 머드실에 못박음, 불균일 지반은 높은쪽 굴착, 조정스크류로 수평조정, 급경사면은 다리연장재 사용", "이동식은 캐스터 설치, 위치 고정 후 잠금", "스캐폴드 프레임 조립: 양끝 부재 배치, 상부 크로스브레이스 부착, 반대편 프레임 하단에 고정, 정적형은 안정성 확인/이동식은 위치 이동 후 수평·고정 확인", "비계발판 설치: 파이프 사이로 들어올려 배치, 하드웨어로 고정, 완전 판넬링 확인", "출입구 설치: 스캐폴드 전용 사다리 또는 핸드레일·발판 있는 계단형 사다리 사용, 전도방지 위해 안전한 접근 확보", "가드레일·토보드 부착"]}}, {"title": {"en": "Dismantling of Scaffolding", "ko": "스캐폴드 해체"}, "steps": {"en": ["Clear the area where components can be set down/stacked; provide vehicle access with a clear path to loading area.", "Dismantle in reverse order of erection: piping/guard rails first, then platform planking; pass components hand to hand or lower with rope/hoist system — never stack on structure temporarily or throw to ground; ensure no one stands directly below.", "Inspect dismantled components; segregate those needing disposal from those fit for reuse.", "A partially dismantled scaffold should not be left standing longer than necessary; if unavoidable, provide barricade & warning signs at access points."], "ko": ["부품을 내려놓고 쌓을 구역 정리, 적재구역까지 차량 접근로 확보", "조립의 역순으로 해체: 배관·가드레일 먼저, 다음 발판; 부품은 손에서 손으로 전달하거나 로프/호이스트로 하강 — 구조물에 임시 적재·투척 금지, 바로 아래 서있지 않기", "해체된 부품 점검, 폐기용/재사용 가능으로 구분", "부분 해체된 스캐폴드는 필요 이상 방치 금지, 불가피할 경우 출입지점에 바리케이드·경고표지 설치"]}}, {"title": {"en": "Installation of Lifeline", "ko": "라이프라인 설치"}, "steps": {"en": ["Vertical lifeline: minimum 19.05mm (3/4in) manila rope or equivalent, minimum breaking strength 2450kg; bowline knot applied at anchorage point.", "Horizontal lifeline: breaking strength calculated per manufacturer's specification; minimum 8mm wire rope or equivalent, minimum breaking strength 2267kg; both ends fastened at anchorage points using minimum 3 properly installed cable clamps; beam post installed every 3-meter distance to avoid sagging; both ends installed at anchorage points capable of carrying all loads acting on it."], "ko": ["수직 라이프라인: 최소 19.05mm(3/4인치) 마닐라로프 또는 동등품, 최소 파단강도 2450kg, 앵커포인트에 보울라인 매듭 적용", "수평 라이프라인: 제조사 사양에 따라 파단강도 산정, 최소 8mm 와이어로프 또는 동등품, 최소 파단강도 2267kg, 양단은 케이블클램프 3개 이상으로 앵커포인트에 고정, 처짐 방지 위해 3m마다 빔포스트 설치, 양단 앵커포인트는 작용하중 전체 지지 가능해야 함"]}}], "fullControls": {"en": ["All persons working at height to must wear a full body harness connected to an approved anchorage.", "Only competent scaffolder with third party certificate is allowed to modify a scaffold and under approval of scaffolding inspector", "Discuss the potential hazard of the job.", "Confirm competence of staff for the task; certifications and training passport records to be available at all times", "Scaffolding should only be designed, erected, altered & dismantled by a certified scaffold erector & inspected by certified inspector", "Scaffolding parts should be examined regularly for defects and don’t mix types or parts when fitting or assemble", "All tools & materials should be securely tied off to structure or tool belt.", "Erection, dismantling and modification of scaffold should only be done by certified and approved scaffolders.", "Provision of base plate for outriggers on ground.", "Ensure fall protection (guard rails, toe boards, false upright, etc.) and comply 100% tie off.", "Do not throw or dropping scaffold materials follow hand over techniques.", "No workers above mobile scaffold when moving from one place to another.", "Ensure red tag or do not use scaffold tag when scaffold is under erection, dismantling and modification", "Tagging (red, yellow or green) conducted by certified and approved scaffold inspector once scaffold erection, dismantling and modification.", "Perform a pre use inspection of all scaffolding components.", "Ensure only trained and competent workers are involved in the erection and use of scaffolding.", "Ensure all personnel on erection, use, and dismantling of mobile scaffolding are trained in working at height.", "Ensure scaffolding platforms are fully planked and secure.", "Lock wheels when the scaffolding is in use and ensure it is on a firm, level surface.
