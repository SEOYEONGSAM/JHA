Attachment", "ko": "내장물 철거"}, "steps": {"en": ["Removal of internal attachment piece by piece.", "Windows/doors/glass: remove manually using grinder, drill, jig saw, reciprocating saw, crow bar, bolt cutter, hammer, suction glass; arrange at designated area.", "Gypsum/ceiling: remove manually using same tools, arrange at designated area.", "Toilet accessories (urinal, mirror, glass, partition, basin): remove manually using same tools + suction glass, arrange at designated area.", "Light/bulb: remove manually using grinder, drill, jig saw, reciprocating saw, crow bar, bolt cutter, screwdriver, hammer, arrange at designated area.", "Duct: remove by parts manually using same tools, arrange at designated area.", "Water pipe line: remove manually using wrenches + same tools, arrange at designated area.", "Electric line: remove manually using same tools, arrange at designated area."], "ko": ["내장물을 부분별로 순차 철거", "창호·유리: 그라인더·드릴·지그소·왕복톱·크로바·볼트커터·해머·흡착유리컵으로 수동철거, 지정구역 정리", "석고보드·천장재: 동일 공구로 수동철거, 지정구역 정리", "위생기구(소변기·거울·유리·파티션·세면대): 동일 공구+흡착유리컵으로 수동철거, 지정구역 정리", "조명·전구: 그라인더·드릴·지그소·왕복톱·크로바·볼트커터·스크루드라이버·해머로 수동철거, 지정구역 정리", "덕트: 동일 공구로 부분별 수동철거, 지정구역 정리", "급수배관: 렌치+동일 공구로 수동철거, 지정구역 정리", "전기배선: 동일 공구로 수동철거, 지정구역 정리"]}}, {"title": {"en": "Dismantling of Door Frame with Tempered Glass", "ko": "강화유리 도어프레임 해체"}, "steps": {"en": ["Lay down blanket/padding beneath frame to cushion glass; install adhesive tape along edges of tempered glass, use carton/thin board to protect it.", "Using pry bar, cordless drill, screwdriver and hammer, disconnect frame from wall/flooring; unscrew hinges if hinged; carefully remove door, set aside.", "If frame has multiple sections, separate carefully using pry bar/flathead screwdriver at tight seams.", "Once all fasteners removed, frame should come apart easily; if stuck, gently tap with rubber mallet to loosen."], "ko": ["프레임 아래 담요/패딩 깔아 유리 보호, 강화유리 가장자리에 접착테이프·박스지로 보호", "프라이바·코드리스드릴·스크루드라이버·해머로 프레임을 벽/바닥에서 분리, 힌지형이면 힌지 풀기, 조심스럽게 문짝 제거·별도 보관", "프레임이 여러 조각이면 프라이바/일자드라이버로 이음새를 신중히 분리", "모든 체결구 제거 후 분리, 고착 시 고무망치로 가볍게 두드려 이완"]}}, {"title": {"en": "Dismantling of Suspended Ceiling", "ko": "현수 천장 해체"}, "steps": {"en": ["Remove lighting fixtures, electric fan, fire alarm device etc., using mobile scaffolding or platform.", "Start at the edge, remove ceiling tiles around perimeter, pulling gently from grid.", "Continue removing tiles across the room; use reciprocating saw or hand saw for damaged/difficult tiles.", "Remove grid system starting with perimeter using screwdriver or hammer and crowbar.", "Unscrew grid support pieces with cordless drill or screwdriver.", "Remove main support rails after perimeter grid removed; pry apart from cross tees with crowbar/screwdriver.", "Take down cross tees (often snapped into place, gently pry out).", "Remove hangers (suspension wires/rods) using pliers or wrench.", "Cut or unscrew support wires; untwist with pliers if twisted/bent.", "Remove hanger rods using wrench or socket set.", "Remove remaining grid sections using crowbar, hammer, or screwdriver.", "Segregate ceiling tiles and metal grid; store properly in temporary area ready for fork loader collection."], "ko": ["모바일 스캐폴딩/플랫폼으로 조명기구·환풍기·화재경보장치 제거", "가장자리부터 시작, 그리드에서 천장타일을 부드럽게 당겨 제거", "방 전체 타일 순차 제거, 손상/제거곤란 타일은 왕복톱/수공톱 사용", "외곽 그리드부터 스크루드라이버·해머·크로바로 그리드 시스템 제거", "코드리스드릴/스크루드라이버로 그리드 서포트 풀기", "외곽 그리드 제거 후 메인 서포트레일 제거, 크로바/드라이버로 크로스티에서 분리", "크로스티 제거(보통 스냅식이므로 가볍게 프라이)", "펜치/렌치로 행거(서스펜션 와이어/로드) 제거", "서포트와이어 절단 또는 풀기, 꼬인 경우 펜치로 풀기", "행거로드는 렌치/소켓세트로 제거", "남은 그리드 구간을 크로바·해머·드라이버로 제거", "천장타일·금속그리드 분리, 임시구역에 정리하여 포크로더 수거 대기"]}}, {"title": {"en": "Dismantling of Interior Wall Panels", "ko": "내벽 패널 해체"}, "steps": {"en": ["Remove outlet/switch covers using screwdriver.", "Disconnect wiring behind outlet/switch carefully with screwdriver.", "Determine wall material (wood, plywood, MDF, drywall, vinyl, other) — influences tools/method used.", "Wood panels: nails/screws hold in place. Drywall: must be cut through before removal (more difficult). Vinyl/decorative: may be glued or nailed.", "Wood/vinyl panels: use crowbar or flat pry bar from top down to loosen from fasteners.", "Drywall: use reciprocating saw or jig saw to score along edges, cutting through nails/screws; hand saw for small sections.", "Work in manageable sections to reduce debris and ease disposal.", "For large/difficult panels, cut with reciprocating or circular saw in sections, cutting along studs, avoiding wiring/pipes.", "Remove wall supports/framing members remaining after panels removed.", "If removing wall entirely, cut through framing (2x4s, studs, etc.) with reciprocating or circular saw.", "Place dismantled panels and debris into temporary storage area ready for fork loader collection."], "ko": ["스크루드라이버로 콘센트·스위치 커버 제거", "콘센트/스위치 배선 신중히 분리", "벽체 재질 확인(목재, 합판, MDF, 드라이월, 비닐 등)에 따라 공구/방법 결정", "목재패널: 못/나사 고정. 드라이월: 절단 후 제거(더 까다로움). 비닐/장식패널: 접착/못고정 가능", "목재/비닐: 크로바·평프라이바로 상단부터 이완", "드라이월: 왕복톱/지그소로 가장자리 스코어링 후 못/나사 절단, 소구간은 수공톱", "작업량 관리 위해 소구간으로 분할 작업", "대형/난이도 높은 패널은 왕복톱/원형톱으로 스터드 따라 절단, 배선/배관 주의", "패널 제거 후 남은 벽체 서포트/프레임 제거", "벽 전체 철거 시 프레임(2x4 등)을 왕복톱/원형톱으로 절단", "해체된 패널·잔해는 임시구역에 정리하여 포크로더 수거 대기"]}}, {"title": {"en": "Dismantling/Unbolting of Suspended Sandwich Panel Ceiling Using Manlift", "ko": "맨리프트를 이용한 샌드위치패널 현수천장 해체"}, "steps": {"en": ["Set up and position the manlift at the work location.", "Unbolt ceiling panels using hand tools.", "Remove lighting fixtures, fire alarm devices, etc., using manlift, battery drill, crow bar and hammer.", "Start on the edge; begin removing/unbolting the sandwich panel ceiling using drill, crow bar and hammer — unbolt screws from both ends of the panel first, leaving the center screw to prevent sudden falling.", "Ensure the remaining bolt is pried with a crow bar.", "Before removing the remaining (center) bolt, maintain at least 1-meter safe distance from the panel to the manlift basket, then gently pull down the panel using a crow bar; repeat sequence on remaining panels.", "Stack removed panels in the designated area."], "ko": ["맨리프트를 작업위치에 설치·배치", "수공구로 천장패널 볼트 해체", "맨리프트·배터리드릴·크로바·해머로 조명기구·화재경보장치 등 제거", "가장자리부터 시작, 드릴·크로바·해머로 샌드위치패널 천장 해체 — 패널 양쪽 끝 나사부터 풀고 중앙 나사는 급낙하 방지 위해 남겨둠", "남은 볼트는 크로바로 지렛대 작업", "중앙 볼트 제거 전 패널-맨리프트 바스켓 간 최소 1m 안전거리 유지 후 크로바로 서서히 하강, 나머지 패널도 동일 순서 반복", "제거된 패널은 지정구역에 적재"]}}], "fullControls": {"en": ["Ensure all power tools are inspected and with updated color-coding sticker", "Ensure grinder rpm and cutting/grinding disc are compatible to the power tools", "Do not leave power tools unattended and remove connection.", "Hand power tools user must be trained, experience and knowledgeable to use the power tools.", "Ensure to check the expiry date of the disc before use.", "Keep hand away from rotating parts.", "Inspect the tooling for uneven or abnormal wear, as this may indicate that the tool holder is damaged.", "Check the tool holder and grinding head for cracks or other visible damage.", "Power tools should be un plug from the power source when not in use.", "Fire extinguisher and fire blanket shall be in place.", "Ensure fire control measure is in place such as fire extinguisher, fire blanket, fire watcher.", "Use appropriate leather gloves, apron, leg guard and face shield for cutting and grinding.", "Provide workers with N95 mask, goggles, long sleeves and disposable coveralls to avoid skin contact.", "Place mineral wool in properly sealed bags to prevent spread of fibers.", "Remove all damaged and defective hand tools on site.", "Ensure all workers attended HSE hand and power tools training.", "First Aider and first aid kit must be available on site", "Provide workers with cut resistant hand gloves", "Ensure all power tools are well maintained, regularly inspected and with updated color-coding sticker.", "Ensure that safety guards are in place and functioning.", "Inspect power tools and cords for damage before use.", "Establish exclusion zone around the dismantling area by installing signage and barricade.", "Assign competent & certified operator with TPC.", "Operator & banksman must be trained and competent, must hold a valid TPC", "Excavator and attachments must have valid TPC and updated color-coding sticker.", "Engage outriggers for wheel excavator to ensure stability during operation.", "Maintain clear communication between operator and ground personnel.", "Only trained and authorized operators to use the manlift.", "Use full body harness with lanyard attached to manlift anchor point / life line.", "Ensure firm, level ground; use wheel stopper where required.", "Do not exceed SWL of manlift including workers and tools.", "Barricade area below with warning signage to prevent entry.", "No movement of manlift while elevated unless designed for it.", "Install bar stopper in manlift basket to prevent crushing injuries.", "Work under competent supervision.", "Conduct the pre job briefing prior to start that activities -Emergency rescue plan procedure to be follow", "Assign banksman on both end of work area.", "Maintain at least one-meter safe distance of manlift basket to panel before falling down.", "Use tool lanyards for hand tools where possible.", "Dismantle panels in small manageable sections.", "Mandatory use of safety helmet with chin strap, cut-resistant gloves, dust mask and disposable coverall.", "Use right tool for the job, in good condition.", "Inspect tools before use (guards, blades, batteries).", "Only trained workers to operate power tools of battery drill.", "Use proper manual handling techniques.", "Stack dismantled panels safely to prevent collapse."], "ko": ["전 동력공구 점검 및 최신 컬러코드 스티커 부착 확인.", "그라인더 RPM과 절단/그라인딩 디스크가 공구와 호환되는지 확인.", "동력공구 미사용 시 방치 금지, 전원 연결 해제.", "수동력공구 사용자는 교육·경험·숙련도 확인.", "사용 전 디스크 유효기간 확인.", "회전부에서 손 이격.", "공구 마모·이상 여부 점검, 공구홀더 손상 징후 확인.", "공구홀더·그라인딩헤드 균열·손상 육안점검.", "미사용 시 동력공구는 전원에서 플러그 분리.", "소화기·방화담요 상시 비치.", "소화기, 방화담요, 화재감시자 등 화재통제조치 확보.", "절단·그라인딩 시 적정 가죽장갑, 앞치마, 다리보호대, 안면보호구 착용.", "피부접촉 방지 위해 N95마스크, 고글, 긴소매, 일회용커버올 지급.", "미네랄울은 밀봉백에 담아 섬유비산 방지.", "현장의 손상·불량 수공구 전량 제거.", "전 작업자 HSE 수공구·동력공구 교육 이수.", "응급처치자·구급함 현장 상시 비치.", "작업자에게 내절단 장갑 지급.", "전 동력공구 양호상태 유지, 정기점검, 최신 컬러코드 스티커 부착.", "안전가드 정상 장착·작동 확인.", "사용 전 동력공구·전선 손상 점검.", "해체구역 주변 사이니지·바리케이드로 통제구역 설정.", "유자격·TPC 인증 오퍼레이터 배치.", "오퍼레이터·뱅크스맨은 교육·역량 확인 및 유효 TPC 보유.", "엑스카베이터 및 부속은 유효 TPC 및 최신 컬러코드 스티커 확인.", "휠 엑스카베이터는 안정성 위해 아웃리거 전개.", "오퍼레이터-지상요원 간 명확한 통신 유지.", "숙련·인증받은 오퍼레이터만 맨리프트 사용.", "맨리프트 앵커포인트/라이프라인에 랜야드 연결된 전신하네스 사용.", "견고·평탄 지면 확인, 필요 시 휠스토퍼 사용.", "작업자·공구 포함 맨리프트 SWL 초과 금지.", "하부 구역 바리케이드·경고사이니지로 진입 방지.", "설계된 용도가 아니면 상승 중 맨리프트 이동 금지.", "압착부상 방지 위해 맨리프트 바스켓에 바스토퍼 설치.", "숙련 감독 하에 작업 수행.", "작업 전 사전브리핑 실시 - 비상구조계획 절차 준수.", "작업구역 양단에 뱅크스맨 배치.", "패널 낙하 전 맨리프트 바스켓-패널 간 최소 1m 안전거리 유지.", "가능한 수공구는 공구 랜야드 사용.", "패널은 관리가능한 소구간으로 해체.", "안전모(턱끈 포함), 내절단장갑, 방진마스크, 일회용 커버올 착용 의무화.", "작업에 맞는 양호상태 공구 사용.", "사용 전 공구(가드, 날, 배터리) 점검.", "배터리드릴 등 동력공구는 숙련 작업자만 조작.", "올바른 수동취급기법 사용.", "해체된 패널은 붕괴방지 위해 안전하게 적재."]}}, {"id": 1022, "cat": "work", "title": {"en": "10. Cutting & Welding of Steel Items", "ko": "10. 철재 절단·용접"}, "short": {"en": "Steel Cutting/Welding", "ko": "철재 절단·용접"}, "tools": ["Oxygen cylinder", "Acetylene cylinder", "Regulator", "Hoses", "Cutting torch", "Wrench", "Flint lighter", "SMAW machine"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Grinding produces sparks flying in all directions — eye injury, burns, fire risk; faulty grinder may cause loss of control (cuts/lacerations).", "ctrl": ["Workspace clear of flammable materials.", "Fire extinguisher nearby.", "Safety goggles/face shields against flying debris.", "Dust mask/respirator for metal dust/fumes.", "Grinder regularly inspected; never used without protective guard.", "Disc RPM rating higher than grinder's."]}, "ko": {"h": "그라인딩 스파크 비산으로 눈 부상·화상·화재, 그라인더 결함 시 열상", "ctrl": ["작업구역 가연물 제거", "소화기 인근 비치", "비산물 방호 고글·안면보호구", "금속분진용 방진마스크", "그라인더 정기점검, 가드 없이 사용금지", "디스크 RPM은 그라인더보다 높게"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Oxygen/acetylene tank mishandling poses fire/explosion risk; cutting load-bearing sections may cause unexpected structural collapse.", "ctrl": ["Gas regulators/valves/hoses in good condition, properly maintained.", "Cylinders stored upright, secured with chains/straps.", "Class B fire extinguishers accessible; employees trained.", "Welders trained in oxy-acetylene equipment operation.", "Engineer identifies structural load paths/weak points before cutting.", "Dedicated spotter maintains visual contact during gas cutting, alerts operator/manlift of impending failure."]}, "ko": {"h": "산소·아세틸렌 취급불량 화재/폭발, 하중부재 절단 시 붕괴 위험", "ctrl": ["가스 레귤레이터·밸브·호스 상태 양호 유지", "실린더 수직 보관, 체인·스트랩 고정", "B급 소화기 비치, 사용법 교육", "용접공 산소-아세틸렌 장비 운용 교육", "절단 전 엔지니어가 하중경로·취약점 식별", "전담 스포터가 절단 중 육안 감시, 붕괴 조짐 시 경고"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Cutting steel connections from a manlift risks structural weakening/unexpected collapse.", "ctrl": ["Grabber used to hold/support structural member during cutting.", "Clear communication maintained between cutter and equipment operator.", "Welders provided PPE (leather/welding gloves, helmet/goggles, apron, respirator)."]}, "ko": {"h": "맨리프트에서 강재 연결부 절단 중 구조약화/붕괴", "ctrl": ["절단 중 그래버로 부재 지지", "절단자-장비오퍼레이터 통신 유지", "용접공 PPE(가죽장갑·용접헬멧·앞치마·호흡기) 지급"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [{"title": {"en": "Rebar/Steel Cutting Using Oxygen-Acetylene Gas", "ko": "산소-아세틸렌 가스절단"}, "steps": {"en": ["Check gas cutting equipment, ensure all valves are closed.", "Connect regulators to cylinders.", "Connect hoses to torch handle.", "Open acetylene cylinder valve ¼ to ½ turn only.", "Open oxygen cylinder valve fully (double seat valve).", "Set regulators: acetylene 5-10 psi, oxygen 20-40 psi (depending on tip size/metal thickness).", "Open fuel valve slightly on torch, allow small flow to purge air, then close.", "Do the same with the oxygen valve.", "Open the acetylene valve on the torch slightly.", "Use a flint striker or lighter to light the flame.", "Slowly open the oxygen valve until a neutral flame is achieved (no yellow tip, sharply defined blue cone).", "Direct the flame at the edge of the metal where the cut will begin.", "Hold the flame until the metal becomes cherry red (approx. 800-900°C).", "Start the cut, press the oxygen lever on the torch to release a jet of oxygen.", "This reacts with the red-hot steel and starts the cutting process.", "Move the torch steadily along the cutting line.", "Maintain a consistent speed and correct torch angle (perpendicular or slightly tilted).", "Continue the cut, adjust torch angle/speed based on how well the metal is cutting.", "Avoid pausing too long in one place to prevent a messy cut or blowback.", "When finished, release the oxygen lever.", "Close the torch valves: first acetylene, then oxygen.", "Close cylinder valves: acetylene, then oxygen.", "Bleed the lines via torch valves.", "Back off pressure adjusting screws on both regulators to relieve spring pressure.", "Let the metal cool before handling."], "ko": ["가스절단장비 점검, 전 밸브 잠김 확인", "레귤레이터를 실린더에 연결", "호스를 토치핸들에 연결", "아세틸렌 실린더 밸브 1/4~1/2회전만 개방", "산소 실린더 밸브 완전 개방(듀얼시트밸브)", "레귤레이터 설정: 아세틸렌 5~10psi, 산소 20~40psi(팁크기·두께에 따라)", "토치의 연료밸브를 살짝 열어 공기퍼지 후 닫기", "산소밸브도 동일하게 실시", "토치의 아세틸렌밸브를 살짝 열기", "점화기로 불꽃 점화", "산소밸브를 서서히 열어 중성불꽃(황색 끝 없음, 선명한 청색콘) 확보", "절단 시작지점 모서리에 불꽃 조준", "금속이 체리레드(약 800~900°C)가 될 때까지 가열", "산소레버를 눌러 산소분사, 절단 시작", "고온 강재와 반응하여 절단 진행", "절단선 따라 토치를 안정적으로 이동", "일정한 속도·적정 각도(수직 또는 약간 기울임) 유지", "절단 진행하며 절단상태에 따라 각도·속도 조정", "한 곳에 오래 머물지 않기(절단면 불량·역화 방지)", "완료 시 산소레버 놓기", "토치밸브 순서대로 닫기: 아세틸렌 먼저, 산소 나중", "실린더밸브 닫기: 아세틸렌, 산소 순", "토치밸브로 라인 배기", "양쪽 레귤레이터 압력조정나사 풀어 스프링압력 해소", "취급 전 금속 냉각 대기"]}}, {"title": {"en": "Welding of Steel (Arc Welding / SMAW)", "ko": "강재 용접 (아크용접/SMAW)"}, "steps": {"en": ["Select the appropriate electrode based on material and thickness.", "Adjust amperage per electrode size/material thickness (e.g. 3.2mm/1/8in electrode typically requires 75-85 amps).", "Hold the electrode holder at a 15-20° angle from vertical.", "Tap or scratch the electrode against the workpiece to initiate the arc.", "Once arc established, maintain consistent distance between electrode and workpiece for a stable arc.", "Move electrode steadily along the joint, maintaining consistent speed/angle.", "Use a weaving motion if necessary for proper fusion/penetration.", "Once weld complete, slowly lift electrode away to break the arc.", "Allow weld to cool naturally; avoid quenching with water (introduces stress, cracking risk).", "Remove slag using chipping hammer and wire brush, inspect weld for defects.", "Check weld bead for uniformity, penetration, and any defects (cracks, porosity).", "Use appropriate tools to clean and inspect the weld."], "ko": ["재질·두께에 맞는 전극봉 선정", "전극봉 크기·두께에 따라 전류 조정(예: 3.2mm/1/8인치는 통상 75~85A)", "전극홀더를 수직에서 15~20° 각도로 유지", "성냥 긋듯 전극을 모재에 접촉하여 아크 발생", "아크 형성 후 전극-모재 간 일정거리 유지하여 안정적 아크 유지", "이음부를 따라 일정속도·각도로 전극 이동", "필요 시 위빙동작으로 융합·용입 확보", "용접 완료 후 서서히 전극을 떼어 아크 차단", "자연냉각, 물 급냉 금지(응력·균열 위험)", "치핑해머·와이어브러시로 슬래그 제거, 결함 확인", "비드의 균일성·용입·결함(균열·기공) 확인", "적절한 공구로 용접부 청소·검사"]}}], "fullControls": {"en": ["Ensure the workspace is clear of flammable materials to reduce the risk of fire caused by sparks", "Keep a fire extinguisher nearby and ensure the area is clear of combustible materials.", "Provide workers with safety goggles or face shields to protect against flying debris and sparks.", "Wear a dust mask or respirator if working in an environment with excessive metal dust or fumes.", "Regularly inspect the grinder for any wear, defects, or damage.", "Never use a grinder without the protective guard.", "Ensure that the RPM rating of the disc/blade is higher than that of the grinder.", "First Aider and first aid kit must be available on site", "Ensure gas regulators, valves, and hoses are in good condition and properly maintained to prevent leaks.", "Cylinders should be stored upright and secured with chains or straps to prevent them from tipping over.", "Use appropriate equipment and techniques for moving cylinders, such as cylinder carts or trolleys. Avoid dropping or striking cylinders.", "Install appropriate fire extinguishers (e.g., Class B for flammable gases) in accessible locations. Ensure that employees are trained in their use.", "Ensure that welders are trained in the proper operation of the oxy acetylene equipment.", "Use enclosures or barriers around cutting/welding area to contain and control the spread of fumes.", "Have supervisors regularly monitor cutting operations to ensure adherence to safety procedures.", "Store oxygen and acetylene cylinders in well-ventilated areas, away from heat sources or flammable materials.", "Provide welders with additional PPE (leather or welding gloves, welding helmet or welding goggles, welder apron, long pants and respirator if necessary) to protect against burns from sparks and hot steel.", "Assign engineer that will identify structural load paths and weak points before cutting.", "Assign dedicated spotter that will maintain a visual contact with the cutting points while gas cutting.", "Equipped with megaphone and whistle, he will alert the manlift operator and operatives in case he noticed impending structural failure during cutting.", "Use grabber to hold and support structural member during cutting.", "Maintain clear communication between cutter and equipment operator."], "ko": ["스파크로 인한 화재위험 저감 위해 작업구역 가연물 제거 확인.", "소화기를 인근에 비치, 구역 내 가연물 없음 확인.", "비산물·스파크 방호용 보안경 또는 안면보호구 지급.", "과도한 금속분진·흄이 있는 환경에서는 방진마스크/호흡기 착용.", "그라인더의 마모, 결함, 손상 정기점검.", "보호가드 없는 그라인더 사용 절대금지.", "디스크/날의 RPM 정격이 그라인더 RPM보다 높은지 확인.", "응급처치자·구급함 현장 상시 비치.", "가스레귤레이터, 밸브, 호스가 양호상태이며 적정 정비되어 누출 방지 확인.", "실린더는 수직 보관, 체인이나 스트랩으로 고정하여 전도 방지.", "실린더 이동 시 실린더카트/트롤리 등 적정 장비·기법 사용. 낙하·충격 방지.", "적정 소화기(가연성가스용 B급 등)를 접근 용이한 위치에 설치. 직원 사용법 교육 확인.", "용접공은 산소-아세틸렌 장비의 올바른 조작에 대해 교육받았는지 확인.", "절단/용접구역 주변 인클로저·방호벽으로 흄 확산 억제·통제.", "감독자가 절단작업을 정기적으로 모니터링하여 안전절차 준수 확인.", "산소·아세틸렌 실린더는 열원·가연물에서 떨어진 환기양호구역에 보관.", "용접공에게 스파크·고온강재 화상 방지용 추가 PPE(가죽·용접장갑, 용접헬멧/고글, 용접앞치마, 긴바지, 필요시 호흡기) 지급.", "절단 전 구조하중경로·취약점을 식별할 엔지니어 배정.", "가스절단 중 절단지점을 육안으로 지속 관찰할 전담 스포터 배정.", "메가폰·호루라기를 장착, 절단 중 구조파손 조짐 발견 시 맨리프트 오퍼레이터·작업자에게 경고.", "그래버로 절단 중인 구조부재를 지지.", "절단자-장비오퍼레이터 간 명확한 통신 유지."]}}, {"id": 1023, "cat": "work", "title": {"en": "11. Lifting, Loading & Unloading", "ko": "11. 인양·상하차"}, "short": {"en": "Lifting/Loading/Unloading", "ko": "인양·상하차"}, "tools": ["Mobile crane", "Crawler crane", "Fork loader", "Forklift", "Lifting gears and accessories", "Trailer truck"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Crane/boom truck may tip over from improper setup, overloading, or unstable ground.", "ctrl": ["Approved special/common lifting plan secured before activity.", "Crane/boom truck on stable level surface, outriggers fully extended.", "Lifting accessories inspected, color coded, certified.", "Load charts available; operators know lifting capacity at various configurations.", "Barricade & lifting signage around radius before operation."]}, "ko": {"h": "부적절한 설치·과적·불안정 지반으로 크레인 전복", "ctrl": ["인양 전 승인된 리프팅 플랜 확보", "안정된 평지에 설치, 아웃리거 완전전개", "리프팅 부속 점검·컬러코드·인증", "하중표 확인, 오퍼레이터 용량 숙지", "작업 전 반경 주변 바리케이드·사이니지"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Loads not properly secured or shifting during lifting can fall, causing injuries or fatalities.", "ctrl": ["Appropriate lifting equipment (slings, chains, wire rope, shackles) in good condition rated for load.", "Tag lines on opposite sides for control.", "Watchman uses megaphone/siren during lifting.", "No personnel under suspended load at any time.", "Operators & riggers trained, competent, valid TPC.", "Crane operations stopped in high winds (≥10m/s) or heavy rain."]}, "ko": {"h": "결박 미흡·하중 이동으로 낙하 사고", " 여 하중 이동/낙하 방지"]}}, {"title": {"en": "Unloading by Forklift/Fork Loader", "ko": "포크리프트로 하차"}, "steps": {"en": ["Position the forklift, align with unloading area, path clear and level.", "Inspect the load to ensure it hasn't shifted during transport; assess safe unloading if it moved.", "Slowly lower the load to the ground, stable and secure.", "Ensure unloading area is free of obstacles and forklift can maneuver safely."], "ko": ["포크리프트를 하차구역에 정렬, 경로 확보·평탄 확인", "운반 중 화물 이동여부 점검, 이동 시 안전한 하차방법 판단", "서서히 지면에 하강, 안정적으로 배치", "하차구역 장애물 없음 및 안전한 조작 가능 확인"]}}], "fullControls": {"en": ["Secure approved special or common lifting plan prior to lifting activity", "Ensure the crane/ boom truck is set up on a stable and level surface, and outrigger fully extended as much as possible.", "Inspect all lifting accessories for any physical damage and ensure that it is colour coded and certified.", "Provide tag lines on opposite sides of the load to provide better control.", "Ensure load charts are available, and operators know the crane’s lifting capacity at various configurations (e.g., boom length / angle, radius).", "Adequate barricade and lifting operation signage must be provided around the lifting radius before operation.", "Use appropriate lifting equipment such as web slings, chains sling, wire rope sling, lifting frame and shackles that are in good condition and rated for the load's weight.", "Watchman shall use a megaphone with a siren to alert everybody that lifting is ongoing.", "Provide radio to the rigger and operator if necessary.", "Ensure there is no personnel standing/staying under the suspended load in any given time.", "Ensure operators & riggers are trained & competent, they must hold a valid TPC.", "Stop crane operations in adverse weather conditions such as high winds reaching 10 m/s or heavy rain.", "Secure loads with proper rigging techniques by a trained and competent rigger.", "Ensure that all operators are properly trained, certified, and with valid TPC.", "Refer to equipment checklist in conduct thorough pre operation inspections of the forklift/loader, checking for mechanical issues, hydraulic fluid, tire condition, lights, brakes, and safety features.", "Never exceed the forklift’s/loader’s rated load capacity. Ensure that all loads are properly secured to prevent shifting or falling during transport.", "Always lower the forks to a safe height when driving and keep the load as low as possible to maintain the forklift’s stability.", "Make sure the forklift is on level ground, and avoid operating on slopes unless the forklift is rated for such use.", "Assign signal man to guide the operator's in moving, maneuvering and lifting loads.", "Ensure that operators have adequate rest to maintain focus and alertness.", "Ensure the load is within the forklift's rated capacity.", "Use fork loader/forklift only for their intended purpose (e.g., lifting loads, transporting goods). Do not use forklifts to lift personnel or perform tasks that the forklift is not designed for.", "First Aider and first aid kit must be available on site"], "ko": ["인양작업 전 승인된 특수/일반 리프팅플랜 확보.", "크레인/붐트럭을 안정·평탄한 면에 설치, 아웃리거는 가능한 최대한 전개.", "전 리프팅부속의 물리적 손상 점검, 컬러코드·인증 확인.", "더 나은 제어를 위해 하중 양쪽에 태그라인 설치.", "하중표를 확보하고, 오퍼레이터가 다양한 구성(붐길이/각도, 반경)에서 크레인 인양능력을 숙지하는지 확인.", "작업 전 인양반경 주변 충분한 바리케이드·리프팅작업 사이니지 제공 필수.", "웹슬링, 체인슬링, 와이어로프슬링, 리프팅프레임, 섀클 등 양호상태이며 하중에 정격인 적정 리프팅장비 사용.", "감시자는 메가폰과 사이렌으로 인양작업 진행 중임을 전원에게 경고.", "필요 시 리거·오퍼레이터에게 무전기 지급.", "현수하중 아래 인원이 서있거나 머무는 것을 항시 금지.", "오퍼레이터·리거는 교육·역량 확인, 유효 TPC 보유 필수.", "풍속 10m/s 도달 강풍 또는 폭우 등 악천후 시 크레인 작업 중단.", "숙련·유자격 리거가 올바른 리깅기법으로 하중 고정.", "전 오퍼레이터가 적절히 교육·인증받고 유효 TPC 보유 확인.", "장비체크리스트 참조하여 포크리프트/로더의 철저한 작업전점검 실시, 기계결함, 유압유, 타이어상태, 조명, 브레이크, 안전장치 점검.", "포크리프트/로더의 정격하중용량 절대 초과 금지. 운송 중 이동·낙하 방지 위해 전 하중 적절히 고정 확인.", "운행 시 항상 포크를 안전높이로 낮추고, 안정성 유지 위해 하중을 최대한 낮게 유지.", "포크리프트가 평탄지면에 있는지 확인, 정격사용이 아닌 한 경사면 작동 회피.", "신호수를 배정하여 오퍼레이터의 이동, 기동, 인양작업 유도.", "오퍼레이터가 집중력·경계심 유지를 위해 충분한 휴식을 취하는지 확인.", "하중이 포크리프트 정격용량 이내인지 확인.", "포크로더/포크리프트는 본래 용도(하중인양, 화물운송 등)로만 사용. 포크리프트가 설계되지 않은 인원인양이나 작업에 사용 금지.", "응급처치자·구급함 현장 상시 비치."]}}, {"id": 1024, "cat": "work", "title": {"en": "12. Use of Manlift", "ko": "12. 맨리프트 사용"}, "short": {"en": "Manlift Operations", "ko": "맨리프트 사용"}, "tools": ["Manlift", "Cordless drill", "Crow bar", "Pry bar", "Reciprocating saw", "Grinder", "Hammer"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Workers at risk of falling from height — bone dislocation, injury, or fatality.", "ctrl": ["Manlift inspected, TPC provided.", "Fall protection (guardrails, toe boards) & 100% tie-off compliance.", "Valid TPC of operator; banksman provided during activity.", "Manlift on level surface, avoiding steep slope beyond spec limit.", "Workers trained for working at height.", "Vertical lifeline used for long-duration manlift/scissor lift work."]}, "ko": {"h": "고소에서 추락 위험 — 골절, 부상, 사망", "ctrl": ["맨리프트 점검·TPC 확인", "추락방지 및 100% 체결 준수", "오퍼레이터 유효 TPC, 뱅크스맨 배치", "맨리프트는 평탄면, 급경사 금지", "고소작업 교육 이수", "장시간 작업 시 수직 라이프라인 사용"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Damaged/defective hand & power tools (impact drill, grinder, saw) pose cut/laceration risk from moving parts.", "ctrl": ["Power tools inspected with updated color-coding.", "Grinder RPM/disc compatibility ensured.", "Tools tied off to structure to prevent falling.", "Damaged tools removed from site; no homemade/fabricated tools allowed.", "Leather gloves, apron, leg guard, face shield used for cutting/grinding."]}, "ko": {"h": "손상된 수공구·동력공구로 열상 위험", "ctrl": ["동력공구 컬러코드 점검", "그라인더 RPM·디스크 호환성", "공구는 구조물에 결박(낙하방지)", "손상공구 반출, 자체제작 공구 금지", "절단·그라인딩 시 가죽장갑·앞치마·안면보호구"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Workers using manlift/ropes at risk of falling during AC condenser cable disconnection/unbolting.", "ctrl": ["Manlift stable, positioned on flat surface.", "Spotter assigned to monitor workers in manlift.", "Only  unscrew or cut any fasteners securing the panel to the structure.", "Gently pry the panel away from the structure, ensuring it remains stable.", "If the panel is large/heavy, remove only some fasteners first to prevent falling, leaving a few temporarily to hold it in place while positioning for final removal.", "Carefully remove the last fasteners while supporting the panel; if large/heavy, have another person assist, or use a sling/lifting attachment.", "Place dismantled panels in a temporary storage area."], "ko": ["맨리프트로 인원을 패널 체결부까지 상승", "패널을 구조물에 고정하는 체결구를 신중히 풀거나 절단", "구조물에서 패널을 부드럽게 지렛대로 이완, 안정성 유지", "크고 무거운 패널은 낙하방지 위해 체결구 일부만 우선 제거, 최종 제거 위치조정 동안 몇 개는 임시로 남겨둠", "패널을 지지하며 마지막 체결구 제거, 크고 무거우면 2인 작업 또는 슬링/리프팅 부속 사용", "해체된 패널은 임시야적구역에 적재"]}}, {"title": {"en": "Removal of AC Condenser (Outdoor Unit)", "ko": "에어컨 실외기(콘덴서) 제거"}, "steps": {"en": ["Slowly raise the manlift to the level of the condenser unit.", "At the correct height, carefully detach the condenser unit from mounting brackets/platform.", "Remove and slowly place the condenser unit onto the manlift platform (only for units not exceeding 30kg).", "Slowly lower the condenser unit to the ground, ensuring it's placed on a stable surface."], "ko": ["콘덴서 위치까지 서서히 맨리프트 상승", "정확한 높이에서 마운팅브라켓/플랫폼에서 콘덴서 신중히 분리", "맨리프트 플랫폼에 서서히 이동배치(30kg 이하 콘덴서에 한함)", "서서히 지면으로 하강, 안정된 면에 배치"]}}, {"title": {"en": "Dismantling of Window Frame with Manlift", "ko": "맨리프트로 창틀 해체"}, "steps": {"en": ["Place the manlift so the platform is level with the window frame; ensure stable position and clear visibility.", "If the window has a removable sash, locate and disengage the release mechanism (unlock latches or remove screws).", "Carefully lift the sash out of the frame, avoiding damage to glass/surrounding materials.", "Use a pry bar or putty knife to gently remove interior trim around the frame, exposing fasteners.", "Using an appropriate screwdriver or drill, remove all screws/nails securing the frame.", "Use a utility knife to cut through caulking/sealant around the frame to loosen it from the wall.", "Insert a pry bar between the frame and the wall, gently working around the perimeter to detach; take care not to damage surrounding wall.", "Once detached, carefully lift the frame out; if large/heavy, get help from a second person.", "Lower the frame to the ground or place on a stable surface."], "ko": ["맨리프트를 창틀과 수평이 되도록 배치, 안정된 위치·시야 확보", "분리형 새시가 있으면 잠금장치 해제(래치 풀기 또는 나사 제거)", "프레임에서 새시를 조심스레 들어올려 유리·주변재 손상 방지", "프라이바/퍼티나이프로 내부트림을 부드럽게 제거하여 체결구 노출", "적정 드라이버/드릴로 프레임 고정 나사·못 전부 제거", "커터칼로 프레임 주변 코킹/실란트 절단하여 벽에서 이완", "프레임과 벽 사이에 프라이바를 삽입, 둘레를 따라 서서히 분리, 주변벽 손상 주의", "분리 후 신중히 프레임 들어올림, 크고 무거우면 2인 작업", "지면 또는 안정된 면에 하강"]}}, {"title": {"en": "Removal/Dismantling of Fixtures & Attaching Lifting Accessories with Manlift", "ko": "맨리프트로 부속물 철거·리프팅부속 부착"}, "steps": {"en": ["Place the manlift so the platform is level with the item to be dismantled.", "Carefully unscrew, remove (material), or attach (lifting accessories).", "Using an appropriate screwdriver or drill, remove screws/fasteners holding the fixture in place.", "As fasteners are removed, support the fixture to prevent it from falling.", "Lower the fixture to the ground and place it in temporary storage."], "ko": ["대상물과 수평이 되도록 맨리프트 배치", "신중히 풀거나 제거(자재) 또는 부착(리프팅부속)", "적정 드라이버/드릴로 고정 나사·체결구 제거", "체결구 제거 시 부속물 낙하방지 위해 지지", "부속물을 지면으로 하강, 임시야적구역에 배치"]}}, {"title": {"en": "Gas Cutting of Steel Members from Manlift", "ko": "맨리프트에서 강재부재 가스절단"}, "steps": {"en": ["Start cutting non-load-bearing members first (roof purlins, wall girts, cladding rails, bracing, stiffeners).", "For load-bearing members, support/hold using grabber while cutting (columns, beams, girders, trusses, structural braces).", "Begin cutting from outer sections inward, avoiding entrapment zones.", "Use controlled, progressive cuts and avoid sudden structural releases.", "Store dismantled steel sections in a temporary storage area with soft barricade."], "ko": ["비하중부재(지붕퍼린, 벽거트, 클래 ular maintenance of all equipment.", "Trailer/dump truck pre-checked per Heavy Vehicle Inspection Checklist before each load.", "Loader/excavator operated slowly and smoothly to avoid sudden movements.", "Supervisor/foreman conducts pre-job meeting."]}, "ko": {"h": "과적/오조작으로 로더 전복 위험", "ctrl": ["사용 전 점검·정기정비", "적재 전 대형차량 점검 체크리스트 실시", "서행·완만 조작으로 급조작 방지", "작업 전 사전작업회의 실시"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": false}, {"en": {"h": "Workers may fall from scaffolding platform while covering the trailer box.", "ctrl": ["Full body harness with lanyards anchored to adequate point when near edges.", "Driver outside truck, hand brake engaged, wheel stopper installed while covering."]}, "ko": {"h": "트레일러박스 커버링 중 스캐폴딩 플랫폼에서 추락", "ctrl": ["가장자리 작업 시 전신하네스 앵커 고정", "커버링 중 운전자는 트럭 밖, 핸드브레이크·휠스토퍼 적용"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Unsecured/unstable debris may fall off loader or trailer, risking operators/personnel.", "ctrl": ["Materials secured with proper restraints (straps/covering).", "Personnel kept out of danger zone around loader/trailer.", "Competent banksman controls dump truck movement with whistle.", "Only competent licensed driver operates vehicle; speed limit followed.", "Load covered with tarps if required."]}, "ko": {"h": "결박 미흡한 파쇄물 낙하로 위험", "ctrl": ["적정 결박(스트랩·덮개) 사용", "로더·트레일러 주변 위험구역 접근 통제", "뱅크스맨이 호루라기로 이동 통제", "유자격 면허 운전자만 운행, 제한속도 준수", "필요 시 타포린으로 적재물 덮음"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": false}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [{"title": {"en": "Lifting & Transporting Material Using Forklift/Fork Loader", "ko": "포크리프트로 자재 인양·운반"}, "steps": {"en": ["Slightly lift the fork inward to secure the load near the center of gravity, keep it as low as possible.", "Once positioned and ready to move, transport the material carefully, slowly, at controlled speed.", "While moving, continuously monitor the load/surroundings, adjust the mast as needed when safety may be compromised.", "When reaching destination, engage forklift brakes before lowering the fork slowly until the load fully rests on the ground; ensure forks are clear before backing away.", "Remove/withdraw the fork by slowly and carefully reversing to disengage from the load; visually check the load is stable and properly placed."], "ko": ["포크를 살짝 안쪽으로 들어 무게중심 근처에서 화물 고정, 최대한 낮게 유지", "위치 확정 후 신중하게 서행·통제된 속도로 운반", "이동 중 화물·주변을 지속 모니터링, 안전위협 시 마스트 조정", "목적지 도착 시 브레이크 체결 후 포크를 서서히 하강시켜 화물이 완전히 지면에 안착, 후진 전 포크가 화물에서 벗어났는지 확인", "서서히 신중하게 후진하여 포크를 화물에서 분리, 화물이 안정적으로 배치됐는지 육안 확인"]}}, {"title": {"en": "Loading of Scrap Items Using Grabber or Wheel Loader", "ko": "그래버·휠로더로 스크랩 상차"}, "steps": {"en": ["Scrap pipes, sandwich panel, steel, wood and plastic can be loaded to the trailer using grabber or wheel loader."], "ko": ["스크랩 배관, 샌드위치패널, 강재, 목재, 플라스틱은 그래버 또는 휠로더로 트레일러에 상차"]}}, {"title": {"en": "Loading & Transporting Materials Using Trailer Truck", "ko": "트레일러트럭으로 자재 상차·운반"}, "steps": {"en": ["Position the truck into the designated and correct position.", "Ensure the truck is on a level surface.", "Choke the wheel with a stopper/wedge to avoid movement.", "Check the truck bed is free from obstruction and has no damaged sections/parts.", "Check the material/load doesn't exceed truck load capacity before loading.", "Load the material onto the truck bed and ensure weight is equally distributed, especially for asymmetrical/irregularly shaped loads.", "Provide and use bed support, pads or wedges to lock and ensure material doesn't move during travel.", "Secure the load by lashing at strategic points/locations to ensure it's tightly secured."], "ko": ["지정된 정위치에 트럭 배치", "트럭이 평탄한 면에 있는지 확인", "휠스토퍼/쐐기로 이동 방지", "적재함에 장애물·손상 없는지 확인", "상차 전 자재가 트럭 적재용량을 초과하지 않는지 확인", "적재함에 자재 적재, 특히 비대칭·불규칙 형상은 무게 균등분산 확인", "베드서포트·패드·쐐기로 운송 중 이동 방지 고정", "전략적 지점을 결속하여 화물이 견고히 고정되도록 조치"]}}, {"title": {"en": "Covering the Trailer Box / Dump Truck", "ko": "트레일러박스/덤프트럭 덮개작업"}, "steps": {"en": ["Use the scaffolding platform to access the trailer box located in Encheon Camp.", "Ensure trailer truck is choked by wheel stopper before accessing the trailer box.", "Carefully access the trailer box slowly; begin to unroll the tarpaulin/mesh from the truck head to the rear; drop ropes/straps around the trailer box.", "The driver on the ground does the tie-down, using heavy duty ropes/straps to secure the edges, starting at one end and working around the sides.", "Check the tarpaulin/mesh fully covers the dump truck with no gaps that could lead to spillage; ensure covering is large enough to cover the box completely.", "Double check the tightness of all straps and ropes to be secure enough to prevent wind/movement from dislodging it.", "Submit the loaded trailer truck to the HSJV in-charge person for post-inspection through the Heavy Vehicles Inspection Checklist."], "ko": ["엔천캠프 소재 스캐폴딩 플랫폼으로 트레일러박스 접근", "박스 접근 전 휠스토퍼로 트레일러 고정 확인", "서서히 신중하게 접근, 타포린/메쉬를 트럭 앞에서 뒤쪽으로 전개, 박스 주변에 로프/스트랩 걸어두기", "지상 운전자가 중량 로프/스트랩으로 가장자리부터 순차적으로 결박", "타포린/메쉬가 완전히 덮여 유출틈 없는지 확인, 박스 전체를 덮을 만큼 충분한지 확인", "전 스트랩·로프 조임상태 재확인(바람·이동에 풀리지 않도록)", "적재 완료된 트레일러트럭을 HSJV 담당자에게 제출, 대형차량점검체크리스트로 사후검사"]}}], "fullControls": {"en": ["Perform pre use inspections and regular maintenance of all equipment to ensure they are in good working condition.", "Ensure all equipment are in good working condition.", "Pre check the trailer or dump truck as per Heavy Vehicle (Temporary Short Term) Inspection Checklist (Daily) before going out for each load", "Ensure the inspections and repairs every 3 months to catch potential problems early.", "In case of breakdown, have an inside BNPP mechanic inspect the vehicle/equipment onsite.", "Determine if repairs can be done onsite or if parts are needed from elsewhere.", "If unsafe to travel, arrange for repairs onsite or bring necessary resources to the location.", "Supervisor/foreman should conduct pre job meeting before start to work.", "All trailer / container condition must be inspected weekly.", "When Transport material makes sure to follow time schedule from HSE", "Operate the wheel loader/excavator slowly and smoothly to avoid sudden movements that could cause tipping.", "Use full body harness with lanyards anchored to an adequate anchor point if working near edges.", "While a worker is covering the trailer box, ensure that the driver is outside the truck, hand break is engaged and wheel stopper is installed to avoid sudden movement of the truck.", "Secure materials on the loader and trailer with proper restraints (straps or covering) to prevent debris from falling.", "Keep personnel out of the danger zone (the area around the loader and trailer).", "Provide competent banksman to control the movement of dump truck in the workplace", "Banksman or signalman must be equipped with a whistle to alarm or to warn common people when they get near a moving equipment.", "All materials loaded vehicles must secure Heavy Vehicle Inspection Checklist, to be checked and approved by HSJV HSE.", "Use the appropriate vehicle for the task having the correct capacity to carry the load.", "Ensure that the transport vehicle is well maintained and inspected regularly", "Only competent driver with valid license will be allowed to drive the vehicle.", "Always follow the allowable speed limit.", "Use straps, chains, or other securing methods to ensure that the load is stable and won’t move during transport.", "If required, cover the load with tarps to prevent debris from falling off and to protect items from weather"], "ko": ["전 장비의 사용전점검 및 정기정비 실시하여 양호작동상태 확인.", "전 장비 양호작동상태 확인.", "매 운반 출발 전 대형차량(임시단기)점검체크리스트(일일)로 트레일러/덤프트럭 사전점검.", "조기 문제파악 위해 3개월마다 점검·수리 실시.", "고장 시 BNPP 내부 정비사가 현장에서 차량/장비 점검.", "현장수리 가능 여부 또는 타 지역 부품 필요 여부 판단.", "이동이 안전하지 않을 경우 현장수리 준비 또는 필요자원 현장반입.", "작업 시작 전 감독자/작반장이 사전작업회의 실시.", "전 트레일러/컨테이너 상태는 매주 점검 필수.", "자재 운반 시 HSE 배정 일정 준수 확인.", "전복 유발 급격한 움직임 방지 위해 휠로더/엑스카베이터를 서행·완만하게 조작.", "가장자리 인근 작업 시 적정 앵커포인트에 결속된 전신하네스 사용.", "작업자가 트레일러박스 덮개작업 중 운전자는 트럭 밖에 대기, 핸드브레이크 체결, 휠스토퍼 설치하여 트럭의 갑작스러운 이동 방지.", "로더·트레일러 상 자재는 적정 결속(스트랩·덮개)으로 낙하 방지.", "위험구역(로더·트레일러 주변)에 비인가자 접근 통제.", "작업장 내 덤프트럭 이동 통제를 위한 숙련 뱅크스맨 배치.", "뱅크스맨/신호수는 호루라기를 지참하여 이동장비 접근 시 일반인에게 경보/경고.", "자재 적재된 차량은 대형차량점검체크리스트 확보, HSJV HSE 점검·승인 필수.", "작업에 맞는 적정 용량의 차량 사용.", "운송차량이 잘 정비되고 정기점검 받는지 확인.", "유효면허 보유한 숙련 운전자만 차량 운전 허용.", "허용 제한속도 항상 준수.", "스트랩, 체인 등 결속수단 사용하여 운송 중 하중 안정·고정 확인.", "필요 시 타포린으로 하중을 덮어 낙하 방지 및 기상으로부터 보호."]}}, {"id": 1111, "cat": "general", "title": {"en": "Emergency Rescue Plan", "ko": "비상구조계획"}, "short": {"en": "Emergency Rescue Plan", "ko": "비상구조계획"}, "tools": [], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Lack of training may cause delay/late response to emergency, resulting in fatality or property damage.", "ctrl": ["Emergency rescue plan available and understood by all operatives.", "Rescue equipment available (tripod, electric mini winch, full body harness, spine board, fold-away stretcher as needed).", "All operatives know Emergency Hotline (800 7 999).", "Site clinic notified with full injury circumstance details.", "Emergency transport to clinic available at all times.", "Rescue/first aid personnel trained for confined space emergencies.", "First aid kit & fire extinguisher available and accessible at all times.", "Rescue leader/coordinator designated for emergency control.", "Suspended person in harness must be rescued within 15 minutes to avoid suspension trauma."]}, "ko": {"h": "훈련 부족으로 비상대응 지연, 사망/재산피해 위험", "ctrl": ["전 작업자가 비상구조계획 숙지", "구조장비(트라이포드, 전동윈치, 전신하네스, 스파인보드, 접이식들것) 비치", "전 작업자 비상핫라인(800 7 999) 인지", "현장 클리닉에 상세 상황 통보", "클리닉 비상이송 상시 확보", "구조·응급처치 인력 밀폐공간 비상훈련 이수", "구급함·소화기 상시 비치, 접근성 확보", "비상상황 통제할 구조리더 지정", "현수구조자는 15분 이내 구조(현수외상 방지)"]}, "ls": 3, "cs": 3, "r1": 9, "ls2": 1, "cs2": 3, "r2": 3, "res": "L", "ptw": false}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [], "fullControls": {"en": ["Emergency rescue plan must be available and understand by all operatives.", "Emergency Rescue equipment required must be available such as Tripod, Electric Powered Mini Winch, full body harness, and spine board and fold away stretcher depending on the needs. (Tripod & electric winch shall be used where stretcher not applicable to use.)", "All operatives must know the Emergency contact number (800 7 999) and knows how to report an emergency situation.", "Site clinic should be notified by mobile phone and provided with full information on the circumstances of the injury including any exposure to toxic substances.", "Emergency transportation to site clinic must be available all the time.", "Rescue and first aid personnel must be well trained in an emergency situation inside a confined space.", "First Aid kit and fire extinguisher must be available at all times and very accessible to all operatives.", "Communication equipment should be available to rescuers such as two-way radio, mobile phone, and megaphone and whistle whatever is practicable.", "A rescue leader or coordinator must be designated to take control in an emergency situation.", "Emergency evacuation route must be available and mentioned clearly in an emergency plan.", "All rescuers must be aware that a suspended person in a harness in a retrieval operation must be rescued within 15 minutes to avoid suspension trauma"], "ko": ["비상구조계획을 전 작업자가 확보·숙지 필수.", "필요 구조장비(트라이포드, 전동미니윈치, 전신하네스, 스파인보드, 접이식들것) 상황에 맞게 확보. (들것 사용 불가 상황엔 트라이포드·전동윈치 사용)", "전 작업자는 비상연락처(800 7 999) 및 비상상황 신고방법 숙지 필수.", "현장클리닉에 휴대폰으로 통보, 유해물질 노출 포함 부상상황 전체정보 제공.", "클리닉으로의 비상이송 상시 확보.", "구조·응급처치 인력은 밀폐공간 내 비상상황에 대해 충분히 훈련받아야 함.", "구급함·소화기는 상시 비치, 전 작업자가 쉽게 접근 가능해야 함.", "구조자용 통신장비(무전기, 휴대폰, 메가폰, 호루라기 등) 실행가능한 범위에서 확보.", "비상상황 통제를 위한 구조리더/코디네이터 지정 필수.", "비상대피동선을 확보하고 비상계획에 명확히 명시.", "하네스 착용 중 인양작업으로 매달린 인원은 현수외상 방지 위해 15분 이내 구조되어야 함을 전 구조자가 인지."]}}, {"id": 1112, "cat": "general", "title": {"en": "Working at Height", "ko": "고소작업"}, "short": {"en": "Working at Height", "ko": "고소작업"}, "tools": [], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Falling from work above 1.8m or scaffolding (e.g. covering trailer box, scaffold erection) may cause serious injury or fatality.", "ctrl": ["Daily tool box talk on hazards & precautions.", "Full body harness (100% tie-off) used during work at height.", "All workers sufficiently trained for work at height.", "Safe access & working platform provided.", "Scaffolding system erected to withstand intended load.", "Scaffolds inspected, scaffold tag updated every 7 days.", "Edge protection provided where fall of 1.8m is possible.", "Working at height training completed prior to scaffold use.", "No alteration/modification without scaffolding supervisor permission.", "Base protection installed to prevent falling material injuries below.", "Only certified scaffolder does scaffolding work."]}, "ko": {"h": "1.8m 이상 고소·스캐폴딩 작업 중 추락, 중대부상/사망", "ctrl": ["매일 툴박스토크로 위험요소·주의사항 공유", "고소작업 시 전신하네스 100% 체결", "전 작업자 고소작업 교육 이수", "안전한 접근로·작업발판 제공", "스캐폴딩은 예상하중 견딜 수 있게 조립", "7일마다 스캐폴드 점검·태그 갱신", "1.8m 이상 추락위험구역에 가장자리 방호", "스캐폴드 사용 전 고소작업 교육 이수", "스캐폴딩 감독자 승인 없이 변경 금지", "하부 방호로 낙하물 부상 방지", "인증 스캐폴더만 작업"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Falling from a ladder / ladder collapse.", "ctrl": ["Ladder inspected, in good condition.", "3-point contact maintained while using ladder.", "Ladder regularly cleaned, mud/slippery materials removed."]}, "ko": {"h": "사다리 추락/붕괴", "ctrl": ["사다리 점검, 양호상태 유지", "사용 중 3점 지지 유지", "정기 청소, 미끄럼물질 제거"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": true}, {"en": {"h": "Sudden movements can lead to loss of balance and falling, resulting in serious injury (mobile scaffold use).", "ctrl": ["Mobile scaffolds moved only on firm, level surfaces.", "Wheels sized/fixed correctly at each base corner, secured against falling out.", "Never move mobile scaffold in windy conditions.", "Caster wheel brakes applied while in use.", "Outrigger bracings placed at each corner where practicable.", "Safety harness/tool belt worn at all times, 100% tie-off enforced."]}, "ko": {"h": "이동식 스캐폴드 사용 중 급격한 움직임으로 균형상실 추락", "ctrl": ["이동식 스캐폴드는 평탄지면에서만 이동", "휠은 각 모서리에 정확히 고정", "강풍 시 이동식 스캐폴드 이동 금지", "사용 중 캐스터 브레이크 적용", "가능한 각 모서리에 아웃리거 브레이싱 설치", "안전벨트·공구벨트 상시 착용, 100% 체결"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [], "fullControls": {"en": ["Conduct daily tool box talk discussing hazards and safety precautions in the workplace.", "Use full body harness (100% tie off) during working at height", "Ensure that all workers who will perform work at height have sufficient training.", "Safe access and working platform to be provided for work areas at height.", "The scaffolding system should be erected and capable of withstanding the required intended load.", "Scaffolds must be inspected and with updated scaffold tag to be updated every 7 days.", "All tools & materials should be securely tied off to structure or tool belt.", "Edge protection must be provided to all areas where a fall of 1.8 meter is possible.", "Working at height training to be completed by all workers prior to use of any scaffold.", "Do not alter or modify scaffolding without permission from scaffolding supervisor.", "Provide protection on the base of the of scaffold using hard barricade and to eliminate the risk of nearby workers being hit by falling materials from above.", "Only certified scaffolder is allowed to do scaffolding work", "Ensure scaffold tag is completed with all essential details.", "Ensure that scaffold has been erected in compliance with the manufacture’s specification or the design drawings provided by the design team.", "Ladder must be inspected and in good condition.", "Maintain 3-point contact while using a ladder.", "Regularly clean the ladder and remove mud or other slippery materials that may cause slipping.", "Mobile scaffolds shall only be moved on firm and levelled surfaces", "Wheels will be used which suit the size and loading of the scaffold. They must be fixed to each extreme corner of the base of the mobile scaffold and secured so that they cannot fall out when tower is moved.", "Never move the mobile scaffold on windy condition.", "Apply the caster wheel brakes while the mobile scaffold in use.", "Ensure that the working platform and surrounding area adequately protected from falling debris / objects.", "Safety harness and tool belt should always be worn at all times while working at height & proper anchorage of safety hook must be strictly observed (100% tie off).", "Outrigger bracings shall be placed at each corner of mobile scaffolding where ever practicable."], "ko": ["매일 툴박스토크로 작업장 위험요소·안전주의사항 논의.", "고소작업 중 전신하네스(100% 체결) 사용.", "고소작업 수행 전 작업자 충분한 교육 이수 확인.", "고소작업구역에 안전한 접근로·작업발판 제공.", "스캐폴딩시스템은 요구되는 예상하중을 견딜 수 있도록 조립.", "스캐폴드는 점검받고 7일마다 최신 스캐폴드태그로 갱신 필수.", "전 공구·자재는 구조물이나 공구벨트에 견고히 결박.", "1.8m 추락 가능구역 전체에 가장자리방호 제공 필수.", "스캐폴드 사용 전 전 작업자 고소작업 교육 이수 필수.", "스캐폴딩감독자 승인 없이 변경·개조 금지.", "스캐폴드 기초부에 경질바리케이드로 방호 제공, 위에서 떨어지는 자재로 인근 작업자 타격위험 제거.", "인증 스캐폴더만 스캐폴딩 작업 허용.", "스캐폴드태그는 필수정보 전체 포함하여 작성 확인.", "스캐폴드가 제조사 사양 또는 설계팀 제공 도면에 맞게 조립됐는지 확인.", "사다리는 점검받고 양호상태 확인.", "사다리 사용 중 3점 접촉 유지.", "사다리를 정기적으로 청소하고 미끄러움 유발 진흙 등 이물질 제거.", "이동식 스캐폴드는 견고·평탄한 면에서만 이동.", "스캐폴드 크기·하중에 맞는 휠 사용. 이동식 스캐폴드 기초 각 모서리에 고정, 이탈 방지 확보 타워 이동 시.", "강풍 상황에서 이동식 스캐폴드 이동 절대 금지.", "이동식 스캐폴드 사용 중 캐스터휠 브레이크 적용.", "작업발판·주변구역이 낙하 잔해/물체로부터 적절히 방호되는지 확인.", "고소작업 중 안전벨트·공구벨트는 항상 착용, 안전고리의 적절한 결속을 엄격히 준수(100% 체결).", "가능한 경우 이동식 스캐폴드 각 모서리에 아웃리거 브레이싱 설치."]}}, {"id": 1113, "cat": "general", "title": {"en": "Working Inside a Confined Space", "ko": "밀폐공간 작업"}, "short": {"en": "Confined Space Work", "ko": "밀폐공간 작업"}, "tools": [], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Oxygen deficiency may cause loss of consciousness or death when entering a confined space.", "ctrl": ["All workers for the task undergo confined space training.", "Authorized gas tester performs gas test prior to entry.", "Entry only after gas test or with portable 4-in-1 gas monitor.", "Oxygen level maintained between 19.5%-23.5%.", "Certified trained operative and hole watcher available.", "Suitable entry/exit means for equipment/personnel.", "Mechanical ventilation (fan/blower/trunk) for adequate airflow.", "Pre-work assessment & permit to work (confined space entry checklist).", "Emergency Rescue Plan in place."]}, "ko": {"h": "밀폐공간 진입 시 산소결핍으로 실신/사망", "ctrl": ["작업 전 전 작업자 밀폐공간 교육 이수", "진입 전 인증 가스테스터가 가스테스트 실시", "가스테스트 또는 휴대용 4-in-1 가스측정기 확인 후 진입", "산소농도 19.5~23.5% 유지", "인증 작업자·홀워처 배치", "장비·인원용 적절한 출입경로 확보", "환풍기 등 기계환기로 충분한 통기 확보", "작업전 평가 및 PTW(밀폐공간출입 체크리스트)", "비상구조계획 수립"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Oxygen enrichment increases fire/explosion risk, potentially resulting in fatality or property damage.", "ctrl": ["No power-operated tools used unless area confirmed free of explosive gases; if detected, stop work and tag out.", "Authorized gas tester tests atmospheric condition before entry.", "RPE (Respiratory Protective Equipment) provided if toxic/hazardous gases detected.", "Oxygen level maintained 19.5%-23.5%; oxygen cylinders not introduced into confined space.", "Explosion-proof/intrinsically safe lighting devices used.", "Adequate illumination inside confined space; clear safety goggles provided."]}, "ko": {"h": "산소과잉으로 화재/폭발 위험, 사망/재산피해", "ctrl": ["폭발성가스 미확인 시 동력공구 사용금지, 검출 시 작업중지·태그아웃", "진입 전 인증 가스테스터가 대기상태 측정", "유해가스 검출 시 호흡보호구(RPE) 지급", "산소농도 19.5~23.5% 유지, 산소실린더 밀폐공간 반입 금지", "방폭·본질안전 조명기구 사용", "밀폐공간 내 충분한 조명 확보, 투명 보안경 지급"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [], "fullControls": {"en": ["All the workers for the task must undergo confined space training.", "Authorized Gas Tester should perform gas test prior any entry into a confined space.", "Any persons authorized to enter a confined space can only enter if there has been a gas test conducted or in possession of a portable 4 in 1 gas monitor to ensure the area is safe to enter.", "Oxygen level should be between 19.5% to 23.5%", "Certified and trained operative and hole watcher must be available", "Provide suitable and sufficient means of entry and exit for equipment and personnel", "Mechanical ventilation using fan / blower and trunk to ensure adequate airflow", "Pre work assessment and permit to work. (Complete confined space entry check list before entry)", "Emergency Rescue Plan must be in place.", "Ensure no power operated tools are used unless it is ensured the area is free from explosive gases. If explosive gases are detected all the work to be stopped and the area to be tagged out.", "Authorized Gas Tester to test atmospheric condition before entry on a confined space.", "RPE (Respiratory Protective Equipment) must be provided if any toxic or hazardous gases have been detected.", "Emergency rescue plan must be in place.", "Oxygen level should be between 19.5% to 23.5%", "Do not introduce Oxygen supply or cylinders into the confined space", "Use explosion proof or intrinsically safe lighting devices.", "Adequate illumination must be provided inside a confined space.", "Provide workers with clear safety goggles"], "ko": ["해당 작업의 전 작업자는 밀폐공간 교육 이수 필수.", "인증 가스테스터가 밀폐공간 진입 전 가스테스트 실시.", "밀폐공간 진입 인가자는 가스테스트 실시 또는 휴대용 4-in-1 가스모니터 소지 시에만 진입 가능, 구역 안전 확인.", "산소농도는 19.5%~23.5% 유지.", "인증·숙련 작업자 및 홀워처(감시자) 배치 필수.", "장비·인원용 적절하고 충분한 출입경로 제공.", "팬/블로워·트렁크를 이용한 기계환기로 충분한 공기흐름 확보.", "작업전평가 및 작업허가(PTW) 확보. (진입 전 밀폐공간출입 체크리스트 완료)", "비상구조계획 수립 필수.", "폭발성가스 없음이 확인되지 않는 한 동력공구 사용 금지. 폭발성가스 검출 시 전 작업 중지 및 구역 태그아웃.", "인증 가스테스터가 밀폐공간 진입 전 대기상태 테스트.", "유해·독성가스 검출 시 호흡보호구(RPE) 지급 필수.", "비상구조계획 수립 필수.", "산소농도는 19.5%~23.5% 유지.", "밀폐공간 내 산소공급/실린더 반입 금지.", "방폭 또는 본질안전 조명기구 사용.", "밀폐공간 내부 충분한 조명 제공 필수.", "작업자에게 투명 보안경 지급."]}}, {"id": 1114, "cat": "general", "title": {"en": "Housekeeping / Manual Handling", "ko": "정리정돈/수동취급"}, "short": {"en": "Housekeeping & Manual Handling", "ko": "정리정돈/수동취급"}, "tools": [], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Awkward lifting & reaching may result in back injuries; slip, trip and fall from wet/cluttered walkways.", "ctrl": ["Adequate resources used for manual handling tasks.", "All workers attend HSJV Manual Handling training.", "Mechanical material handling equipment used where possible.", "Walkways and exits kept clear of obstructions.", "Hazardous/special waste disposed at designated collection point."]}, "ko": {"h": "부적절한 인양·뻗침으로 요통, 젖거나 어수선한 통로에서 슬립/트립/전도", "ctrl": ["수동취급 작업에 적정 자원 투입", "전 작업자 수동취급 교육 이수", "가능한 기계식 자재취급장비 사용", "통로·출구 장애물 제거", "유해/특수폐기물은 지정수거장소에 폐기"]}, "ls": 3, "cs": 3, "r1": 9, "ls2": 1, "cs2": 3, "r2": 3, "res": "L", "ptw": false}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [], "fullControls": {"en": ["Adequate resource to be used for manual handling tasks", "All workers must attend HSJV Manual handling training", "Use mechanical material handling equipment if possible", "Maintain walkways and exits clear from obstructions.", "Dispose of this material and its container to hazardous or special waste collection point"], "ko": ["수동취급 작업에 적정 자원 투입.", "전 작업자 HSJV 수동취급 교육 이수 필수.", "가능한 경우 기계식 자재취급장비 사용.", "통로·출구는 장애물 없이 유지.", "해당 자재와 용기는 유해물질/특수폐기물 수거장소에 폐기."]}}, {"id": 1019, "cat": "work", "title": {"en": "8. Demolition of Building/Warehouse (Concrete Structure)", "ko": "8. 건물·창고 철거 (콘크리트 구조)"}, "short": {"en": "Concrete Structure Demolition", "ko": "콘크리트 구조물 철거"}, "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "tools": ["Excavator with breaker attachment", "Excavator with grabber attachment", "Excavator with shear cutter attachment", "Excavator with bucket"], "wms": {"en": [], "ko": []}, "wmsProcedures": [{"title": {"en": "Demolition Using Excavator with Breaker Attached", "ko": "브레이커 부착 엑스카베이터로 철거"}, "steps": {"en": ["Position the excavator on stable, level ground outside the collapse zone.", "Start from the top of the structure and work downward.", "Target edges and corners first, weakening the structure gradually.", "Break concrete slabs, beams, and columns using the breaker's vertical impact force.", "Once the building is totally collapsed, break large chunks into smaller pieces and segregate rebar from concrete to ease handling and hauling."], "ko": ["붕괴예상구역 밖 안정·평탄 지반에 엑스카베이터 배치", "구조물 상부부터 시작하여 하부로 진행", "가장자리·모서리부터 목표하여 점진적으로 구조 약화", "브레이커의 수직충격력으로 콘크리트 슬래브·보·기둥 파쇄", "건물이 완전 붕괴된 후 대형 파쇄물을 소형화, 철근과 콘크리트를 분리하여 취급·반출 용이하게 함"]}}, {"title": {"en": "Demolition Using Excavator with Breaker & Grabber", "ko": "브레이커·그래버 병용 엑스카베이터로 철거"}, "steps": {"en": ["Dismantle wall panels around the structure with the help of a manlift.", "Use excavator with breaker/grabber (or pairing with another excavator, depending on structure size) to push the upper face of the column from one side, short direction; push and back simultaneously creating lateral stress until visibly buckling; continue for controlled collapse.", "Dismantle the roof panel with the help of a manlift (refer Task Step 12 - Use of Manlift).", "Excavator with shear cutter or breaker shall dismantle and cut the collapsed structure into smaller pieces.", "Excavator with grabber/grapple then removes & cleans items and rubbish around the collapsed structure.", "Manpower removes rivets and screws of roof panel using battery drill and hand tools; hard-to-remove panels dismantled by grabber or excavator.", "Shear cutter cuts remaining structural frame from top to bottom into smaller pieces.", "Finally break all remaining concrete (slab on grade & foundations) using breaker.", "All demolished items shall be stocked in a temporary storage area, segregating rebar and concrete."], "ko": ["맨리프트로 구조물 주변 벽패널 해체", "브레이커/그래버 부착 엑스카베이터(구조 규모에 따라 2대 병용)로 기둥 상부면을 짧은방향 한쪽에서 밀기, 밀고-당기기를 동시에 수행하여 횡하중 발생, 육안으로 좌굴이 보일 때까지 지속, 통제된 붕괴가 되도록 진행", "맨리프트로 지붕패널 해체(작업순서 12번 맨리프트 참조)", "전단절단기/브레이커 부착 엑스카베이터로 붕괴구조물을 소형화 절단", "그래버 부착 엑스카베이터로 잔해·철재류 제거 및 주변 정리", "인력이 배터리드릴·수공구로 지붕패널 리벳·나사 제거, 제거 어려운 패널은 그래버/엑스카베이터로 해체", "전단절단기로 잔존 구조프레임을 상부에서 하부로 소형화 절단", "최종적으로 잔존 콘크리트(바닥슬래브·기초)는 브레이커로 파쇄", "전 철거자재는 임시야적장에 철근·콘크리트로 구분 야적"]}}, {"title": {"en": "Dismantling of Collapsed Beams & Columns", "ko": "붕괴된 보·기둥 해체"}, "steps": {"en": ["Collapsed beams & columns shall be cut into smaller pieces using an excavator breaker."], "ko": ["붕괴된 보·기둥은 브레이커 부착 엑스카베이터로 소형화 절단"]}}], "hazards": [{"en": {"h": "Sudden collapse while pushing & demolishing the structure, causing it to fall onto workers or equipment, leading to injuries or fatality.", "ctrl": ["Workers kept at safe distance from areas of expected collapse.", "Exclusion zone via barricades/signage; no entry during demolition.", "Thorough structural assessment before starting work.", "Excavator on level ground, outriggers/stabilizers used.", "Only qualified, trained operators with valid TPC."]}, "ko": {"h": "밀기·철거 중 갑작스런 붕괴로 작업자·장비에 낙하, 부상/사망", "ctrl": ["예상 붕괴구역에서 안전거리 유지", "바리케이드·사이니지로 통제구역 설정, 진입 금지", "작업 전 구조 안정성 평가", "엑스카베이터는 평탄지반, 아웃리거 사용", "유자격·TPC 오퍼레이터만 조작"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Excavator can become unstable on uneven ground, tipping over — operator injury or equipment damage.", "ctrl": ["Daily pre-start checklist inspection (morning & afternoon).", "Excavator properly maintained per manufacturer schedule.", "Trained certified signal man on each excavator."]}, "ko": {"h": "불균일 지반에서 엑스카베이터 불안정, 전복", "ctrl": ["매일 사용전점검(오전·오후)", "제조사 일정에 따른 정비", "엑스카베이터별 인증 신호수 배치"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en":
