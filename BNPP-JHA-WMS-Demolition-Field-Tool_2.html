ng.", "Identify all energy sources & other hazards via physical inspection using scanner/detector for buried cables.", "Shut down all powered equipment/systems (HVAC, lighting, etc.).", "Once identified, LOTO operator isolates the energy sources.", "LOTO operator places locks on all electrical LOTO points.", "Attach utility disconnection signage (person in charge, date, contact info, building name, panel ID from/to).", "Certified electrician tests circuits to confirm absence of voltage using a properly rated meter/tester.", "LOTO operator maintains a log of what was locked/tagged out and by whom.", "Certified electrician disconnects the cable from panel, wraps cable ends with electrical tape.", "If required: re-energize the power supply.", "LOTO operator removes locks, tags, and other isolating devices.", "Slowly and carefully restore the energy source.", "Monitor system as it powers up for abnormal signs (noise, sparks, vibration) & perform a test run."], "ko": ["전기·유지보수·LOTO팀과 현장 합동점검으로 공급위치 파악", "스캐너/탐지기로 물리적 점검하여 에너지원·매설케이블 등 위험요소 식별", "전 동력설비·시스템(공조, 조명 등) 전원 차단", "식별 후 LOTO담당자가 에너지원 절연", "LOTO담당자가 전 전기 LOTO 포인트에 잠금장치 설치", "절연 표지 부착(담당자명, 날짜, 연락처, 건물명, 패널 ID from/to)", "인증 전기기술자가 정격 계측기로 무전압 확인 테스트", "LOTO담당자가 잠금/태그 대상 및 담당자 기록 유지", "인증 전기기술자가 패널에서 케이블 분리, 케이블 끝단 절연테이프 마감", "필요 시 재통전", "LOTO담당자가 잠금장치·태그 제거", "서서히 신중하게 전원 복귀", "기동 중 이상신호(소음·스파크·진동) 모니터링 및 시운전"]}}, {"title": {"en": "Sewage Pipeline Disconnection by Mortar Plugging", "ko": "오수관 모르타르 플러깅 차단"}, "steps": {"en": ["If pipe is in use, shut off flow to ensure it's empty during sealing.", "Clean inside/outside of pipe where mortar will be applied; remove debris/grease/dirt with wire brush/rag.", "Ensure inside of pipe is dry before applying mortar.", "If pre-mixed mortar, follow packaging instructions; if mixing, combine cement:sand at ~1:3 with water to workable paste.", "Mix until thick, paste-like consistency, not watery.", "Mortar should hold its shape when scooped with a trowel.", "For larger pipes, cs": 3, "r1": 9, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Installation of End Cap/Fittings by Butt Fusion Welding", "ko": "엔드캡·피팅 설치 (버트퓨전 용접)"}, "steps": {"en": ["Ensure water line valve is closed via LOTO before cutting pipe.", "Cutting point/length based on approved underground demolition drawing & site condition; joined via butt or electro fusion welding.", "Drain the line completely (open hydrant/faucet, etc.).", "In butt welding, both pipe ends pressed against a hot plate at constant temperature/pressure.", "Pipe pressed together so material molecules transfer between them.", "Check equipment before hot plate welding: hot plate temperature set per procedure, clean & free of grease.", "Ensure pipe brackets and supports correctly aligned.", "Pipe clamps adjusted to hold pipe tight enough for welding force.", "Press pipe ends against hot plate with brief high pressure.", "Continue heating at low pressure until 1mm upstand forms.", "Quickly remove hot plate, slowly increase welding pressure.", "Hold welding pressure steady, allow weld to cool.", "Remove joint, inspect weld; irregular weld seam rejected.", "Once cooled, slowly open valve to restore water supply."], "ko": ["절단 전 LOTO로 급수밸브 차단 확인", "승인 지하철거도면·현장상태에 따라 절단지점/길이 결정, 버트/전기융착 용접으로 접합", "배관 완전 배수(소화전/수도꼭지 개방 등)", "버트용접은 양쪽 배관 끝을 일정 온도·압력의 열판에 밀착", "분자가 서로 전이되도록 압착", "용접 전 장비점검: 열판온도 절차대로 설정, 청결·그리스 제거 확인", "배관 브라켓·서포트 정렬 확인", "용접압력을 견딜 만큼 배관클램프 조임", "배관 끝을 열판에 짧게 고압 압착", "1mm 융기가 형성될 때까지 저압으로 계속 가열", "열판을 신속히 제거 후 서서히 용접압력 증가", "용접압력 유지하며 냉각", "접합부 제거 후 용접부 검사, 불균일한 용접선은 불합격 처리", "냉각 후 서서히 밸브 개방하여 급수 복구"]}}, {"title": {"en": "Installation of End Cap Using Compression End Cap", "ko": "엔드캡 설치 (압축형)"}, "steps": {"en": ["Ensure water line valve closed via LOTO before cutting pipe.", "Cut pipe per approved drawing & site condition, ensure straight cut.", "Slide compression nut onto ator", "ko": "굴착 (엑스카베이터 사용)"}, "steps": {"en": ["Supervisor checks soil conditions (clay/sandy/rocky) to plan excavation method/slope.", "Set up barriers/signage around excavation to keep unauthorized personnel out.", "Set up excavator on firm, level ground; lower and fully extend stabilizers.", "Begin digging from far end of trench/pit, work toward the operator.", "Dig in layers rather than scooping too much at once.", "Pile excavated soil at least 1 meter from trench edge.", "Use grade stakes/string lines to maintain correct depth/slope.", "Keep excavation stable via sloping/benching per trench depth and soil type.", "Smooth bottom and sides of trench/pit using the backhoe bucket."], "ko": ["감독자가 토질(점토/사질/암반) 확인하여 굴착방법·경사 계획", "굴착구역 주변 방호책·사이니지로 비인가자 통제", "견고·평탄한 지반에 엑스카베이터 설치, 스태빌라이저 하강·완전전개", "트렌치/피트 먼 쪽부터 굴착 시작, 오퍼레이터 쪽으로 진행", "한번에 많이 뜨지 않고 층별로 굴착", "굴착토는 트렌치 가장자리에서 최소 1m 이격 적치", "측량말뚝/줄자로 정확한 깊이·경사 유지", "트렌치 깊이·토질에 따라 경사/단계조성으로 안정성 확보", "백호 버켓으로 트렌치/피트 바닥·측면 정리"]}}, {"title": {"en": "Excavation Using Hand Shovel", "ko": "굴착 (수작업)"}, "steps": {"en": ["Loosen soil; if compact/rocky use pick axe or crow bar, never use pointed tools after 30cm of excavation.", "Using hand shovel, start digging at one end and work methodically across the area.", "Dig in layers, remove soil a few inches at a time for control/even depth.", "Keep sides sloped slightly depending on soil stability/depth.", "Pile soil at least 1 meter from edge of excavation.", "Use a wheelbarrow to relocate excess soil if needed."], "ko": ["토양 이완, 단단하거나 암반이면 곡괭이·크로바 사용, 굴착깊이 30cm 이후에는 뾰족한 공구 사용 금지", "삽으로 한쪽부터 체계적으로 굴착 시작", "층별로 조금씩 굴착하여 균일한 깊이 유지", "토질·깊이에 따라 측면 경사 조성", "굴착토는 굴착면에서 최소 1m 이격 적치", "필요 시 손수레로 잉여토 이동"]}}, {"title": {"en": "Backfilling, Levelling & Compaction Using Excavator", "ko": "되메우기·정지·다짐 (엑스카베이터 사용)"}, "steps": {"en": ["Remove debris/water from bottom of pit or trench if applicable.", "Backfill soil in layers 150-300mm thick, depending on compaction equipment and soil type.", "Avoid me: lay out end pieces, attach upper cross brace, secure ends to opposite frame; test stability (static) or move to position and verify level/secure (mobile).", "Place scaffolding planks: lift through bars into place, fasten with hardware, ensure fully planked.", "Install access: use ladders designed for the scaffold, or stair-ladders with handrails/treading; ensure access is safe to prevent tipping.", "Attach guard rails and toe boards."], "ko": ["지반 안정성·수평 확인", "안정된 기초를 위해 머드실/베이스플레이트 확보, 베이스플레이트를 머드실에 못박음, 불균일 지반은 높은쪽 굴착, 조정스크류로 수평조정, 급경사면은 다리연장재 사용", "이동식은 캐스터 설치, 위치 고정 후 잠금", "스캐폴드 프레임 조립: 양끝 부재 배치, 상부 크로스브레이스 부착, 반대편 프레임 하단에 고정, 정적형은 안정성 확인/이동식은 위치 이동 후 수평·고정 확인", "비계발판 설치: 파이프 사이로 들어올려 배치, 하드웨어로 고정, 완전 판넬링 확인", "출입구 설치: 스캐폴드 전용 사다리 또는 핸드레일·발판 있는 계단형 사다리 사용, 전도방지 위해 안전한 접근 확보", "가드레일·토보드 부착"]}}, {"title": {"en": "Dismantling of Scaffolding", "ko": "스캐폴드 해체"}, "steps": {"en": ["Clear the area where components can be set down/stacked; provide vehicle access with a clear path to loading area.", "Dismantle in reverse order of erection: piping/guard rails first, then platform planking; pass components hand to hand or lower with rope/hoist system — never stack on structure temporarily or throw to ground; ensure no one stands directly below.", "Inspect dismantled components; segregate those needing disposal from those fit for reuse.", "A partially dismantled scaffold should not be left standing longer than necessary; if unavoidable, provide barricade & warning signs at access points."], "ko": ["부품을 내려놓고 쌓을 구역 정리, 적재구역까지 차량 접근로 확보", "조립의 역순으로 해체: 배관·가드레일 먼저, 다음 발판; 부품은 손에서 손으로 전달하거나 로프/호이스트로 하강 — 구조물에 임시 적재·투척 금지, 바로 아래 서있지 않기", "해체된 부품 점검, 폐기용/재사용 가능으로 구분", "부분 해체된 스캐폴드는 필요 이상 방치 금지, 불가피할 경우 출입지점에 바리케이드·경고표지 설치"]}}, {"title": {"en": "Installation of Lifeline", "ko": "라이프라인 설치"}, "steps": {"en": ["Vertical lifeline: minimum 19.05mm (3/4in) manila rope or equivalent, minimum breaking strength 2450kg; bowline knot applied at anchorage point.", "Horizontal lifeline: breaking strength calculated per manufacturer's specification; minimum 8mm wire rope or equivalent, minimum breaking strength 2267kg; both ends fastened at anchorage points using minimum 3 properly installed cable clamps; beam post installed every 3-meter distance to avoid sagging; both ends installed at anchorage points capable of carrying all loads acting on it."], "ko": ["수직 라이프라인: 최소 19.05mm(3/4인치) 마닐라로프 또는 동등품, 최소 파단강도 2450kg, 앵커포인트에 보울라인 매듭 적용", "수평 라이프라인: 제조사 사양에 따라 파단강도 산정, 최소 8mm 와이어로프 또는 동등품, 최소 파단강도 2267kg, 양단은 케이블클램프 3개 이상으로 앵커포인트에 고정, 처짐 방지 위해 3m마다 빔포스트 설치, 양단 앵커포인트는 작용하중 전체 지지 가능해야 함"]}}], "fullControls": {"en": ["All persons working at height to must wear a full body harness connected to an approved anchorage.", "Only competent scaffolder with third party certificate is allowed to modify a scaffold and under approval of scaffolding inspector", "Discuss the potential hazard of the job.", "Confirm competence of staff for the task; certifications and training passport records to be available at all times", "Scaffolding should only be designed, erected, altered & dismantled by a certified scaffold erector & inspected by certified inspector", "Scaffolding parts should be examined regularly for defects and don’t mix types or parts when fitting or assemble", "All tools & materials should be securely tied off to structure or tool belt.", "Erection, dismantling and modification of scaffold should only be done by certified and approved scaffolders.", "Provision of base plate for outriggers on ground.", "Ensure fall protection (guard rails, toe boards, false upright, etc.) and comply 100% tie off.", "Do not throw or dropping scaffold materials follow hand over techniques.", "No workers above mobile scaffold when moving from one place to another.", "Ensure red tag or do not use scaffold tag when scaffold is under erection, dismantling and modification", "Tagging (red, yellow or green) conducted by certified and approved scaffold inspector once scaffold erection, dismantling and modification.", "Perform a pre use inspection of all scaffolding components.", "Ensure only trained and competent workers are involved in the erection and use of scaffolding.", "Ensure all personnel on erection, use, and dismantling of mobile scaffolding are trained in working at height.", "Ensure scaffolding platforms are fully planked and secure.", "Lock wheels when the scaffolding is in use and ensure it is on a firm, level surface.", "Use personal fall arrest systems such as retractable fall arrester, harness and lanyards if applicable.", "Ensure that the scaffold has been erected in compliance with the manufactures specification or by the design drawing provided by the construction team.", "Only a certified scaffolding inspector should conduct the inspection.", "Ensure the scaffold tag is completed and approved with all essential details.", "Inspector should put green tag once the scaffold is safe and ready to use.", "All scaffolder must use tool lanyards to secure tools and prevent them from falling.", "Only competent scaffolder with third party certificate is allowed to install scaffolding fence.", "Provide perimeter barriers around the scaffolding fence to be installed to avoid unauthorized entry.", "Use personal fall arrest systems such as retractable fall arrester, harness and lanyards if applicable.", "Use board clamp to securely attach board in the transom.", "As much as possible, use mechanical lifting aids (e.g., fork loader or forklift) to lift heavy scaffolding tubes and components.", "Enforce buddy buddy or team lifting with objects more than 23 kg.", "Ensure all workers attended HSJV HSE Manual handling training."], "ko": ["고소작업 전 인원은 승인 앵커에 연결된 전신하네스 착용 필수.", "3rd party 인증받은 숙련 스캐폴더만 스캐폴드 변경 가능, 스캐폴딩 검사관 승인 하에.", "작업의 잠재위험 사전 논의.", "작업자 역량 확인, 인증·교육패스포트 기록을 상시 비치.", "스캐폴딩은 인증 조립자만 설계·조립·변경·해체, 인증 검사관이 검사.", "스캐폴드 부품 정기 결함점검, 조립/체결 시 종류·부품 혼용 금지.", "전 공구·자재를 구조물이나 공구벨트에 견고히 결박.", "스캐폴드 조립·해체·변경은 인증받은 스캐폴더만 수행.", "지반 아웃리거용 베이스플레이트 제공.", NPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Removal of Nonstructural Elements", "ko": "비구조 요소 철거"}, "steps": {"en": ["Remove furniture & appliances (bed, table, cabinet, appliances, etc.).", "Remove doors, windows, fixtures, floor tiles, wiring, plumbing, drywall, etc."], "ko": ["가구·비품 제거(침대, 테이블, 캐비닛, 가전 등)", "문, 창문, 부속물, 바닥타일, 배선, 배관, 드라이월 등 제거"]}}, {"title": {"en": "Removal of Internal Attachment", "ko": "내장물 철거"}, "steps": {"en": ["Removal of internal attachment piece by piece.", "Windows/doors/glass: remove manually using grinder, drill, jig saw, reciprocating saw, crow bar, bolt cutter, hammer, suction glass; arrange at designated area.", "Gypsum/ceiling: remove manually using same tools, arrange at designated area.", "Toilet accessories (urinal, mirror, glass, partition, basin): remove manually using same tools + suction glass, arrange at designated area.", "Light/bulb: remove manually using grinder, drill, jig saw, reciprocating saw, crow bar, bolt cutter, screwdriver, hammer, arrange at designated area.", "Duct: remove by parts manually using same tools, arrange at designated area.", "Water pipe line: remove manually using wrenches + same tools, arrange at designated area.", "Electric line: remove manually using same tools, arrange at designated area."], "ko": ["내장물을 부분별로 순차 철거", "창호·유리: 그라인더·드릴·지그소·왕복톱·크로바·볼트커터·해머·흡착유리컵으로 수동철거, 지정구역 정리", "석고보드·천장재: 동일 공구로 수동철거, 지정구역 정리", "위생기구(소변기·거울·유리·파티션·세면대): 동일 공구+흡착유리컵으로 수동철거, 지정구역 정리", "조명·전구: 그라인더·드릴·지그소·왕복톱·크로바·볼트커터·스크루드라이버·해머로 수동철거, 지정구역 정리", "덕트: 동일 공구로 부분별 수동철거, 지정구역 정리", "급수배관: 렌치+동일 공구로 수동철거, 지정구역 정리", "전기배선: 동일 공구로 수동철거, 지정구역 정리"]}}, {"title": {"en": "Dismantling of Door Frame with Tempered Glass", "ko": "강화유리 도어프레임 해체"}, "steps": {"en": ["Lay down blanket/padding beneath frame to cushion glass; install adhesive tape along edges of tempered glass, use carton/thin board to protect it.", "Using pry bar, cordless drill, screwdriver and hammer, disconnect frame from wall/flooring; unscrew hinges if hinged; carefully remove door, set aside.", "If frame has multiple sections, separate carefully using pry bar/flathead screwdriver at tight seams.", "Once all fasteners removed, frame should come apart easily; if stuck, gently tap with rubber mallet to loosen."], "ko": ["프레임 아래 담요/패딩 깔아 유리 보호, 강화유리 가장자리에 접착테이프·박스지로 보호", "프라이바·코드리스드릴·스크루드라이버·해머로 프레임을 벽/바닥에서 분리, 힌지형이면 힌지 풀기, 조심스럽게 문짝 제거·별도 보관", "프레임이 여러 조각이면 프라이바/일자드라이버로 이음새를 신중히 분리", "모든 체결구 제거 후 분리, 고착 시 고무망치로 가볍게 두드려 이완"]}}, {"title": {"en": "Dismantling of Suspended Ceiling", "ko": "현수 천장 해체"}, "steps": {"en": ["Remove lighting fixtures, electric fan, fire alarm device etc., using mobile scaffolding or platform.", "Start at the edge, remove ceiling tiles around perimeter, pulling gently from grid.", "Continue removing tiles across the room; use reciprocating saw or hand saw for damaged/difficult tiles.", "Remove grid system starting with perimeter using screwdriver or hammer and crowbar.", "Unscrew grid support pieces with cordless drill or screwdriver.", "Remove main support rails after perimeter grid removed; pry apart from cross tees with crowbar/screwdriver.", "Take down cross tees (often snapped into place, gently pry out).", "Remove hangers (suspension wires/rods) using pliers or wrench.", "Cut or unscrew support wires; untwist with pliers if twisted/bent.", "Remove hanger rods using wrench or socket set.", "Remove remaining grid sections using crowbar, hammer, or screwdriver.", "Segregate ceiling tiles and metal grid; store properly in temporary area ready for fork loader collection."], "ko": ["모바일 스캐폴딩/플랫폼으로 조명기구·환풍기·화재경보장치 제거", "가장자리부터 시작, 그리드에서 천장타일을 부드럽게 당겨 제거", "방 전체 타일 순차 제거, 손상/제거곤란 타일은 왕복톱/수공톱 사용", "외곽 그리드부터 스크루드라이버·해머·크로바로 그리드 시스템 제거", "코드리스드릴/스크루드라이버로 그리드 서포트 풀기", "외곽 그리드 제거 후 메인 서포트레일 제거, 크로바/드라이버로 크로스티에서 분리", "크로스티 제거(보통 스냅식이므로 가볍게 프라이)", "펜치/렌치로 행거(서스펜션 와이어/로드) 제거", "서포트와이어 절단 또는 풀기, 꼬인 경우 펜치로 풀기", "행거로드는 렌치/소켓세트로 제거", "남은 그리드 구간을 크로바·해머·드라이버로 제거", "천장타일·금속그리드 분리, 임시구역에 정리하여 포크로더 수거 대기"]}}, {"title": {"en": "Dismantling of Interior Wall Panels", "ko": "내벽 패널 해체"}, "steps": {"en": ["Remove outlet/switch covers using screwdriver.", "Disconnect wiring behind outlet/switch carefully with screwdriver.", "Determine wall material (wood, plywood, MDF, drywall, vinyl, other) — influences tools/method used.", "Wood panels: nails/screws hold in place. Drywall: must be cut through before removal (more difficult). Vinyl/decorative: may be glued or nailed.", "Wood/vinyl panels: use crowbar or flat pry bar from top down to loosen from fasteners.", "Drywall: use reciprocating saw or jig saw to score along edges, cutting through nails/screws; hand saw for small sections.", "Work in manageable sections to reduce debris and ease disposal.", "For large/difficult panels, cut with reciprocating or circular saw in sections, cutting along studs, avoiding wiring/pipes.", "Remove wall supports/framing members remaining after panels removed.", "If removing wall entirely, cut through framing (2x4s, studs, etc.) with reciprocating or circular saw.", "Place dismantled panels and debris into temporary storage area ready for fork loader collection."], "ko": ["스크루드라이버로 콘센트·스위치 커버 제거", "콘센트/스위치 배선 신중히 분리", "벽체 재질 확인(목재, 합판, MDF, 드라이월, 비닐 등)에 따라 공구/방법 결정", "목재패널: 못/나사 고정. 드라이월: 절단 후 제거(더 까다로움). 비닐/장식패널: 접착/못고정 가능", "목재/비닐: 크로바·평프라이바로 상단부터 이완", "드라이월: 왕복톱/지그소로 가장자리 스코어링 후 못/나사 절단, 소구간은 수공톱", "작업량 관리 위해 소구간으로 분할 작업", "대형/난이도 높은 패널은 왕복톱/원형톱으로 스터드 따라 절단, 배선/배관 주의", "패널 제거 후 남은 벽체 서포트/프레임 제거", "벽 전체 철거 시 프레임(2x4 등)을 왕복톱/원형톱으로 절단", "해체된 패널·잔해는 임시구역에 정리하여 포크로더 수거 대기"]}}, {"title": {"en": "Dismantling/Unbolting of Suspended Sandwich Panel Ceiling Using Manlift", "ko": "맨리프트를 이용한 샌드위치패널 현수천장 해체"}, "steps": {"en": ["Set up and position the manlift at the work location.", "Unbolt ceiling panels using hand tools.", "Remove lighting fixtures, fire alarm devices, etc., using manlift, battery drill, crow bar and hammer.", "Start on the edge; begin removing/unbolting the sandwich panel ceiling using drill, crow bar and hammer — unbolt screws from both ends of the panel first, leaving the center screw to prevent sudden falling.", "Ensure the remaining bolt is pried with a crow bar.", "Before removing the remaining (center) bolt, maintain at least 1-meter safe distance from the panel to the manlift basket, then gently pull down the panel using a crow bar; repeat sequence on remaining panels.", "Stack removed panels in the designated area."], "ko": ["맨리프트를 작업위치에 설치·배치", "수공구로 천장패널 볼트 해체", "맨리프트·배터리드릴·크로바·해머로 조명기구·화재경보장치 등 제거", "가장자리부터 시작, 드릴·크로바·해머로 샌드위치패널 천장 해체 — 패널 양쪽 끝 나사부터 풀고 중앙 나사는 급낙하 방지 위해 남겨둠", "남은 볼트는 크로바로 지렛대 작업", "중앙 볼트 제거 전 패널-맨리프트 바스켓 간 최소 1m 안전거리 유지 후 크로바로 서서히 하강, 나머지 패널도 동일 순서 반복", "제거된 패널은 지정구역에 적재"]}}], "fullControls": {"en": ["Ensure all power tools are inspected and with updated color-coding sticker", "Ensure grinder rpm and cutting/grinding disc are compatible to the power tools", "Do not leave power tools unattended and remove connection.", "Hand power tools user must be trained, experience and knowledgeable to use the power tools.", "Ensure to check the expiry date of the disc before use.", "Keep hand away from rotating parts.", "Inspect the tooling for uneven or abnormal wear, as this may indicate that the tool holder is damaged.", "Check the tool holder and grinding head for cracks or other visible damage.", "Power tools should be un plug from the power source when not in use.", "Fire extinguisher and fire blanket shall be in place.", "Ensure fire control measure is in place such as fire extinguisher, fire blanket, fire watcher.", "Use appropriate leather gloves, apron, leg guard and face shield for cutting and grinding.", "Provide workers with N95 mask, goggles, long sleeves and disposable coveralls to avoid skin contact.", "Place mineral wool in properly sealed bags to prevent spread of fibers.", "Remove all damaged and defective hand tools on site.", "Ensure all workers attended HSE hand and power tools training.", "First Aider and first aid kit must be available on site", "Provide workers with cut resistant hand gloves", "Ensure all power tools are well maintained, regularly inspected and with updated color-coding sticker.", "Ensure that safety guards are in place and functioning.", "Inspect power tools and cords for damage before use.", "Establish exclusion zone around the dismantling area by installing signage and barricade.", "Assign competent & certified operator with TPC.", "Operator & banksman must be trained and competent, must hold a valid TPC", "Excavator and attachments must have valid TPC and updated color-coding sticker.", "Engage outriggers for wheel excavator to ensure stability during operation.", "Maintain clear communication between operator and ground personnel.", "Only trained and authorized operators to use the manlift.", "Use full body harness with lanyard attached to manlift anchor point / life line.", "Ensure firm, level ground; use wheel stopper where required.", "Do not exceed SWL of manlift including workers and tools.", "Barricade area below with warning signage to prevent entry.", "No movement of manlift while elevated unless designed for it.", "Install bar stopper in manlift basket to prevent crushing injuries.", "Work under competent supervision.", "Conduct the pre job briefing prior to start that activities -Emergency rescue plan procedure to be follow", "Assign banksman on both end of work area.", "Maintain at least one-meter safe distance of manlift basket to panel before falling down.", "Use tool lanyards for hand tools where possible.", "Dismantle panels in small manageable sections.", "Mandatory use of safety helmet with chin strap, cut-resistant gloves, dust mask and disposable coverall.", "Use right tool for the job, in good condition.", "Inspect tools before use (guards, blades, batteries).", "Only trained workers to operate power tools of battery drill.", "Use proper manual handling techniques.", "Stack dismantled panels 착", "응급처치자·구급함 비치", "브레이킹구역 2중 바리케이드, 오퍼레이터만 출입"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Breaking may weaken nearby structures, leading to instability/collapse risk.", "ctrl": ["Designated personnel regularly clear walkways of dangerous debris.", "Perimeter fence/toilet/shelter installed at ≥2m beyond building height.", "Exclusion zone established.", "Demolition plan/methodology developed.", "Pre-demolition inspection with IMECO/GBD, HSJV, KEPCO, ENEC representatives — structural survey conducted."]}, "ko": {"h": "인근 구조물 약화로 불안정/붕괴 위험", "ctrl": ["지정인원이 정기적으로 통로 위험물 제거", "펜스·화장실·쉘터는 건물높이+2m 이상 이격 설치", "통제구역 설정", "철거계획/방법론 수립", "IMECO/GBD·HSJV·KEPCO·ENEC 합동 사전점검 및 구조조사"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": true}, {"en": {"h": "Prolonged exposure to high noise level can cause hearing loss.", "ctrl": ["All workers near breaking activities wear hearing protection (earplugs/earmuffs).", "Decibel meter used; ear protection mandatory above 85dB."]}, "ko": {"h": "고소음 지속 노출로 청력손실", "ctrl": ["브레이킹 인근 작업자 청력보호구 착용", "85dB 초과 시 청력보호구 필수"]}, "ls": 4, "cs": 2, "r1": 8, "ls2": 2, "cs2": 2, "r2": 4, "res": "M", "ptw": true}, {"en": {"h": "Rebars can be sharp, causing cuts and punctures.", "ctrl": ["Barricade/signage around workplace to avoid unauthorized entry.", "Cut resistant hand gloves & arm/leg protection provided.", "All workers attend HSJV HSE Manual Handling Training."]}, "ko": {"h": "철근 날카로운 부위로 열상·자상", "ctrl": ["작업구역 바리케이드·사이니지", "내절단 장갑·팔/다리 보호구 지급", "수동취급 교육 이수"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Swinging hammer or prying with crowbar can hit others, especially if tool slips or excessive force used.", "ctrl": ["Cut resistant gloves provided; firm grip maintained, proper technique used to minimize slippage.", "All workers attend HSJV HSE Manual Handling Training.", "Dust mask provided for banksman & nearby workers."]}, "ko": {"h": "해머·크로바 사용 중 미끄러짐/과도한 힘으로 타인 타격", "ctrl": ["내절단 장갑 지급, 견고한 파지·올바른 기법 사용", "수동취급 교육 이수", "뱅크스맨·인근 작업자 방진마스크 지급"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Demolition Using Excavator with Breaker Attached", "ko": "브레이커 부착 엑스카베이터로 철거"}, "steps": {"en": ["Position the excavator on stable, level ground outside the collapse zone.", "Start from the top of the structure and work downward.", "Target edges and corners first, weakening the structure gradually.", "Break slabs and columns using the breaker for the vertical portions only after the collapse, once all remaining steel structures and beams have been removed.", "Once the building is totally collapsed, break large chunks into smaller pieces and segregate rebar to ease handling and hauling."], "ko": ["붕괴예상구역 밖 안정·평탄 지반에 엑스카베이터 배치", "구조물 상부부터 시작하여 하부로 진행", "가장자리·모서리부터 목표하여 점진적으로 구조 약화", "슬래브·기둥은 붕괴 후, 잔존 철골·보 전체 제거된 이후에만 브레이커로 수직부재 파쇄", "건물이 완전 붕괴된 후 대형 파쇄물을 소형화, 철근 분리하여 취급·반출 용이하게 함"]}}, {"title": {"en": "Demolition Using Excavator with Breaker & Grabber", "ko": "브레이커·그래버 병용 엑스카베이터로 철거"}, "steps": {"en": ["Conduct a thorough structural assessment before commencing demolition to determine building stability and identify risk of further collapse.", "Assign a competent supervisor to continuously monitor all demolition activities.", "Establish an exclusion zone by installing rigid barricades and clear warning signage; keep all workers at a safe distance from areas where collapse is expected.", "Clear the demolition area and identify all structural columns; mark priority columns before starting demolition.", "Use a long-boom excavator instead of standard equipment to maintain a safe working distance from potential collapse areas.", "Dismantle wall panels around the structure using a manlift.", "Use excavator with breaker/grabber (or pairing with another excavator, depending on structure size) to push the upper face of the steel column from one side, short direction; push and back simultaneously creating lateral stress on the columns until visibly buckling; continue pushing simultaneously to ensure controlled collapse.", "Dismantle wall and side panels using a manlift (refer Task Step 12 – Use of Manlift); manpower removes rivets/screws using battery drills and hand tools; roof panels difficult to remove may be dismantled by grabber or excavator.", "Provide proper PPE (disposable coveralls, dust masks, cut-resistant hand gloves) during dismantling of side panels and during housekeeping.", "Apply jackhammer demolition only at beam-bolted areas and weld-jointed connections of the steel structure.", "Demolish steel structures separately by dismantling beams and columns independently to prevent uncontrolled collapse.", "Demolish the vertical portions of the steel structure separately using an excavator.", "After collapse, use an excavator with shear cutter or breaker to dismantle the collapsed structure into smaller manageable pieces.", "Excavator with grabber/grapple then removes and cleans steel items and debris around the collapsed structure.", "Stock all demolished materials in a designated temporary storage area, segregating steel, rebar, and other waste materials.", "Finally, break and remove all remaining slab-on-grade and foundation elements using an excavator with breaker.", "Provide proper PPE during housekeeping activities in the demolition area (disposable coveralls, dust masks, cut-resistant hand gloves)."], "ko": ["철거 시작 전 철저한 구조평가로 건물 안정성·추가붕괴 위험 확인", "숙련 감독자를 지정하여 철거작업 상시 모니터링", "견고한 바리케이드·명확한 경고표지로 통제구역 설정, 예상 붕괴구역에서 전 작업자 안전거리 유지", "철거구역 정리, 전체 구조기둥 식별, 우선순위 기둥 표시 후 시작", "붕괴 예상구역과 안전거리 확보 위해 표준장비 대신 롱붐 엑스카베이터 사용", "맨리프트로 구조물 주변 벽패널 해체", "브레이커/그래버 부착 엑스카베이터(구조 규모에 따라 2대 병용)로 철골기둥 상부면을 짧은방향 한쪽에서 밀기, 밀고-당기기를 동시에 수행하여 기둥에 횡하중 발생, 육안으로 좌굴이 보일 때까지 지속, 통제된 붕괴가 되도록 동시 진행", "맨리프트로 벽·측면패널 해체(작업순서 12번 r operators with valid TPCs and required certifications shall operate the equipment.", "Assign a trained and certified signalman to each excavator to guide the operator and ensure safe movements at all times.", "Implement a demolition sequence plan and ensure all workers are briefed prior to work commencement.", "Ensure all personnel wear appropriate PPE include with as disposable cover all, dust mask and cut resistant hand gloves.", "Ensure the excavator is on level ground before starting work, use appropriate outriggers or stabilizers if applicable.", "Only qualified and trained operators should be in control of the excavator. He must have valid TPC and attended all required trainings.", "Conduct daily heavy equipment daily pre start checklist inspection twice a day (morning and afternoon).", "Ensure the excavator is properly maintained, with routine servicing and timely repairs based on manufacturer recommendations.", "Assign a trained and certified signal man on each excavator to communicate and guide the operator ensuring all movements are performed safely at all times.", "Only qualified and trained operators should be in control of the excavator. He must have valid TPC and attended all required trainings.", "All hydraulic attachments must have valid TPC and should match the equipment to where it will be attached.", "Inspect tools every day, such as bucket, breaker, grabber, and shear cutter attachments and hydraulic hoses, for signs of wear, damage, or malfunction before using.", "Stablish exclusion zone by install barricades and signages to keep unauthorized personnel out of danger.", "Install perimeter fence with mesh or netting to prevent debris striking people outside the perimeter fence.", "All excavator must be equipped with mesh guard to protect the operator from flying debris.", "First Aider and first aid kit must be available on site", "Install a second barricade around the breaking area for extra protection.", "Limit entry to the breaking area strictly to equipment operator only can enter the breaking zone. No others allowed.", "Assign designated personnel to regular checks and clear walkways and remove any dangerous items like rebars, metal rods, sheets, or debris to keep the path safe.", "Install perimeter fence, toilet and rest shelter at least at a distance two meters more than the height of the building to be demolished.", "Stablish exclusion zone by installing barricades and signages to keep all personnel out of danger.", "Develop a demolition plan, including a Plan / Methodology for safely breaking down the building.", "Conduct a demolition pre inspection to be attended by all parties (IMECO & GBD, HSJV, KEPCO & ENEC) representatives. During the pre-inspection, a thorough structural survey shall be conducted to assess the stability of the building before beginning demolition work", "Only qualified and trained operators should be in control of the excavator. He must have valid TPC and attended all required trainings.", "Assign a trained and certified signal man on each excavator to communicate and guide the operator ensuring all movements are performed safely at all times.", "Ensure all workers nearby breaking activities to wear hearing protection such as ear plugs or ear muffs.", "Install barricade and signage around the work place to avoid unauthorized entry.", "Provide workers with cut resistant hand gloves, and arm / leg protection (e.g., sleeves or shin guards).", "Ensure all workers to attend HSJV HSE Manual Handling Training.", "Provide demolition worker with cut resistant gloves.", "Maintain a firm grip, ensure that the tool is secure in the hand, and use the proper technique to minimize slippage.", "All workers attended HSJV HSE Manual Handling Training.", "Provide workers with additional PPE such as cut resistant gloves, and arm/leg protection (e.g., sleeves or shin guards)", "Provide dust mask for banksman & other workers nearby demolition areas"], "ko": ["철거작업 중 모든 상황에서 통제구역 진입 금지.", "완료된 철거작업 ld attended the HSJV HSE excavation training.", "Ensure that workers are not allowed near the edge of the pit unless it is properly protected.", "Maintain a safe distance between the edge of the excavation and any equipment to avoid instability.", "Assign a spotter to guide the operator, especially when working in congested areas. The spotter should ensure that no workers are in the swing radius of the excavator", "Ensure all equipment is regularly undergoing maintenance as per manufacturer’s recommendation.", "Perform daily checks of the excavator and other equipment to ensure they are in good working order.", "Inspect the hydraulic breaker & shear cutter before each use to ensure it is in good working condition.", "Provide workers with safety goggles to protect against flying debris.", "Ensure the operator assigned to use the breaker or hydraulic shear is familiar with the tool he is using.", "Inspect the equipment before each use to ensure it is in good working condition.", "Assign a competent mechanic to repair or replace faulty equipment immediately to avoid tool malfunction.", "Provide workers with safety goggles to protect against flying steel fragments.", "Keep fire extinguishers on site and ensure workers know how to use them.", "Ensure a first aider and a first aid kit is available on site.", "Establish adequate means of communication between excavator operators and ground workers. Use radios, hand signals, megaphone, or whistle to signal movements and warn of possible hazards.", "Establish clear, designated work zones for each equipment by installing barriers, cones, and signage can prevent collision of equipment.", "Provide dust suppression system to dampen dust particles and prevent them from becoming airborne, especially during activities like breaking and loading of", "Equipment operator must use ear plug or ear muffs in high noise area where decibel meter reading exceeds 85 decibels."], "ko": ["오퍼레이터는 교육·유효 TPC 인증 확인.", "장비 가동 중 작업자 진입금지구역을 표시하는 바리케이 oad not secured.", "ctrl": ["Excavator load distributed evenly, securely held per manufacturer spec.", "Slow, smooth operation when lifting/moving large debris."]}, "ko": {"h": "이동·인양 중 결박 미흡으로 파쇄물 낙하", "ctrl": ["제조사 사양에 맞게 하중 균등 분배·고정", "대형 파쇄물 인양·이동 시 서행·완만 조작"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Crumpled rebar loaded via hydraulic grabber may sling-shot on grabber opening, hitting cabin/operator/nearby worker.", "ctrl": ["Never use bucket/grabber to transfer crumpled rebar directly into wheel loader bucket.", "Operators understand machine load capacity/limitations.", "Exclusion zone around hydraulic grabber operation."]}, "ko": {"h": "그래버 개방 시 철근이 튕겨 캐빈·작업자 타격", "ctrl": ["구겨진 철근을 버켓/그래버로 직접 옮기지 않기", "오퍼레이터 장비 하중한계 숙지", "유압그래버 작업구역 통제"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Hydraulic grabber jaws create pinch points — crushing injury, amputation, or cabin shield puncture.", "ctrl": ["Banksman/spotter maintain safe distance from grabber during operation.", "Whistle used for command/warning signals.", "Competent mechanic performs regular grabber inspection/maintenance."]}, "ko": {"h": "유압그래버 조 사이 협착으로 압착부상·절단", "ctrl": ["작업 중 뱅크스맨·스포터는 그래버와 안전거리 유지", "호루라기로 명령·경고 신호", "숙련 정비사가 정기점검·정비"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Hydraulic grabber system malfunction (wear/mechanical failure) may cause loss of control, leading to accident.", "ctrl": ["First aider & first aid kit available on site.", "Regular inspection for wear, hydraulic fluid, greasing, malfunction."]}, "ko": {"h": "유압그래버 시스템 오작동으로 제어상실 사고", "ctrl": ["응급처치자·구급함 비치", "마모·유압유·오작동 정기점검"]}, "ls": 3, "cs": 3, "r1": 9, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": false}, {"en": {"h": "Lifting heavy materials (rocks, steel) via improper technique can cause musculoskeletal injuries.", "ctrl": ["All workers trained in safe manual handling (HSJV HSE Manual Handling Training).", "Cut resistant gloves provided depending on material handled."]}, "ko": {"h": "중량물 부적절 인양으로 근골격계 부상", "ctrl": ["전 작업자 수동취급 교육 이수", "취급 자재별 내절단 장갑 지급"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Workers struck by wheel loader, especially where operator cannot see the worker.", "ctrl": ["Banksman guides wheel loader operator; workers aware of loader movement.", "Whistle used to signal movement/emergency."]}, "ko": {"h": "휠로더 사각지대에서 작업자 충돌", "ctrl": ["뱅크스맨이 휠로더 오퍼레이터 유도", "호루라기로 이동·비상 신호"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": false}, {"en": {"h": "Debris may fall from overloaded wheel loader/excavator bucket during loading, causing damage/injury.", "ctrl": ["Exclusion zones established around wheel loader/dump truck.", "Trained competent banksman controls equipment movement.", "Regular equipment inspection/maintenance."]}, "ko": {"h": "과적으로 인한 파쇄물 낙하 부상/손상", "ctrl": ["휠로더·덤프트럭 주변 통제구역 설정", "숙련 뱅크스맨이 이동 통제", "정기 점검·정비"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Prolonged dust exposure can lead to respiratory conditions (asthma, lung disease); rebar/steel fragments may fly from grabber.", "ctrl": ["Dust suppression (water spraying) implemented.", "Dust masks provided.", "Pre/post inspection for dump trucks/trailers per Heavy Vehicle Inspection Checklist.", "Grabber operator properly trained, certified, valid TPC."]}, "ko": {"h": "장기간 분진 노출로 호흡기질환, 그래버 파편 비산", "ctrl": ["살수로 분진 억제", "방진마스크 지급", "덤프트럭·트레일러 사전/사후 점검(체크리스트)", "그래버 오퍼레이터 교육·TPC 확인"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-007 Rev.0", "company": "IMECO - 7번 철골구조 철거"}, "wmsProcedures": [{"title": {"en": "Stockpiling of Debris Using Wheel Loader", "ko": "휠로더로 파쇄물 야적"}, "steps": {"en": ["Position the wheel loader at the demolition/debris pile, in a stable location for efficient scooping.", "Approach the pile slowly, lift the bucket gradually, controlled movement.", "Fill the bucket a manageable amount; for large stone, fill only 60% of bucket volume to avoid overloading/spilling.", "After loading, slowly drive to the pre-designated stockpile area, bucket slightly raised to avoid dragging.", "Upon reaching the stockpile area, carefully dump debris in layers.", "Push and reshape the stockpile so it's stable, neatly piled to avoid sliding/spreading.", "Repeat loading and stockpiling until all debris moved.", "Important note: Never use the hydraulic grabber to transfer material, especially crumpled rebars, into the bucket of a wheel loader or excavator."], "ko": ["휠로더를 철거잔해 야적물에 안정된 위치로 배치", "천천히 접근, 점진적으로 버켓 상승, 통제된 움직임 유지", "적재량은 관리가능한 만큼, 대형 석재는 버켓용량 60%만 채워 과적·유출 방지", "적재 후 지정 야적구역으로 서행 이동, 버켓은 살짝 들어 끌림 방지", "야적구역 도착 후 층별로 신중히 하역", "야적더미를 안정되고 정돈되게 밀어 재정리", "전체 잔해가 이동할 때까지 반복", "중요: 유압그래버로 자재(특히 구겨진 철근)를 휠로더/엑스카베이터 버켓에 옮기지 말 것"]}}, {"title": {"en": "Stockpiling of Debris Using Excavator Bucket", "ko": "엑스카베이터 버켓으로 파쇄물 야적"}, "steps": {"en": ["Position the excavator near the pile of waste; ensure it is stable and on firm ground.", "Adjust position so the arm can reach the waste pile and stockpile area comfortably.", "Position the bucket into the waste pile, filled evenly, not overloaded.", "Scoop the debris, keep it low while raising off the ground while moving.", "Depending on the situation, arrange/shape a pile near the debris for the wheel loader to scoop, or move small quantities directly to stockpile, keeping bucket low.", "Position the bucket directly above the deposit location at the stockpile.", "Slowly tilt the bucket to release the waste evenly, avoiding an unstable pile.", "Repeat the process, moving back to the waste pile after each load.", "Gradually build the pile by stacking evenly, maintaining a stable angle/height to prevent collapse.", "Regularly inspect the stockpile to ensure stability."], "ko": ["잔해 인근에 안정된 지반으로 엑스카베이터 배치", "암이 잔해더미와 야적구역에 편하게 닿도록 위치 조정", "버켓을 잔해더미에 위치시켜 균등하게, 과적 없이 채움", "잔해를 뜬 후 이동 중 낮게 유지", "상황에 따라 휠로더가 뜰 수 있게 인근에 정리하거나, 소량은 직접 야적구역으로 이동(버켓은 낮게)", "야적 목표지점 바로 위에 버켓 위치", "버켓을 서서히 기울여 균등하게 배출, 불안정한 더미 방지", "매 적재 후 잔해더미로 복귀하여 반복", "점진적으로 균등히 쌓아 안정적 각도·높이 유지, 붕괴 방지", "정기적으로 야적더미 안정성 점검"]}}, {"title": {"en": "Stockpiling Crumpled Rebar/Steel/Pipes/Cables Using Hydraulic Grabber", "ko": "유압그래버로 철근·강재·배관·케이블 야적"}, "steps": {"en": ["Choose a stockpile location with no obstruction for the crawler excavator to travel; avoid uneven surfaces, choose location near pickup point.", "Position the excavator arm at optimal height for rebar pile access; grabber low enough to pick up rebar but not dragging on the ground.", "Open the grabber attachment wide enough to fully secure a bundle of rebar.", "Lower the grabber and clamp around a section of rebar, ensuring a secure hold.", "For larger sections, ensure the grip is stable to prevent slipping during transport.", "For smaller sections, may grab multiple pieces at once, ensuring the load is balanced.", "Once secured, carefully lift the load; keep the grabber slightly above the ground.", "Move the excavator slowly toward the designated stockpile area, avoiding sudden movements.", "Position the machine directly over the designated spot at the stockpile.", "Slowly open the grabber and drop the rebar in an organized manner, stacking in layers; banksman must maintain a safe distance as rebar may fly out on release.", "If the pile is already partially built, place the rebar in a stable position to avoid shifting/collapsing.", "Use the excavator to adjust/shape the stockpile after depositing.", "If needed, lightly compact the rebar with the grabber to make the pile more stable.", "Repeat the process for an organized, stable pile.", "Important note: Avoid overstocking or making the pile too high — keep within a manageable height to prevent collapse."], "ko": ["크롤러 엑스카베이터 이동에 장애물 없는 야적지 선정, 요철지형 피하고 픽업지점 인근으로", "암을 철근더미 접근에 최적높이로 위치, 그래버는 낮되 지면 끌림 없이", "그래버를 철근다발이 완전히 잡히도록 넓게 개방", "그래버를 낮춰 철근구간을 견고히 클램핑", "대형 구간은 이동 중 미끄러지지 않도록 안정된 그립 확보", "소형 구간은 여러 조각을 함께 잡되 균형 유지", "확보 후 신중히 인양, 그래버는 지면에서 살짝 위로 유지", "야적구역으로 서서히 이동, 급격한 동작 회피", "야적 목표지점 바로 위에 장비 위치", "서서히 그래버를 열어 정돈되게 층별 적재, 뱅크스맨은 방출 시 철근이 튈 수 있으므로 안전거리 유지", "이미 일부 야적된 경우 안정된 위치에 배치하여 붕괴/이동 방지", "적재 후 엑스카베이터로 야적더미 정리·형태잡기", "필요 시 그래버로 살짝 눌러 다짐, 안정성 향상", "반복하여 정돈되고 안정된 더미 형성", "중요: 과다야적·과도한 높이 금지, 붕괴방지 위해 관리가능한 높이 유지"]}}, {"title": {"en": "Manually Loading Material into the Wheel Loader", "ko": "자재 수동 상차 (휠로더)"}, "steps": {"en": ["Identify the type of material (rebar, steel scrap, gravel, debris, precast, pipes, cable, insulation, scaffolding materials, tools, etc.) — determines handling technique/tools needed.", "Ensure the wheel loader is positioned correctly, bucket low to ground but not touching.", "Position the wheel loader with bucket close to the pile to reduce lifting distance.", "Lower the bucket to optimal height for easy access for manual loading — stable, not dragging or too high.", "For bulk materials like soil, sand, gravel or dirt, a shovel is better to use."], "ko": ["자재 종류 확인(철근, 강재스크랩, 자갈, 잔해, 프리캐스트, 배관, 케이블, 단열재, 비계자재, 공구 등) — 취급방법·공구 결정", "휠로더 올바른 위치 확보, 버켓은 지면 가까이 두되 닿지 않게", "버켓을 자재더미 가까이 위치시켜 인양거리 최소화", "수동 상차하기 좋은 높이로 버켓 하강 — 안정되고 끌리거나 너무 높지 않게", "흙·모래·자갈 등 벌크자재는 삽 사용이 더 적합"]}}, {"title": {"en": "Loading Waste/Soil/Sand/Gravel into Trailer or Dump Truck Using Wheel Loader", "ko": "휠로더로 트레일러/덤프트럭 상차"}, "steps": {"en": ["Choose a location near the debris pile with good access for the wheel loader, close to the trailer.", "Position the trailer box securely, level and properly aligned with the wheel loader.", "Drive the wheel loader to the debris pile, stable and close enough for efficient scoop.", "Position the bucket just above the debris pile, ready to scoop.", "Gradually lower and scoop the debris, ensuring bucket filled evenly.", "Ensure bucket is not overloaded to avoid tipping/spillage; for heavy stone, fill only 60%.", "Once loaded, slowly raise the bucket to transport, low enough to avoid obstacles.", "Slowly drive toward the trailer box, path clear of workers/obstacles/machinery.", "Position bucket directly above the trailer box, aligned to avoid spilling on sides.", "Slowly tilt the bucket to release debris into the trailer in a controlled manner.", "After dumping, use the bucket to spread/shape the load for even distribution.", "Return to the pile and repeat the loading process.", "Once trailer box filled within capacity, send to Village 1 (near Encheon Camp) for covering the trailer box with net."], "ko": ["휠로더 접근 좋고 트레일러 가까운 잔해더미 위치 선정", "트레일러박스를 수평·정렬 맞춰 견고히 배치", "잔해더미로 휠로더 이동, 효율적 스쿱을 위해 안정되고 근접하게", "버켓을 잔해더미 바로 위에 스쿱 준비상태로 위치", "서서히 하강하여 균등하게 스쿱", "과적으로 전복/유출 없도록 확인, 중량 석재는 60%만 적재", "적재 후 버켓을 서서히 들어 장애물 피하며 운반", "작업자·장애물·타장비 없는 경로로 트레일러 방향 서행", "버켓을 트레일러박스 바로 위, 측면유출 없게 정렬", "버켓을 서서히 기울여 통제된 방식으로 트레일러에 배출", "배출 후 버켓으로 적재물 균등 정리", "잔해더미로 복귀하여 상차작업 반복", "용량 이내로 채워지면 엔천캠프 인근 빌리지1로 이동, 네트 커버 작업"]}}, {"title": {"en": "Loading Waste/Soil/Sand/Gravel into Trailer or Dump Truck Using Excavator Bucket", "ko": "엑스카베이터 버켓으로 트레일러/덤프트럭 상차"}, "steps": {"en": ["Position the excavator close to the waste pile; arm should reach over the pile and into the dump truck.", "Ensure stable, firm footing especially on uneven terrain.", "Position dump truck properly to receive the waste.", "Communicate between driver and excavator operator regarding readiness to load.", "Scoop into the waste, avoid overloading the bucket at first for a steady process.", "Raise the arm to lift the waste off the ground, avoid lifting bucket too high (destabilize/spillage).", "Carefully move the excavator toward the dump truck, keeping bucket low to prevent spillage.", "Position over the truck's bed, slowly lower the bucket, aligning with the bed.", "Ensure waste isn't too heavy for the bucket to handle in one load.", "Tilt the bucket to release the waste into the truck's bed, evenly distributed to prevent shifting.", "After unloading, return the bucket to the pile and repeat until the truck is loaded."], "ko": ["잔해더미 근처에 엑스카베이터 위치, 암이 더미를 넘어 덤프트럭까지 닿도록", "특히 요철지형에서 안정된 접지 확보", "덤프트럭을 수령위치에 적절히 배치", "운전자-오퍼레이터 간 적재준비 소통", "최초에는 과적 없이 안정적으로 잔해 스쿱", "암을 들어 잔해를 지면에서 분리, 버켓을 너무 높이 들지 않기(불안정/유출)", "버켓을 낮게 유지하며 신중히 덤프트럭 쪽으로 이동", "적재함 위에 위치, 서서히 버켓 하강하여 정렬", "버켓 1회 처리량이 과도하지 않게 확인", "버켓을 기울여 균등하게 적재함에 배출, 이동 중 쏠림 방지", "배출 후 버켓을 잔해더미로 복귀, 트럭이 채워질 때까지 반복"]}}, {"title": {"en": "Loading Crumpled Rebar/Steel/Pipes/Cables Using Excavator Grabber into Dump Truck/Trailer", "ko": "엑스카베이터 그래버로 철근·강재·배관·케이블 상차"}, "steps": {"en": ["Move the excavator close to the pile of demolished materials, ensuring grabber has a clear line of sight.", "Park the dump truck directly under the grabber's reach; driver/operator communicate, truck parked stably.", "Move so grabber is directly above the pile, aligned to prevent inefficient grabs/spillage.", "Open the grabber wide enough to securely grab the material; for steel/rebar, ensure it can wrap/grip tightly.", "Ensure material is tightly gripped before lifting; adjust position/width for large, heavy or irregular material.", "Once secured, raise the arm slowly to lift material off the ground; keep load low while moving.", "Move the grabber toward the dump truck.", "Position directly over the truck's bed, centered for even placement.", "Slowly open the grabber to release material; for bulky items (pipes/beams), gently drop to avoid damage.", "Ensure material is evenly distributed within the truck's bed; grabber may be used to compact/arrange.", "After unloading, return the grabber to the pile for another load, repeat until truck is full/all material loaded."], "ko": ["철거자재더미 근처로 엑스카베이터 이동, 그래버가 명확히 자재를 볼 수 있도록", "그래버 작동범위 바로 아래에 덤프트럭 주차, 운전자-오퍼레이터 소통, 트럭 안정적으로 주차", "그래버가 더미 바로 위에 오도록 정렬하여 비효율적 그랩·유출 방지", "자재를 견고히 잡을 만큼 그래버 개방, 철근·강재는 확실히 감싸 파지", "인양 전 자재가 확실히 잡혔는지 확인, 대형·중량·불규칙 자재는 위치·폭 조정", "확보 후 서서히 암 상승하여 지면에서 인양, 이동 중 낮게 유지", "덤프트럭 방향으로 그래버 이동", "적재함 위 중앙에 위치", "서서히 개방하여 배출, 대형품(배관·보)은 손상방지 위해 천천히 내려놓기", "적재함 내 균등 분산되도록 확인, 필요 시 그래버로 정리", "배출 후 더미로 복귀하여 반복, 트럭이 채워지거나 자재 전량 적재될 때까지"]}}, {"title": {"en": "Moving and Loading of Steel I-Beam and H-Beam Using Excavator Grabber", "ko": "엑스카베이터 그래버로 I빔·H빔 이동·상차"}, "steps": {"en": ["Position the excavator perpendicular or parallel to the beam or column.", "Extend the boom and rotate the grabber over the beam.", "Lower the grabber close to the center of the beam (for balance).", "Gently close the grabber around the beam.", "Ensure a secure grip, avoiding pinching at weak or unstable positions.", "Slowly lift the beam slightly off the ground to test the grip.", "Observe for shifting or possible slippage.", "Adjust the grabber as needed to improve balance and hold.", "Lift the beam just above the ground for stability.", "Slowly and steadily rotate/move the beam to the loading area (trailer box, flatbed, or stockpile).", "Align the beam over the target loading spot.", "Lower it slowly and evenly.", "Place the beam in a stable, designated position.", "Open the grabber carefully to release the beam.", "Ensure the beam is stable and will not roll or shift.", "Note: for big/long beams, know the weight and balance point (center of gravity) and lift one at a time."], "ko": ["보/기둥에 수직 또는 평행하게 엑스카베이터 배치", "붐 전개, 그래버를 보 위로 회전", "보 중앙 근처로 그래버 하강(균형용)", "보를 부드럽게 감싸도록 그래버 닫기", "약하거나 불안정한 지점을 피해 견고한 그립 확보", "서서히 살짝 인양하여 그립 테스트", "이동/미끄러짐 관찰", "필요 시 그래버 조정하여 균형 개선 후 유지", "안정성 위해 지면 바로 위까지만 인양", "적재구역(트레일러/플랫베드/야적장)으로 서서히 회전·이동", "목표 적재지점 위로 정렬", "서서히 균등하게 하강", "안정된 지정위치에 배치", "조심스럽게 그래버 개방하여 보 방출", "보가 안정되고 구르거나 이동하지 않는지 확인", "참고: 대형/장척 보는 무게중심 파악 후 1개씩 인양"]}}, {"title": {"en": "Manual Handling of Sandwich Panels — Shifting, Loading & Unloading", "ko": "샌드위치패널 인력운반 — 이동·상하차"}, "steps": {"en": ["Access routes and manual handling areas shall be kept clear and unobstructed at all times.", "Identify the size and condition of the sandwich panels before handling.", "Team lifting shall be used for heavy, awkward, or oversized sandwich panels.", "A banksman shall be assigned to guide the trailer driver during loading and unloading operations.", "Park the trailer near the temporary storage area."], "ko": ["접근로·수동취급 구역은 항상 장애물 없이 유지", "취급 전 샌드위치패널 크기·상태 확인", "무겁거나 취급이 까다롭거나 대형인 패널은 팀 리프팅 적용", "상하차 시 트레일러 운전자를 유도할 뱅크스맨 배치", "임시야적장 인근에 트레일러 주차"]}}], "fullControls": {"en": ["Ensure competency of operators. They must undergo training and have valid TPC.", "Conduct regular inspections and maintenance on the equipment to ensure it is in optimal working condition all the time.", "Install barricade and signage avoid unauthorized entry.", "Regularly check the load to ensure it is within the wheel loader’s rated capacity, for large pieces of stone, bucket shall be filled with only 60% of its bucket volume to avoid overloading and spilling.", "Avoid overloading the excavator. Follow the manufacturer’s specifications for load capacity. Ensure the load is distributed evenly within the bucket and is securely held.", "Operate at slow speeds when lifting or moving large debris, and ensure that the bucket is not overloaded or unbalanced.", "Never use bucket or grabber in transferring crumpled rebar into wheel loader bucket.", "Ensure operators understand the machine's load capacity and limitations and are trained to operate the equipment safely within its limit.", "Establish exclusion zones by installing barricade and signage around the area where the hydraulic grabber is in use. Only authorized and trained personnel should be allowed within these zones.", "The banksman and spotter must maintain a safe distance from the hydraulic grabber when grabbing and releasing scrap materials specially rebar.", "Provide banksman or spotter with whistle to communicate commands to operator or give warning for other nearby workers, signaling that equipment is about to move or stop or to alert everyone during an emergency.", "Assign a competent mechanic to perform regular inspections and maintenance of the hydraulic grabber, including checking for wear, hydraulic fluid levels, greasing, and any potential malfunctions. Ensure the grabber is in good condition before use.", "Ensure a first aider and first aid kit is available on site.", "Ensure that all workers are properly trained in safe manual handling techniques, including proper lifting, carrying, and positioning of materials. All workers must attend the HSJV HSE Manual Handling Training.", "Depending on the material being handled, provide workers with cut resistant gloves for handling rebar, steel, glass or other sharp objects.", "Assign a banksman to guide the wheel loader operator and ensure that workers are aware of the loader’s movement.", "Provide banksman with whistle to communicate commands to operator or give warning for other nearby workers, signaling that equipment is about to move or stop or to alert everyone during an emergency.", "Establish exclusion zones around the wheel loader and dump truck. Install barricade and signages to mark the areas where workers are not allowed to enter while the equipment is operating.", "Regularly check the load to ensure it is within the wheel loader’s rated capacity, for large pieces of stone, bucket shall be filled with only 60% of its bucket volume to avoid overloading and spilling.", "Assign a trained and competent banksman to control the movement of the equipment.", "The banksman must maintain a safe distance from the wheel loader/excavator during the loading.", "Ensure that all operators of the wheel loader are properly trained and holder of valid TPC.", "Provide banksman with whistle to communicate commands to operator or give warning for other nearby workers, signaling that equipment is about to move or stop or to alert everyone during an emergency.", "Assign a competent mechanic to conduct regular inspections and maintenance on the equipment to ensure it is in optimal working condition all the time.", "Stabilize the dump truck / trailers with the wheel stoppers before unloading debris to prevent the truck from moving unexpectedly.", "Perform pre inspection / post inspection for all dump trucks and trailers using the heavy vehicle INSPECTION CHECKLIST. The inspection shall be conducted by the subcontractor in charge and HSJV representative.", "Implement dust suppression techniques, such as spraying water to minimize the amount of airborne dust.", "Provide workers with dust mask, to protect against harmful particles.", "Establish exclusion zones around the hydraulic grabber and dump truck/trailer. Install barricade and signages to mark the areas where workers are not allowed to enter while the equipment is operating.", "Ensure that the hydraulic grabber operator is properly trained and certified in the operation of the equipment. He must be experienced to operate the grabber and hold a valid TPC.", "Assign a competent mechanic to conduct regular inspections and maintenance of the hydraulic grabber, including checking hydraulic systems, hoses, and grabber mechanics to ensure proper functioning.", "Perform pre inspection / post inspection for all dump trucks and trailers using the heavy vehicle INSPECTION CHECKLIST. The inspection shall be conducted by the subcontractor in charge and HSJV representative.", "Ensure all workers are properly trained in safe manual handling techniques, including correct lifting, carrying, and positioning of sandwich panels.", "All workers must attend HSJV HSE Manual Handling Training.", "Ensure clear and unobstructed access in the manual handling area for sandwich panel works.", "Use team lifting for heavy or oversized sandwich panels.", "Provide workers with appropriate cut-resistant gloves when handling sandwich panels, steel, glass, or other sharp materials, depending on the task.", "Ensure the disposable coverall and dust mask to remove the rock wool.", "Conduct a pre-job briefing on safe manual handling procedures, highlighting sharp edges
