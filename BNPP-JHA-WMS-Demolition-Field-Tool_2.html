kers trained in use.", "First aider & first aid kit available.", "Clear communication (radio/hand signal/megaphone/whistle) between operator and ground workers.", "Dust suppression system used; ear protection above 85dB."]}, "ko": {"h": "절단구역 철근·파편 비산으로 인근 작업자 부상", "ctrl": ["숙련 정비사가 즉시 결함장비 수리/교체", "소화기 비치, 사용법 교육", "응급처치자·구급함 비치", "오퍼레이터-지상요원 통신(무전·수신호·메가폰)", "분진억제 시스템 사용, 85dB 초과 시 청력보호구"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [], "fullControls": {"en": ["Ensure that operators are trained and certified with valid TPC.", "Install barricade and signage to mark the areas where workers are not allowed to enter while the equipment is operating.", "All excavators must be equipped with mesh guard to protect equipment screen glass from breaking or puncture.", "During breaking all workers nearby must wear earplug or earmuffs.", "Install perimeter fence with net or mesh to reduce noise", "Strictly implement a safe work sequence to control and regulate the movement of the equipment to minimize the risk of accidental puncture from flying rebar & debris towards the machine and workers. (Refer to WMS Task Step 9)", "Install a heavy-duty protective screen or mesh at the front shield of all excavator cabin.", "Workers near the excavation pit should attended the HSJV HSE excavation training.", "Ensure that workers are not allowed near the edge of the pit unless it is properly protected.", "Maintain a safe distance between the edge of the excavation and any equipment to avoid instability.", "Assign a spotter to guide the operator, especially when working in congested areas. The spotter should ensure that no workers are in the swing radius of the excavator", "Ensure all equipment is regularly undergoing maintenance as per manufacturer’s recommendation.", "Perform daily checks of the excavator and other equipment to ensure they are in good working order.", "Inspect the hydraulic breaker & shear cutter before each use to ensure it is in good working condition.", "Provide workers with safety goggles to protect against flying debris.", "Ensure the operator assigned to use the breaker or hydraulic shear is familiar with the tool he is using.", "Inspect the equipment before each use to ensure it is in good working condition.", "Assign a competent mechanic to repair or replace faulty equipment immediately to avoid tool malfunction.", "Provide workers with safety goggles to protect against flying steel fragments.", "Keep fire extinguishers on site and ensure workers know how to use them.", "Ensure a first aider and a first aid kit is available on site.", "Establish adequate means of communication between excavator operators and ground workers. Use radios, hand signals, megaphone, or whistle to signal movements and warn of possible hazards.", "Establish clear, designated work zones for each equipment by installing barriers, cones, and signage can prevent collision of equipment.", "Provide dust suppression system to dampen dust particles and prevent them from becoming airborne, especially during activities like breaking and loading of", "Equipment operator must use ear plug or ear muffs in high noise area where decibel meter reading exceeds 85 decibels."], "ko": ["오퍼레이터는 교육·유효 TPC 인증 확인.", "장비 가동 중 작업자 진입금지구역을 표시하는 바리케이드·사이니지 설치.", "전 엑스카베이터는 장비 스크린유리 파손/천공 방지용 메쉬가드 장착 필수.", "파쇄작업 중 인근 전 작업자 귀마개/귀덮개 착용 필수.", "소음저감을 위해 네트/메쉬 방호펜스 설치.", "비산 철근·잔해로 인한 장비·작업자 우발적 천공 위험 최소화를 위해 안전작업순서를 엄격히 준수하여 장비 이동 통제·규제(WMS 작업순서 9번 참조).", "전 엑스카베이터 캐빈 전면실드에 중량 보호스크린/메쉬 설치.", "굴착피트 인근 작업자는 HSJV HSE 굴착교육 이수.", "적절히 보호되지 않은 한 작업자는 피트 가장자리 접근 금지.", "굴착면 가장자리와 장비 간 안전거리 유지하여 불안정 방지.", "특히 협소구역 작업 시 오퍼레이터 유도용 스포터 배치. 스포터는 엑스카베이터 스윙반경 내 작업자 없음을 확인.", "전 장비는 제조사 권장사항에 따라 정기정비 실시 확인.", "엑스카베이터 및 기타 장비의 매일 점검 실시하여 양호작동상태 확인.", "유압브레이커·전단절단기는 사용 전마다 점검하여 양호작동상태 확인.", "비산물 방호용 보안경 지급.", "브레이커/유압전단기 사용 배정 오퍼레이터는 해당 공구에 숙련되어 있는지 확인.", "사용 전마다 장비 점검하여 양호작동상태 확인.", "공구오작동 방지 위해 숙련 정비사를 배정하여 불량장비 즉시 수리/교체.", "비산 강재파편 방호용 보안경 지급.", "현장 소화기 비치, 작업자 사용법 숙지 확인.", "응급처치자·구급함 현장 비치 확인.", "엑스카베이터 오퍼레이터-지상작업자 간 적절한 통신수단 확보. 무전기, 수신호, 메가폰, 호루라기 등으로 이동신호·위험경고.", "장비별 명확한 지정작업구역을 방호물·라바콘·사이니지로 설정하여 장비충돌 방지.", "파쇄·상차 등 작업 시 분진억제시스템 제공하여 분진입자 저감 및 비산방지.", "소음계 측정치가 85dB 초과하는 고소음구역에서 장비오퍼레이터는 귀마개/귀덮개 착용 필수."]}}, {"id": 1021, "cat": "work", "title": {"en": "9. Moving, Stockpiling & Loading of Demolished Materials (Concrete)", "ko": "9. 철거자재(콘크리트) 이동·야적·상차"}, "short": {"en": "Debris Moving/Stockpiling/Loading", "ko": "철거자재 이동·야적·상차"}, "tools": ["Wheel loader", "Excavator with grabber attachment", "Excavator", "Fork loader", "Trailer truck", "Dump truck"], "wms": {"en": [], "ko": []}, "hazards": [{"en": {"h": "Debris moved in large piles can roll or spill from wheel loader bucket, injuring workers/damaging equipment.", "ctrl": ["Operators trained with valid TPC.", "Regular equipment inspection & maintenance.", "Barricade & signage to avoid unauthorized entry.", "Load checked to stay within rated capacity (bucket filled max 60% for large stones)."]}, "ko": {"h": "대형 파쇄물 이동 중 굴러떨어짐/유출로 부상", "ctrl": ["오퍼레이터 교육·TPC 확인", "정기 점검·정비", "비인가자 진입 방지 바리케이드", "적재량 정격용량 이내 확인(대형자재는 버켓 60% 이하)"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Chunks of debris may fall off bucket when moving/lifting, especially if load not secured.", "ctrl": ["Excavator load distributed evenly, securely held per manufacturer spec.", "Slow, smooth operation when lifting/moving large debris."]}, "ko": {"h": "이동·인양 중 결박 미흡으로 파쇄물 낙하", "ctrl": ["제조사 사양에 맞게 하중 균등 분배·고정", "대형 파쇄물 인양·이동 시 서행·완만 조작"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Crumpled rebar loaded via hydraulic grabber may sling-shot on grabber opening, hitting cabin/operator/nearby worker.", "ctrl": ["Never use bucket/grabber to transfer crumpled rebar directly into wheel loader bucket.", "Operators understand machine load capacity/limitations.", "Exclusion zone around hydraulic grabber operation."]}, "ko": {"h": "그래버 개방 시 철근이 튕겨 캐빈·작업자 타격", "ctrl": ["구겨진 철근을 버켓/그래버로 직접 옮기지 않기", "오퍼레이터 장비 하중한계 숙지", "유압그래버 작업구역 통제"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Hydraulic grabber jaws create pinch points — crushing injury, amputation, or cabin shield puncture.", "ctrl": ["Banksman/spotter maintain safe distance from grabber during operation.", "Whistle used for command/warning signals.", "Competent mechanic performs regular grabber inspection/maintenance."]}, "ko": {"h": "유압그래버 조 사이 협착으로 압착부상·절단", "ctrl": ["작업 중 뱅크스맨·스포터는 그래버와 안전거리 유지", "호루라기로 명령·경고 신호", "숙련 정비사가 정기점검·정비"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Hydraulic grabber system malfunction (wear/mechanical failure) may cause loss of control, leading to accident.", "ctrl": ["First aider & first aid kit available on site.", "Regular inspection for wear, hydraulic fluid, greasing, malfunction."]}, "ko": {"h": "유압그래버 시스템 오작동으로 제어상실 사고", "ctrl": ["응급처치자·구급함 비치", "마모·유압유·오작동 정기점검"]}, "ls": 3, "cs": 3, "r1": 9, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": false}, {"en": {"h": "Lifting heavy materials (rocks, steel) via improper technique can cause musculoskeletal injuries.", "ctrl": ["All workers trained in safe manual handling (HSJV HSE Manual Handling Training).", "Cut resistant gloves provided depending on material handled."]}, "ko": {"h": "중량물 부적절 인양으로 근골격계 부상", "ctrl": ["전 작업자 수동취급 교육 이수", "취급 자재별 내절단 장갑 지급"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Workers struck by wheel loader, especially where operator cannot see the worker.", "ctrl": ["Banksman guides wheel loader operator; workers aware of loader movement.", "Whistle used to signal movement/emergency."]}, "ko": {"h": "휠로더 사각지대에서 작업자 충돌", "ctrl": ["뱅크스맨이 휠로더 오퍼레이터 유도", "호루라기로 이동·비상 신호"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": false}, {"en": {"h": "Debris may fall from overloaded wheel loader/excavator bucket during loading, causing damage/injury.", "ctrl": ["Exclusion zones established around wheel loader/dump truck.", "Trained competent banksman controls equipment movement.", "Regular equipment inspection/maintenance."]}, "ko": {"h": "과적으로 인한 파쇄물 낙하 부상/손상", "ctrl": ["휠로더·덤프트럭 주변 통제구역 설정", "숙련 뱅크스맨이 이동 통제", "정기 점검·정비"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}, {"en": {"h": "Prolonged dust exposure can lead to respiratory conditions (asthma, lung disease); rebar/steel fragments may fly from grabber.", "ctrl": ["Dust suppression (water spraying) implemented.", "Dust masks provided.", "Pre/post inspection for dump trucks/trailers per Heavy Vehicle Inspection Checklist.", "Grabber operator properly trained, certified, valid TPC."]}, "ko": {"h": "장기간 분진 노출로 호흡기질환, 그래버 파편 비산", "ctrl": ["살수로 분진 억제", "방진마스크 지급", "덤프트럭·트레일러 사전/사후 점검(체크리스트)", "그래버 오퍼레이터 교육·TPC 확인"]}, "ls": 4, "cs": 3, "r1": 12, "ls2": 2, "cs2": 3, "r2": 6, "res": "M", "ptw": true}], "jha": {"code": "BNPP-HSE-JHA-2025-009 Rev.0", "company": "IMECO - 9번 콘크리트구조 철거"}, "wmsProcedures": [{"title": {"en": "Stockpiling of Debris Using Wheel Loader", "ko": "휠로더로 파쇄물 야적"}, "steps": {"en": ["Position the wheel loader at the demolition/debris pile, in a stable location for efficient scooping.", "Approach the pile slowly, lift the bucket gradually, controlled movement.", "Fill the bucket a manageable amount; for large stone, fill only 60% of bucket volume to avoid overloading/spilling.", "After loading, slowly drive to the pre-designated stockpile area, bucket slightly raised to avoid dragging.", "Upon reaching the stockpile area, carefully dump debris in layers.", "Push and reshape the stockpile so it's stable, neatly piled to avoid sliding/spreading.", "Repeat loading and stockpiling until all debris moved.", "Important note: Never use the hydraulic grabber to transfer material, especially crumpled rebars, into the bucket of a wheel loader or excavator."], "ko": ["휠로더를 철거잔해 야적물에 안정된 위치로 배치", "천천히 접근, 점진적으로 버켓 상승, 통제된 움직임 유지", "적재량은 관리가능한 만큼, 대형 석재는 버켓용량 60%만 채워 과적·유출 방지", "적재 후 지정 야적구역으로 서행 이동, 버켓은 살짝 들어 끌림 방지", "야적구역 도착 후 층별로 신중히 하역", "야적더미를 안정되고 정돈되게 밀어 재정리", "전체 잔해가 이동할 때까지 반복", "중요: 유압그래버로 자재(특히 구겨진 철근)를 휠로더/엑스카베이터 버켓에 옮기지 말 것"]}}, {"title": {"en": "Stockpiling of Debris Using Excavator Bucket", "ko": "엑스카베이터 버켓으로 파쇄물 야적"}, "steps": {"en": ["Position the excavator near the pile of waste; ensure it is stable and on firm ground.", "Adjust position so the arm can reach the waste pile and stockpile area comfortably.", "Position the bucket into the waste pile, filled evenly, not overloaded.", "Scoop the debris, keep it low while raising off the ground while moving.", "Depending on the situation, arrange/shape a pile near the debris for the wheel loader to scoop, or move small quantities directly to stockpile, keeping bucket low.", "Position the bucket directly above the deposit location at the stockpile.", "Slowly tilt the bucket to release the waste evenly, avoiding an unstable pile.", "Repeat the process, moving back to the waste pile after each load.", "Gradually build the pile by stacking evenly, maintaining a stable angle/height to prevent collapse.", "Regularly inspect the stockpile to ensure stability."], "ko": ["잔해 인근에 안정된 지반으로 엑스카베이터 배치", "암이 잔해더미와 야적구역에 편하게 닿도록 위치 조정", "버켓을 잔해더미에 위치시켜 균등하게, 과적 없이 채움", "잔해를 뜬 후 이동 중 낮게 유지", "상황에 따라 휠로더가 뜰 수 있게 인근에 정리하거나, 소량은 직접 야적구역으로 이동(버켓은 낮게)", "야적 목표지점 바로 위에 버켓 위치", "버켓을 서서히 기울여 균등하게 배출, 불안정한 더미 방지", "매 적재 후 잔해더미로 복귀하여 반복", "점진적으로 균등히 쌓아 안정적 각도·높이 유지, 붕괴 방지", "정기적으로 야적더미 안정성 점검"]}}, {"title": {"en": "Stockpiling Crumpled Rebar/Steel/Pipes/Cables Using Hydraulic Grabber", "ko": "유압그래버로 철근·강재·배관·케이블 야적"}, "steps": {"en": ["Choose a stockpile location with no obstruction for the crawler excavator to travel; avoid uneven surfaces, choose location near pickup point.", "Position the excavator arm at optimal height for rebar pile access; grabber low enough to pick up rebar but not dragging on the ground.", "Open the grabber attachment wide enough to fully secure a bundle of rebar.", "Lower the grabber and clamp around a section of rebar, ensuring a secure hold.", "For larger sections, ensure the grip is stable to prevent slipping during transport.", "For smaller sections, may grab multiple pieces at once, ensuring the load is balanced.", "Once secured, carefully lift the load; keep the grabber slightly above the ground.", "Move the excavator slowly toward the designated stockpile area, avoiding sudden movements.", "Position the machine directly over the designated spot at the stockpile.", "Slowly open the grabber and drop the rebar in an organized manner, stacking in layers; banksman must maintain a safe distance as rebar may fly out on release.", "If the pile is already partially built, place the rebar in a stable position to avoid shifting/collapsing.", "Use the excavator to adjust/shape the stockpile after depositing.", "If needed, lightly compact the rebar with the grabber to make the pile more stable.", "Repeat the process for an organized, stable pile.", "Important note: Avoid overstocking or making the pile too high — keep within a manageable height to prevent collapse."], "ko": ["크롤러 엑스카베이터 이동에 장애물 없는 야적지 선정, 요철지형 피하고 픽업지점 인근으로", "암을 철근더미 접근에 최적높이로 위치, 그래버는 낮되 지면 끌림 없이", "그래버를 철근다발이 완전히 잡히도록 넓게 개방", "그래버를 낮춰 철근구간을 견고히 클램핑", "대형 구간은 이동 중 미끄러지지 않도록 안정된 그립 확보", "소형 구간은 여러 조각을 함께 잡되 균형 유지", "확보 후 신중히 인양, 그래버는 지면에서 살짝 위로 유지", "야적구역으로 서서히 이동, 급격한 동작 회피", "야적 목표지점 바로 위에 장비 위치", "서서히 그래버를 열어 정돈되게 층별 적재, 뱅크스맨은 방출 시 철근이 튈 수 있으므로 안전거리 유지", "이미 일부 야적된 경우 안정된 위치에 배치하여 붕괴/이동 방지", "적재 후 엑스카베이터로 야적더미 정리·형태잡기", "필요 시 그래버로 살짝 눌러 다짐, 안정성 향상", "반복하여 정돈되고 안정된 더미 형성", "중요: 과다야적·과도한 높이 금지, 붕괴방지 위해 관리가능한 높이 유지"]}}, {"title": {"en": "Manually Loading Material into the Wheel Loader", "ko": "자재 수동 상차 (휠로더)"}, "steps": {"en": ["Identify the type of material (rebar, steel scrap, gravel, debris, precast, pipes, cable, insulation, scaffolding materials, tools, etc.) — determines handling technique/tools needed.", "Ensure the wheel loader is positioned correctly, bucket low to ground but not touching.", "Position the wheel loader with bucket close to the pile to reduce lifting distance.", "Lower the bucket to optimal height for easy access for manual loading — stable, not dragging or too high.", "For bulk materials like soil, sand, gravel or dirt, a shovel is better to use."], "ko": ["자재 종류 확인(철근, 강재스크랩, 자갈, 잔해, 프리캐스트, 배관, 케이블, 단열재, 비계자재, 공구 등) — 취급방법·공구 결정", "휠로더 올바른 위치 확보, 버켓은 지면 가까이 두되 닿지 않게", "버켓을 자재더미 가까이 위치시켜 인양거리 최소화", "수동 상차하기 좋은 높이로 버켓 하강 — 안정되고 끌리거나 너무 높지 않게", "흙·모래·자갈 등 벌크자재는 삽 사용이 더 적합"]}}, {"title": {"en": "Loading Waste/Soil/Sand/Gravel into Trailer or Dump Truck Using Wheel Loader", "ko": "휠로더로 트레일러/덤프트럭 상차"}, "steps": {"en": ["Choose a location near the debris pile with good access for the wheel loader, close to the trailer.", "Position the trailer box securely, level and properly aligned with the wheel loader.", "Drive the wheel loader to the debris pile, stable and close enough for efficient scoop.", "Position the bucket just above the debris pile, ready to scoop.", "Gradually lower and scoop the debris, ensuring bucket filled evenly.", "Ensure bucket is not overloaded to avoid tipping/spillage; for heavy stone, fill only 60%.", "Once loaded, slowly raise the bucket to transport, low enough to avoid obstacles.", "Slowly drive toward the trailer box, path clear of workers/obstacles/machinery.", "Position bucket directly above the trailer box, aligned to avoid spilling on sides.", "Slowly tilt the bucket to release debris into the trailer in a controlled manner.", "After dumping, use the bucket to spread/shape the load for even distribution.", "Return to the pile and repeat the loading process.", "Once trailer box filled within capacity, send to Village 1 (near Encheon Camp) for covering the trailer box with net."], "ko": ["휠로더 접근 좋고 트레일러 가까운 잔해더미 위치 선정", "트레일러박스를 수평·정렬 맞춰 견고히 배치", "잔해더미로 휠로더 이동, 효율적 스쿱을 위해 안정되고 근접하게", "버켓을 잔해더미 바로 위에 스쿱 준비상태로 위치", "서서히 하강하여 균등하게 스쿱", "과적으로 전복/유출 없도록 확인, 중량 석재는 60%만 적재", "적재 후 버켓을 서서히 들어 장애물 피하며 운반", "작업자·장애물·타장비 없는 경로로 트레일러 방향 서행", "버켓을 트레일러박스 바로 위, 측면유출 없게 정렬", "버켓을 서서히 기울여 통제된 방식으로 트레일러에 배출", "배출 후 버켓으로 적재물 균등 정리", "잔해더미로 복귀하여 상차작업 반복", "용량 이내로 채워지면 엔천캠프 인근 빌리지1로 이동, 네트 커버 작업"]}}, {"title": {"en": "Loading Waste/Soil/Sand/Gravel into Trailer or Dump Truck Using Excavator Bucket", "ko": "엑스카베이터 버켓으로 트레일러/덤프트럭 상차"}, "steps": {"en": ["Position the excavator close to the waste pile; arm should reach over the pile and into the dump truck.", "Ensure stable, firm footing especially on uneven terrain.", "Position dump truck properly to receive the waste.", "Communicate between driver and excavator operator regarding readiness to load.", "Scoop into the waste, avoid overloading the bucket at first for a steady process.", "Raise the arm to lift the waste off the ground, avoid lifting bucket too high (destabilize/spillage).", "Carefully move the excavator toward the dump truck, keeping bucket low to prevent spillage.", "Position over the truck's bed, slowly lower the bucket, aligning with the bed.", "Ensure waste isn't too heavy for the bucket to handle in one load.", "Tilt the bucket to release the waste into the truck's bed, evenly distributed to prevent shifting.", "After unloading, return the bucket to the pile and repeat until the truck is loaded."], "ko": ["잔해더미 근처에 엑스카베이터 위치, 암이 더미를 넘어 덤프트럭까지 닿도록", "특히 요철지형에서 안정된 접지 확보", "덤프트럭을 수령위치에 적절히 배치", "운전자-오퍼레이터 간 적재준비 소통", "최초에는 과적 없이 안정적으로 잔해 스쿱", "암을 들어 잔해를 지면에서 분리, 버켓을 너무 높이 들지 않기(불안정/유출)", "버켓을 낮게 유지하며 신중히 덤프트럭 쪽으로 이동", "적재함 위에 위치, 서서히 버켓 하강하여 정렬", "버켓 1회 처리량이 과도하지 않게 확인", "버켓을 기울여 균등하게 적재함에 배출, 이동 중 쏠림 방지", "배출 후 버켓을 잔해더미로 복귀, 트럭이 채워질 때까지 반복"]}}, {"title": {"en": "Loading Crumpled Rebar/Steel/Pipes/Cables Using Excavator Grabber into Dump Truck/Trailer", "ko": "엑스카베이터 그래버로 철근·강재·배관·케이블 상차"}, "steps": {"en": ["Move the excavator close to the pile of demolished materials, ensuring grabber has a clear line of sight.", "Park the dump truck directly under the grabber's reach; driver/operator communicate, truck parked stably.", "Move so grabber is directly above the pile, aligned to prevent inefficient grabs/spillage.", "Open the grabber wide enough to securely grab the material; for steel/rebar, ensure it can wrap/grip tightly.", "Ensure material is tightly gripped before lifting; adjust position/width for large, heavy or irregular material.", "Once secured, raise the arm slowly to lift material off the ground; keep load low while moving.", "Move the grabber toward the dump truck.", "Position directly over the truck's bed, centered for even placement.", "Slowly open the grabber to release material; for bulky items (pipes/beams), gently drop to avoid damage.", "Ensure material is evenly distributed within the truck's bed; grabber may be used to compact/arrange.", "After unloading, return the grabber to the pile for another load, repeat until truck is full/all material loaded."], "ko": ["철거자재더미 근처로 엑스카베이터 이동, 그래버가 명확히 자재를 볼 수 있도록", "그래버 작동범위 바로 아래에 덤프트럭 주차, 운전자-오퍼레이터 소통, 트럭 안정적으로 주차", "그래버가 더미 바로 위에 오도록 정렬하여 비효율적 그랩·유출 방지", "자재를 견고히 잡을 만큼 그래버 개방, 철근·강재는 확실히 감싸 파지", "인양 전 자재가 확실히 잡혔는지 확인, 대형·중량·불규칙 자재는 위치·폭 조정", "확보 후 서서히 암 상승하여 지면에서 인양, 이동 중 낮게 유지", "덤프트럭 방향으로 그래버 이동", "적재함 위 중앙에 위치", "서서히 개방하여 배출, 대형품(배관·보)은 손상방지 위해 천천히 내려놓기", "적재함 내 균등 분산되도록 확인, 필요 시 그래버로 정리", "배출 후 더미로 복귀하여 반복, 트럭이 채워지거나 자재 전량 적재될 때까지"]}}, {"title": {"en": "Moving and Loading of Steel I-Beam and H-Beam Using Excavator Grabber", "ko": "엑스카베이터 그래버로 I빔·H빔 이동·상차"}, "steps": {"en": ["Position the excavator perpendicular or parallel to the beam or column.", "Extend the boom and rotate the grabber over the beam.", "Lower the grabber close to the center of the beam (for balance).", "Gently close the grabber around the beam.", "Ensure a secure grip, avoiding pinching at weak or unstable positions.", "Slowly lift the beam slightly off the ground to test the grip.", "Observe for shifting or possible slippage.", "Adjust the grabber as needed to improve balance and hold.", "Lift the beam just above the ground for stability.", "Slowly and steadily rotate/move the beam to the loading area (trailer box, flatbed, or stockpile).", "Align the beam over the target loading spot.", "Lower it slowly and evenly.", "Place the beam in a stable, designated position.", "Open the grabber carefully to release the beam.", "Ensure the beam is stable and will not roll or shift.", "Note: for big/long beams, know the weight and balance point (center of gravity) and lift one at a time."], "ko": ["보/기둥에 수직 또는 평행하게 엑스카베이터 배치", "붐 전개, 그래버를 보 위로 회전", "보 중앙 근처로 그래버 하강(균형용)", "보를 부드럽게 감싸도록 그래버 닫기", "약하거나 불안정한 지점을 피해 견고한 그립 확보", "서서히 살짝 인양하여 그립 테스트", "이동/미끄러짐 관찰", "필요 시 그래버 조정하여 균형 개선 후 유지", "안정성 위해 지면 바로 위까지만 인양", "적재구역(트레일러/플랫베드/야적장)으로 서서히 회전·이동", "목표 적재지점 위로 정렬", "서서히 균등하게 하강", "안정된 지정위치에 배치", "조심스럽게 그래버 개방하여 보 방출", "보가 안정되고 구르거나 이동하지 않는지 확인", "참고: 대형/장척 보는 무게중심 파악 후 1개씩 인양"]}}], "fullControls": {"en": ["Ensure competency of operators. They must undergo training and have valid TPC.", "Conduct regular inspections and maintenance on the equipment to ensure it is in optimal working condition all the time.", "Install barricade and signage avoid unauthorized entry.", "Regularly check the load to ensure it is within the wheel loader’s rated capacity, for large pieces of stone, bucket shall be filled with only 60% of its bucket volume to avoid overloading and spilling.", "Avoid overloading the excavator. Follow the manufacturer’s specifications for load capacity. Ensure the load is distributed evenly within the bucket and is securely held.", "Operate at slow speeds when lifting or moving large debris, and ensure that the bucket is not overloaded or unbalanced.", "Never use bucket or grabber in transferring crumpled rebar into wheel loader bucket.", "Ensure operators understand the machine's load capacity and limitations and are trained to operate the equipment safely within its limit.", "Establish exclusion zones by installing barricade and signage around the area where the hydraulic grabber is in use. Only authorized and trained personnel should be allowed within these zones.", "The banksman and spotter must maintain a safe distance from the hydraulic grabber when grabbing and releasing scrap materials specially rebar.", "Provide banksman or spotter with whistle to communicate commands to operator or give warning for other nearby workers, signaling that equipment is about to move or stop or to alert everyone during an emergency.", "Assign a competent mechanic to perform regular inspections and maintenance of the hydraulic grabber, including checking for wear, hydraulic fluid levels, greasing, and any potential malfunctions. Ensure the grabber is in good condition before use.", "Ensure a first aider and first aid kit is available on site.", "Ensure that all workers are properly trained in safe manual handling techniques, including proper lifting, carrying, and positioning of materials. All workers must attend the HSJV HSE Manual Handling Training.", "Depending on the material being handled, provide workers with cut resistant gloves for handling rebar, steel, glass or other sharp objects.", "Assign a banksman to guide the wheel loader operator and ensure that workers are aware of the loader’s movement.", "Provide banksman with whistle to communicate commands to operator or give warning for other nearby workers, signaling that equipment is about to move or stop or to alert everyone during an emergency.", "Establish exclusion zones around the wheel loader and dump truck. Install barricade and signages to mark the areas where workers are not allowed to enter while the equipment is operating.", "Regularly check the load to ensure it is within the wheel loader’s rated capacity, for large pieces of stone, bucket shall be filled with only 60% of its bucket volume to avoid overloading and spilling.", "Assign a trained and competent banksman to control the movement of the equipment.", "The banksman must maintain a safe distance from the wheel loader/excavator during the loading.", "Ensure that all operators of the wheel loader are properly trained and holder of valid TPC.", "Provide banksman with whistle to communicate commands to operator or give warning for other nearby workers, signaling that equipment is about to move or stop or to alert everyone during an emergency.", "Assign a competent mechanic to conduct regular inspections and maintenance on the equipment to ensure it is in optimal working condition all the time.", "Stabilize the dump truck / trailers with the wheel stoppers before unloading debris to prevent the truck from moving unexpectedly.", "Perform pre inspection / post inspection for all dump trucks and trailers using the heavy vehicle INSPECTION CHECKLIST. The inspection shall be conducted by the subcontractor in charge and HSJV representative.", "Implement dust suppression techniques, such as spraying water to minimize the amount of airborne dust.", "Provide workers with dust mask, to protect against harmful particles.", "Establish exclusion zones around the hydraulic grabber and dump truck/trailer. Install barricade and signages to mark the areas where workers are not allowed to enter while the equipment is operating.", "Ensure that the hydraulic grabber operator is properly trained and certified in the operation of the equipment. He must be experienced to operate the grabber and hold a valid TPC.", "Assign a competent mechanic to conduct regular inspections and maintenance of the hydraulic grabber, including checking hydraulic systems, hoses, and grabber mechanics to ensure proper functioning.", "Perform pre inspection / post inspection for all dump trucks and trailers using the heavy vehicle INSPECTION CHECKLIST. The inspection shall be conducted by the let lang = 'ko';
let currentJha = null;
const homeEl = document.getElementById('home');
const listEl = document.getElementById('list');
const detailEl = document.getElementById('detail');
const searchEl = document.getElementById('search');

const jhaCodes = [...new Set(DATA.map(d=>d.jha.code))];
function itemsFor(code, cat){ return DATA.filter(d=>d.jha.code===code && d.cat===cat); }

function renderHome(){
  const S = STRINGS[lang];
  let html = `<div class="jha-picker-label">${S.homeSub}</div>`;
  jhaCodes.forEach(code=>{
    const items = DATA.filter(d=>d.jha.code===code);
    const sample = items[0];
    const hCount = items.reduce((n,it)=>n + it.hazards.filter(h=>h.res==='H').length, 0);
    const ptwCount = items.reduce((n,it)=>n + it.hazards.filter(h=>h.ptw).length, 0);
    html += `<div class="jha-card" onclick="selectJha('${code.replace(/'/g,"\\'")}')">
      <div class="jha-card-code">${code}</div>
      <div class="jha-card-title">${sample.jha.company}</div>
      <div class="jha-card-company">${lang==='ko' ? '탭하여 활동 목록 보기' : 'Tap to view activity list'}</div>
      <div class="jha-card-stats">
        <span class="jha-stat">${S.activityCount(items.length)}</span>
        ${hCount?`<span class="jha-stat h-count">H ${hCount}</span>`:''}
        ${ptwCount?`<span class="jha-stat">PTW ${ptwCount}</span>`:''}
      </div>
    </div>`;
  });
  homeEl.innerHTML = html;
}

function selectJha(code){
  currentJha = code;
  homeEl.style.display = 'none';
  document.getElementById('searchWrap').style.display = 'block';
  listEl.style.display = 'block';
  searchEl.value = '';
  renderList('');
}

function goHome(){
  currentJha = null;
  detailEl.style.display = 'none';
  listEl.style.display = 'none';
  document.getElementById('searchWrap').style.display = 'none';
  homeEl.style.display = 'block';
  renderHome();
}

function riskClass(r){ if(r==='H') return 'risk-H'; if(r==='M') return 'risk-M'; return 'risk-L'; }

function setLang(l){
  lang = l;
  document.getElementById('btnKo').classList.toggle('active', l==='ko');
  document.getElementById('btnEn').classList.toggle('active', l==='en');
  document.documentElement.lang = l;
  const S = STRINGS[lang];
  document.getElementById('hTitle').textContent = S.title;
  document.getElementById('pageTitle').textContent = S.title + ' | BNPP HSE';
  searchEl.placeholder = S.searchPh;
  document.getElementById('footerNote').innerHTML = lang==='ko'
    ? 'BNPP HSE · JHA/WMS 통합 검색 — 철골구조 · 콘크리트구조 철거'
    : 'BNPP HSE · Combined JHA/WMS Lookup — Steel · Concrete Structure Demolition';
  document.getElementById('hRef').textContent = jhaCodes.map(c=>c.split(' ')[0]).join(' · ');
  if(detailEl.style.display==='block' && currentDetailId!==null){
    showDetail(currentDetailId);
  } else if(currentJha){
    renderList(searchEl.value);
  } else {
    renderHome();
  }
}

function renderList(filter){
  filter = (filter||'').trim().toLowerCase();
  const S = STRINGS[lang];
  let html = `<div class="back-btn" onclick="goHome()">${S.backHome}</div>`;
  function block(items,label){
    const f = items.filter(it => {
      let t = (it.title[lang]+' '+it.short[lang]).toLowerCase();
      if(it.wmsProcedures){ t += ' ' + it.wmsProcedures.map(p=>p.title[lang]).join(' ').toLowerCase(); }
      return !filter || t.includes(filter);
    });
    if(!f.length) return '';
    let h = `<div class="group-label">${label}</div>`;
    f.forEach(it=>{
      const hasPTW = it.hazards.some(hz=>hz.ptw);
      const hasH = it.hazards.some(hz=>hz.res==='H');
      h += `<div class="act-item" onclick="showDetail(${it.id})">
        <div class="act-num">${it.id<100? String(it.id).padStart(2,'0') : '•'}</div>
        <div class="act-name">${it.short[lang]}</div>
        <div class="act-badges">
          ${hasH?'<span class="pill pill-H">H</span>':''}
          ${hasPTW?'<span class="pill pill-ptw">PTW</span>':''}
        </div>
      </div>`;
    });
    return h;
  }
  const code = currentJha;
  if(code){
    let section = '';
    section += block(itemsFor(code,'work'), S.groupWork);
    section += block(itemsFor(code,'general'), S.groupGeneral);
    html += section || `<div class="empty-msg">${S.empty(filter)}</div>`;
  }
  listEl.innerHTML = html;
}

let currentDetailId = null;
let openProcs = {}; // pi -> bool, reset per activity view

function progKey(activityId, procIdx){ return `wmschk:${activityId}:${procIdx}`; }

function getCheckedSet(activityId, procIdx){
  try{
    const raw = localStorage.getItem(progKey(activityId,procIdx));
    return raw ? new Set(JSON.parse(raw)) : new Set();
  }catch(e){ return new Set(); }
}
function saveCheckedSet(activityId, procIdx, set){
  try{ localStorage.setItem(progKey(activityId,procIdx), JSON.stringify([...set])); }catch(e){}
}

function renderProc(activityId, procIdx, proc){
  const S = STRINGS[lang];
  const steps = proc.steps[lang];
  const checked = getCheckedSet(activityId, procIdx);
  const done = steps.filter((_,i)=>checked.has(i)).length;
  const isOpen = !!openProcs[procIdx];
  const complete = done===steps.length && steps.length>0;
  return `<div class="proc-block ${isOpen?'open':''}" id="proc-${activityId}-${procIdx}">
    <div class="proc-head" onclick="toggleProcOpen(${activityId},${procIdx})">
      <div class="proc-head-left"><span class="proc-chevron">▶</span><span class="proc-title">${proc.title[lang]}</span></div>
      <span class="proc-progress ${complete?'complete':''}">${S.stepsDone(done,steps.length)}</span>
    </div>
    <div class="proc-steps">
      ${steps.map((s,si)=>`<div class="step-row" onclick="toggleStep(${activityId},${procIdx},${si})">
        <div class="step-check ${checked.has(si)?'checked':''}">${checked.has(si)?'✓':''}</div>
        <div class="step-text ${checked.has(si)?'checked':''}">${s}</div>
      </div>`).join('')}
      <div class="proc-reset" onclick="resetProc(event,${activityId},${procIdx})">${S.resetProgress}</div>
    </div>
  </div>`;
}

function toggleProcOpen(activityId, procIdx){
  openProcs[procIdx] = !openProcs[procIdx];
  const el = document.getElementById(`proc-${activityId}-${procIdx}`);
  if(el) el.classList.toggle('open', !!openProcs[procIdx]);
}

function toggleStep(activityId, procIdx, stepIdx){
  const set = getCheckedSet(activityId, procIdx);
  if(set.has(stepIdx)) set.delete(stepIdx); else set.add(stepIdx);
  saveCheckedSet(activityId, procIdx, set);
  const item = DATA.find(d=>d.id===activityId);
  const proc = item.wmsProcedures[procIdx];
  const wasOpen = !!openProcs[procIdx];
  openProcs[procIdx] = wasOpen;
  const container = document.getElementById(`proc-${activityId}-${procIdx}`);
  if(container) container.outerHTML = renderProc(activityId, procIdx, proc);
}

function resetProc(evt, activityId, procIdx){
  evt.stopPropagation();
  saveCheckedSet(activityId, procIdx, new Set());
  const item = DATA.find(d=>d.id===activityId);
  const proc = item.wmsProcedures[procIdx];
  openProcs[procIdx] = true;
  const container = document.getElementById(`proc-${activityId}-${procIdx}`);
  if(container) container.outerHTML = renderProc(activityId, procIdx, proc);
}

function showDetail(id){
  currentDetailId = id;
  openProcs = {};
  const item = DATA.find(d=>d.id===id);
  if(!item) return;
  const S = STRINGS[lang];
  listEl.style.display='none';
  document.querySelector('.search-wrap').style.display='none';
  detailEl.style.display='block';

  let seqHtml = '';
  if(item.cat==='work'){
    const sameJhaWork = itemsFor(item.jha.code,'work');
    const idx = sameJhaWork.findIndex(w=>w.id===id);
    const prev = sameJhaWork[idx-1];
    const next = sameJhaWork[idx+1];
    seqHtml = `<div class="seq-strip">
      <div class="seq-step"><div class="lbl">${S.seqPrev}</div><div class="val">${prev? prev.short[lang] : S.seqStart}</div></div>
      <div class="seq-arrow">›</div>
      <div class="seq-step current"><div class="lbl">${S.seqCurrent}</div><div class="val">${item.short[lang]}</div></div>
      <div class="seq-arrow">›</div>
      <div class="seq-step"><div class="lbl">${S.seqNext}</div><div class="val">${next? next.short[lang] : S.seqEnd}</div></div>
    </div>`;
  }

  let toolsHtml = '';
  if(item.tools && item.tools.length){
    toolsHtml = `<div class="card"><div class="card-head"><span class="ic">🧰</span><h2>${S.toolsHead}</h2></div>
      <div class="card-body"><div class="tools-list">${item.tools.map(t=>`<span class="tool-chip">${t}</span>`).join('')}</div></div></div>`;
  }

  let wmsHtml = '';
  if(item.wmsProcedures && item.wmsProcedures.length){
    wmsHtml = `<div class="card"><div class="card-head"><span class="ic">📋</span><h2>${S.wmsHead}</h2></div>
      <div class="card-body">${item.wmsProcedures.map((p,pi)=>renderProc(item.id,pi,p)).join('')}</div></div>`;
  } else if(item.wms && item.wms[lang] && item.wms[lang].length){
    wmsHtml = `<div class="card"><div class="card-head"><span class="ic">📋</span><h2>${S.wmsHead}</h2></div>
      <div class="card-body"><ul class="wms-steps">${item.wms[lang].map(s=>`<li>${s}</li>`).join('')}</ul></div></div>`;
  } else {
    wmsHtml = `<div class="no-data-note">${S.noData}</div>`;
  }

  let hazHtml = `<div class="card"><div class="card-head"><span class="ic">⚠️</span><h2>${S.jhaHead}</h2></div><div class="card-body">`;
  item.hazards.forEach(hz=>{
    hazHtml += `<div class="hazard-block">
      <div class="hazard-top">
        <div class="hazard-text">${hz[lang].h}</div>
        <div class="risk-badges">
          <span class="risk-tag ${riskClass(hz.res)}">${hz.r1} → ${hz.r2}</span>
          <span class="ptw-tag ${hz.ptw?'':'ptw-no'}">${hz.ptw? S.ptwYes : S.ptwNo}</span>
        </div>
      </div>
      <div class="control-box"><ul>${hz[lang].ctrl.map(c=>`<li>${c}</li>`).join('')}</ul></div>
    </div>`;
  });
  hazHtml += `</div></div>`;

  let fullCtrlHtml = '';
  if(item.fullControls && item.fullControls[lang] && item.fullControls[lang].length){
    fullCtrlHtml = `<div class="full-ctrl-toggle" onclick="this.classList.toggle('open')">
      <span class="lbl">${S.fullCtrlHead}</span><span class="chev">▶</span>
    </div>
    <div class="full-ctrl-body">
      <div class="full-ctrl-note">${S.fullCtrlNote}</div>
      <ol class="full-ctrl-list">${item.fullControls[lang].map(c=>`<li>${c}</li>`).join('')}</ol>
    </div>`;
  }

  detailEl.innerHTML = `
    <div class="back-btn" onclick="showList()">${S.back}</div>
    <div class="detail-head">
      <div class="detail-num">${item.cat==='work'? S.catWork : S.catGeneral}</div>
      <div class="detail-title">${item.title[lang]}</div>
      <div class="detail-sub">${item.jha.code} · ${item.jha.company}</div>
    </div>
    ${seqHtml}
    ${toolsHtml}
    ${wmsHtml}
    ${hazHtml}
    ${fullCtrlHtml}
  `;
  window.scrollTo(0,0);
}

function showList(){
  detailEl.style.display='none';
  listEl.style.display='block';
  document.querySelector('.search-wrap').style.display='block';
}

searchEl.addEventListener('input', e=> renderList(e.target.value));
setLang('ko');
</script>
</body>
</html>
